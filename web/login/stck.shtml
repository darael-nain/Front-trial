				let fromUrl = url.searchParams.get("fromUrl");
				// Legacy bridge: no cookie write here, only redirect.
				let homeUrl = "/app/home";
			
			switch(fromUrl){
				case "rendir":
					homeUrl = "/rendir/index.shtml"
					break;

						homeUrl = "/app/home?fromUrl=validar"
						break;
					default:
						homeUrl = "/app/home"
						break;
				}
				window.location.href = homeUrl
