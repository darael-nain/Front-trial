<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>UNA Base</title>

		<link rel="stylesheet" href="/v3/design/tooltip.css">
		<link rel="stylesheet" href="/v3/design/testing.css">

		<script src="/v3/script/jquery/plugins/toasty/toasty-min.js"></script>

    	<link rel="stylesheet" href="/v3/script/jquery/jquery-plugins.css">

    	<link rel="stylesheet" href="/v3/design/tooltip.css">		

		<script>
			$.ajax({
				url: '/4DACTION/_V3_getTooltip',
				data: {
					'path': '/index.shtml'
				},
				dataType: 'json',
				success: function(data) {
					if (typeof data.success != 'undefined') {
						$().toasty({
							title: data.title,
							message: data.text,
							autoHide: data.time,
							position: 'tr'
						});
					}
				}
			});
		</script>

						<span>Su nombre</span>
						<input type="text" name="txtNombre" required>
					</label>
					<label>
						<span>Su email</span>
						<input type="email" name="txtEmail" required>
					</label>
					<label>
						<span>Rubro</span>

							<option value="">Seleccionar</option>
							<option value="Administración y finanzas">Administración y finanzas</option>

							<option value="Diseño">Diseño</option>
							<option value="Educación">Educación</option>
							<option value="Fotografía">Fotografía</option>
							<option value="Gobierno">Gobierno</option>
							<option value="Informática y telecomunicaciones">Informática y telecomunicaciones</option>
							<option value="Industrial">Industrial</option>
							<option value="Ingeniería">Ingeniería</option>
							<option value="Productora de cine y TV">Productora de cine y TV</option>
							<option value="Productora de eventos y BTL">Productora de eventos y BTL</option>
							<option value="Profesional Independiente">Profesional Independiente</option>
							<option value="Salud">Salud</option>
							<option value="Otros">Otros</option>
						</select>
					</label>
					<button type="submit">Ingresar</button>
				</fieldset>
			</form>
		</section>

				itemtype="http://data-vocabulary.org/Address">
