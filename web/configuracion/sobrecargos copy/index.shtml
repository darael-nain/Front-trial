<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache" />
    <title>Sobrecargos</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.2/css/all.css">
    <!-- Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap">
    <link rel="stylesheet" type="text/css"
        href="https://cdn.datatables.net/v/bs4/dt-1.11.3/fc-4.0.1/fh-3.2.0/r-2.2.9/datatables.min.css" />
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/1.6.5/css/buttons.dataTables.min.css">
    <link rel="stylesheet" href="/configuracion/css/sobrecargos/sobrecargos.css">
    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
</head>

<body>
    <div class="content-wrapper ml-3 mr-3">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h5 class="m-0 text-dark"></h5>
                    </div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item"><a href="#">Inicio</a></li>
                            <li class="breadcrumb-item active">Configuración</li>
                            <li class="breadcrumb-item active">Sobrecargos</li>
                        </ol>
                    </div>
                </div>
            </div>
            <div class="shadow p-3 mb-5 bg-white rounded">
                <div class="card-header">
                    <!-- Button trigger modal -->
                    <section class="content">
                        <div class="box box-info ">
                            <a class="btn btn-success btn-labeled" href="/configuracion/index.shtml" role="button"
                                style="background: #34CC02;">
                                <span class="btn-label"><i class="fas fa-arrow-circle-left"></i></span>
                                <strong>Volver</strong></a>
                            <button type="button" class="btn btn-success" data-toggle="modal"
                                data-target="#exampleModalCenter" style="background: #03D6F9;">
                                <i class="fas fa-plus-circle"></i>
                            </button>
                            <hr class="mt-2 mb-3" />
                            <div class="box-body">
                                <div class="table-responsive">
                                    <div id="loading-modal"></div>
                                    <table id="sobrecargos"
                                        class="table table-striped table-bordered table-sm tablesobrecargos"
                                        cellspacing="0" width="100%">
                                        <thead>
                                            <tr>
                                                <th
                                                    style="width: 3%;background-color: #34CC02; color: white; width: auto;">
                                                    #</th>
                                                <th
                                                    style="width: 3%;background-color: #34CC02; color: white; width: auto;">
                                                    Nombre</th>
                                                <th
                                                    style="width: 3%;background-color: #34CC02; color: white; width: auto;">
                                                    Tipo</th>
                                                <th
                                                    style="width: 3%;background-color: #34CC02; color: white; width: auto;">
                                                    Porcentaje</th>
                                                <th
                                                    style="width: 3%;background-color: #34CC02; color: white; width: auto; vertical-align: center;">
                                                    Info</th>
                                                <th
                                                    style="width: 3%;background-color: #34CC02; color: white; width: auto;">
                                                    Real</th>
                                                <th
                                                    style="width: 3%;background-color: #34CC02; color: white; width: auto;">
                                                    Cerrado</th>
                                                <th
                                                    style="width: 3%;background-color: #34CC02; color: white; width: auto;">
                                                    Editable</th>
                                                <th
                                                    style="width: 3%;background-color: #34CC02; color: white; width: auto;">
                                                    Ajuste</th>
                                                <th
                                                    style="width: 3%;background-color: #34CC02; color: white; width: auto;">
                                                    Form_Percent</th>
                                                <th
                                                    style="width: 3%;background-color: #34CC02; color: white; width: auto;">
                                                    Total</th>
                                                <th
                                                    style="width: 3%;background-color: #34CC02; color: white; width: auto;">
                                                    SubTotal</th>
                                                <th
                                                    style="width: 3%;background-color: #34CC02; color: white; width: auto;">
                                                    SubTotalContinuo</th>
                                                <th
                                                    style="width: 3%;background-color: #34CC02; color: white; width: auto;">
                                                    Acción</th>
                                            </tr>
                                        </thead>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
        <!-- Modal -->
        <div id="exampleModalCenter" class="modal fade bd-example-modal-lg" role="dialog">
            <div class="modal-dialog modal-lg">
                <div class="table-responsive">
                    <!-- Contenido del modal -->
                    <div class="modal-content">
                        <div class="modal-header bg-blue">
                            <H5>Nuevo SobreCargo</H5>
                            <button type="button" class="close-white" data-dismiss="modal">&times;</button>
                        </div>
                        <br>
                        <div class="modal-body">
                            <div class="row">
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label for="recipient-bodega" class="col-form-label">Nombre </label>
                                        <input type="text" class="form-control" id="sb_name">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label for="recipient-bodega" class="col-form-label">Tipo</label>
                                        <select class="form-control" id="sb_tipo">
                                            <option selected>Seleccione</option>
                                            <option value="true">Costo</option>
                                            <option value="false">Utilidad</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label for="recipient-bodega" class="col-form-label">Porcentaje </label>
                                        <input type="text" class="form-control" id="sb_percent">
                                    </div>
                                </div>
                            </div>
                            <hr class="mt-2 mb-3" />
                            <div class="row">
                                <div class="col-md-12">
                                    <h6>Adicional</h6>
                                </div>
                                <div class="col-md-6">
                                    <div class="row">

                                        <div class="col-md-10">
                                            <div class="custom-control custom-checkbox mb-3">
                                                <input type="checkbox" class="custom-control-input" id="sb_subtotal"
                                                    required>
                                                <label class="custom-control-label" for="sb_subtotal">Subtotal</label>
                                            </div>
                                            <!-- Default checked -->
                                            <div class="custom-control custom-checkbox mb-3">
                                                <input type="checkbox" class="custom-control-input" id="sb_total"
                                                    required>
                                                <label class="custom-control-label" for="sb_total">Total</label>
                                            </div>
                                            <!-- Default checked -->
                                            <div class="custom-control custom-checkbox mb-3">
                                                <input type="checkbox" class="custom-control-input sb_subtotalcontinuo"
                                                    id="sb_subtotalcontinuo" required>
                                                <label class="custom-control-label" for="sb_subtotalcontinuo">Subtotal
                                                    continuo</label>
                                            </div>
                                            <!-- Default checked -->
                                            <div class="custom-control custom-checkbox mb-3">
                                                <input type="checkbox" class="custom-control-input sb_info" id="sb_info"
                                                    required>
                                                <label class="custom-control-label" for="sb_info">Info</label>
                                            </div>
                                            <div class="custom-control custom-checkbox mb-3">
                                                <input type="checkbox" class="custom-control-input sb_info" id="sb_real"
                                                    required>
                                                <label class="custom-control-label" for="sb_real">Real</label>
                                            </div>
                                            <div class="custom-control custom-checkbox mb-3">
                                                <input type="checkbox" class="custom-control-input sb_form_percent"
                                                    id="sb_form_percent" required>
                                                <label class="custom-control-label" for="sb_form_percent">Form
                                                    Percent</label>
                                            </div>
                                            <div class="custom-control custom-checkbox mb-3">
                                                <input type="checkbox" class="custom-control-input sb_ajuste"
                                                    id="sb_ajuste" required>
                                                <label class="custom-control-label" for="sb_ajuste">Ajuste</label>
                                            </div>
                                            <div class="custom-control custom-checkbox mb-3">
                                                <input type="checkbox" class="custom-control-input sb_cerrado"
                                                    id="sb_cerrado" required>
                                                <label class="custom-control-label" for="sb_cerrado">Cerrado</label>
                                            </div>
                                            <div class="custom-control custom-checkbox mb-3">
                                                <input type="checkbox" class="custom-control-input sb_editable"
                                                    id="sb_editable" required>
                                                <label class="custom-control-label" for="sb_editable">Editable</label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="modal-footer bg-white">
                            <button type="button" class="btn btn-primary" data-dismiss="modal"
                                onclick="setSobrecargo()">Guardar</button>
                            <button type="button" class="btn btn-secondary" data-dismiss="modal">Cerrar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="ModalConfirm" class="modal fade bd-example-modal-sm" role="dialog">
            <div class="modal-dialog modal-sm">
                <div class="table-responsive">
                    <!-- Contenido del modal -->
                    <div class="modal-content">
                        <div class="modal-header bg-blue">
                            <H5>Confirmar</H5>
                            <button type="button" class="close-white" data-dismiss="modal">&times;</button>
                        </div>
                        <br>
                        <div class="modal-body">
                            <div class="alert alert-danger" role="alert">
                                ¿Estás seguro que deseas eliminar este registro?
                            </div>
                        </div>
                        <div class="modal-footer bg-white">
                            <input type="button" class="btn btn-primary" value="Si" onclick="delSobreCargos()">
                            <button type="button" class="btn btn-secondary" data-dismiss="modal">No</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/base_object/general_template.js"></script>
    <script src="/v3/script/jquery/jquery.js"></script>
    <script src="/v3/script/jquery-ui-1.12.1/jquery-ui.min.js"></script>
    <!-- Script modal-->
    <script type="text/javascript"
        src="https://cdn.datatables.net/v/bs4/dt-1.11.3/fc-4.0.1/fh-3.2.0/r-2.2.9/datatables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
    <!-- COLUMN --->
    <script src="https://cdn.datatables.net/buttons/1.6.5/js/dataTables.buttons.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/1.6.5/js/buttons.colVis.min.js" defer></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script type="text/javascript" src="/configuracion/script/sobrecargos.js"></script>
</body>

</html>
