  <!-- 🔒 GUARD: oculta todo y solo muestra si (1) iframe same-origin + (2) login OK -->
  <style>
    html.guard-hide body {
      display: none !important;
    }
  </style>
  <script>
    (function guard() {
      // Oculta todo por defecto (evita que se vea contenido antes del check)
      document.documentElement.classList.add("guard-hide");

      const deny = () => {
        // “No aparece nada”: dejamos el body vacío + oculto
        try { if (document.body) document.body.innerHTML = ""; } catch (_) { }
        // mantenemos guard-hide activo
      };

      const allow = () => {
        document.documentElement.classList.remove("guard-hide");
      };

      // 1) Debe estar embebido en iframe (si lo abres directo en pestaña => DENY)
      let isInIFrame = false;
      try {
        isInIFrame = (window.self !== window.top);
      } catch (e) {
        // Si falla acceder a top, asumimos cross-origin => DENY abajo
        isInIFrame = true;
      }
      if (!isInIFrame) return deny();

      // 2) El parent debe ser same-origin (si no => DENY)
      try {
        if (window.top.location.origin !== window.location.origin) return deny();
      } catch (e) {
        return deny();
      }

      // 3) Debe estar logeado (reusa tu misma lógica)
      const checkUrl =
        `${window.origin}/4DACTION/_v3_checkLogin?nodeUrl=${encodeURIComponent("https://frank.unabase.com/node")}`;

      fetch(checkUrl, { credentials: "include", cache: "no-store" })
        .then(r => r.ok ? r.json() : Promise.reject(r))
        .then(data => {
          if (!data || !data.isLogin || data.login == null) return deny();
          // OK: recién aquí mostramos
          allow();
        })
        .catch(() => deny());
    })();
  </script>
  <!-- 🔒 FIN GUARD -->

  <script>
    let __busyCount = 0;

    function safeBlock() {
      try { spinnerMain?.(true); } catch (_) { }
    }

    function safeUnblock() {
      try { spinnerMain?.(false); } catch (_) { }
    }
    (function () {
      function getBaseUrl() {
        const p = new URLSearchParams(location.search);
        const h = (p.get("hostname") || "").trim();
        if (!h) return window.location.origin;
        if (/^https?:\/\//i.test(h)) return h.replace(/\/+$/, '');
        return ("https://" + h).replace(/\/+$/, '');
      }
      const baseUrl = getBaseUrl();

      const el = {
        btnReload: document.getElementById("btnReload"),
        select1: document.getElementById("select1"),
        select2: document.getElementById("select2"),
        list1: document.getElementById("list1"),
        list2: document.getElementById("list2"),
        count1: document.getElementById("count1"),
        count2: document.getElementById("count2"),
      };

      const state = {
        options1: [],
        options2: [],
        assigned1: new Set(),
        assigned2: new Set(),
        ts1: null,
        ts2: null,
      };

      function setBusy(on) {
        if (on) {
          __busyCount++;
          if (__busyCount === 1) safeBlock(); // solo bloquea en la primera
        } else {
          __busyCount = Math.max(0, __busyCount - 1);
          if (__busyCount === 0) safeUnblock(); // solo desbloquea al final real
        }

        // UI disable/enable (lo que ya tenías)
        el.btnReload.classList.toggle("disabled", __busyCount > 0);
        el.select1.disabled = __busyCount > 0;
        el.select2.disabled = __busyCount > 0;

        // si usas TomSelect:
        if (state.ts1) (__busyCount > 0 ? state.ts1.disable() : state.ts1.enable());
        if (state.ts2) (__busyCount > 0 ? state.ts2.disable() : state.ts2.enable());
      }

      async function fetchAny(url) {
        const res = await fetch(url);
        const raw = await res.text();

        const tryParse = (txt) => {
          const t = (txt || "").trim().replace(/^\uFEFF/, "");
          if (!t) return null;
          if (t[0] !== "{" && t[0] !== "[") return null;
          try { return JSON.parse(t); } catch (_) { return null; }
        };

        if (!res.ok) throw new Error(`HTTP ${res.status} :: ${raw.slice(0, 300)}`);

        const parsed = tryParse(raw);
        return (parsed !== null) ? parsed : raw;
      }

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function uniqSorted(arr) {
        return Array.from(new Set(arr))
          .map(s => String(s).trim())
          .filter(Boolean)
          .sort((a, b) => a.localeCompare(b, "es", { sensitivity: "base" }));
      }

      function normalizeOptions(json) {
        if (json && typeof json === "object" && Array.isArray(json.rows)) {
          return json.rows
            .map(r => {
              if (!r || typeof r !== "object") return "";
              if ("estado" in r && r.estado === false) return "";
              return (
                r.descripcion_centrocosto ??
                r.text ??
                r.Nombre ??
                r.nombre ??
                r.name ??
                r.value ??
                r.label ??
                ""
              ).toString();
            })
            .map(s => s.trim())
            .filter(Boolean);
        }

        if (Array.isArray(json)) {
          return json.map(x => {
            if (typeof x === "string") return x;
            if (x && typeof x === "object") {
              return (x.descripcion_centrocosto ?? x.text ?? x.Nombre ?? x.nombre ?? x.name ?? x.value ?? "").toString();
            }
            return "";
          }).map(s => s.trim()).filter(Boolean);
        }

        if (json && typeof json === "object") {
          const arr = json.data || json.items || json.result || json.results;
          if (Array.isArray(arr)) return normalizeOptions(arr);
        }

        return [];
      }

      function parseAsignaciones(json) {
        const out = { cc1: [], cc2: [] };

        if (json && typeof json === "object" && Array.isArray(json.rows)) {
          json.rows.forEach(r => {
            if (!r || typeof r !== "object") return;

            const tipo = Number(r.Tipo ?? r.tipo ?? r.type);
            const nombre = (
              r.Nombre ??
              r.nombre ??
              r.descripcion_centrocosto ??
              r.text ??
              r.name ??
              r.value ??
              ""
            ).toString().trim();

            if (!nombre) return;
            if (tipo === 1) out.cc1.push(nombre);
            if (tipo === 2) out.cc2.push(nombre);
          });
          return out;
        }

        if (Array.isArray(json)) {
          json.forEach(r => {
            const tipo = Number(r.Tipo ?? r.tipo ?? r.type);
            const nombre = (r.Nombre ?? r.nombre ?? r.text ?? r.value ?? "").toString().trim();
            if (!nombre) return;
            if (tipo === 1) out.cc1.push(nombre);
            if (tipo === 2) out.cc2.push(nombre);
          });
        }

        return out;
      }

      async function loadAsignaciones() {
        const url = `${baseUrl}/4DACTION/_V3_getCentroCostos`;
        const json = await fetchAny(url);
        const parsed = parseAsignaciones(json);
        state.assigned1 = new Set(uniqSorted(parsed.cc1).map(x => x.toUpperCase()));
        state.assigned2 = new Set(uniqSorted(parsed.cc2).map(x => x.toUpperCase()));
      }

      async function loadOptions(tipo) {
        const url = `${baseUrl}/4DACTION/${tipo === 1
          ? "_V3_getAreasNegocio?page=1&results=5000&q=&q2=&activo=true"
          : "_force_getItemsNv?unicos=true"
          }`;

        const json = await fetchAny(url);
        const list = uniqSorted(normalizeOptions(json));

        if (tipo === 1) state.options1 = list;
        else state.options2 = list;
      }

      function buildSelect(tipo) {
        const select = (tipo === 1) ? el.select1 : el.select2;
        const full = (tipo === 1) ? state.options1 : state.options2;
        const assignedUpper = (tipo === 1) ? state.assigned1 : state.assigned2;

        const available = full.filter(n => !assignedUpper.has(String(n).toUpperCase()));

        select.innerHTML = "";

        available.forEach(n => {
          const op = document.createElement("option");
          op.value = n;
          op.textContent = n;
          select.appendChild(op);
        });

        select.value = "";
      }

      function rowHTML(nombre, tipo) {
        const safe = escapeHtml(nombre);
        const dataNombre = encodeURIComponent(nombre);
        return `
        <div class="row">
          <div class="rowName" title="${safe}">${safe}</div>
          <button class="xbtn" type="button" data-tipo="${tipo}" data-nombre="${dataNombre}" aria-label="Eliminar ${safe}">×</button>
        </div>
      `;
      }

      function renderLists() {
        const cc1 = uniqSorted(Array.from(state.assigned1)).map(x => x); // están en upper, pero solo para conteo/lista lo recargamos desde backend
        const cc2 = uniqSorted(Array.from(state.assigned2)).map(x => x);

        // OJO: estos sets están en uppercase. Mostramos desde backend real:
        // Para no inventar, la UI se alimenta realmente en reloadAll() vía parseAsignaciones.
        // Aquí solo dejamos los contadores en 0 temporalmente, se setean abajo en reloadAll con datos reales.

        // (Se sobreescribe en reloadAll)
      }

      async function updateCentroCosto({ tipo, nombre, accion }) {
        const qs = new URLSearchParams({
          tipo: String(tipo),
          nombre: String(nombre),
          accion: String(accion),
        });
        const url = `${baseUrl}/4DACTION/_V3_updateCentroCostos?${qs.toString()}`;
        return fetchAny(url);
      }

      function destroyTomSelect() {
        if (state.ts1) { state.ts1.destroy(); state.ts1 = null; }
        if (state.ts2) { state.ts2.destroy(); state.ts2 = null; }
        // Limpia referencia del plugin en el select, por si queda colgando
        if (el.select1 && el.select1.tomselect) el.select1.tomselect = null;
        if (el.select2 && el.select2.tomselect) el.select2.tomselect = null;
      }

      function initTomSelect(tipo) {
        const select = (tipo === 1) ? el.select1 : el.select2;
        const assignedUpper = (tipo === 1) ? state.assigned1 : state.assigned2;

        // TomSelect encima del <select>
        const ts = new TomSelect(select, {
          maxItems: 1,
          create: function (input, cb) {
            const v = String(input || "").trim().toUpperCase();
            if (!v) return cb();
            cb({ value: v, text: v });
          },

          createOnBlur: true,
          placeholder: "Escribe para buscar…",
          persist: false,
          allowEmptyOption: true,
          valueField: "value",
          labelField: "text",
          searchField: ["text"],
          sortField: [{ field: "text", direction: "asc" }],
          plugins: ["remove_button"],
          render: {
            no_results: function () {
              return `<div class="no-results">No se han encontrado resultados</div>`;
            },
          },
          onChange: async function (value) {
            const nombre = String(value || "").trim();
            if (!nombre) return;

            setBusy(true);
            try {
              await updateCentroCosto({ tipo, nombre, accion: "add" });
              await reloadAll();
            } catch (err) {
              console.error(err);
            } finally {
              setBusy(false);
            }
          }
        });

        // Deja vacío al iniciar
        ts.clear(true);
        return ts;
      }

      async function reloadAll() {
        setBusy(true);
        try {
          // 1) asignaciones (lista inferior)
          const asigUrl = `${baseUrl}/4DACTION/_V3_getCentroCostos`;
          const asigJson = await fetchAny(asigUrl);
          const parsed = parseAsignaciones(asigJson);

          // Sets uppercase para filtrar opciones
          state.assigned1 = new Set(uniqSorted(parsed.cc1).map(x => x.toUpperCase()));
          state.assigned2 = new Set(uniqSorted(parsed.cc2).map(x => x.toUpperCase()));

          // 2) opciones base (lo que se puede agregar)
          await Promise.all([loadOptions(1), loadOptions(2)]);

          // 3) render listas con texto real (no uppercase)
          const cc1Real = uniqSorted(parsed.cc1);
          const cc2Real = uniqSorted(parsed.cc2);

          el.count1.textContent = cc1Real.length;
          el.count2.textContent = cc2Real.length;
          el.list1.innerHTML = cc1Real.length ? cc1Real.map(n => rowHTML(n, 1)).join("") : `<div class="empty">Sin asignaciones.</div>`;
          el.list2.innerHTML = cc2Real.length ? cc2Real.map(n => rowHTML(n, 2)).join("") : `<div class="empty">Sin asignaciones.</div>`;

          // 4) reconstruye selects y reinicia TomSelect
          destroyTomSelect();
          buildSelect(1);
          buildSelect(2);

          state.ts1 = initTomSelect(1);
          state.ts2 = initTomSelect(2);
        } catch (err) {
          console.error(err);
        } finally {
          setBusy(false);
        }
      }

      el.btnReload.addEventListener("click", reloadAll);

      document.addEventListener("click", async (e) => {
        const btn = e.target.closest(".xbtn");
        if (!btn) return;

        const tipo = Number(btn.getAttribute("data-tipo"));
        const nombre = decodeURIComponent(btn.getAttribute("data-nombre") || "");
        if (!nombre || ![1, 2].includes(tipo)) return;

        setBusy(true);
        try {
          await updateCentroCosto({ tipo, nombre, accion: "delete" });
          await reloadAll();
        } catch (err) {
          console.error(err);
        } finally {
          setBusy(false);
        }
      });
      safeBlock();
      reloadAll();
    })();
  </script>
</body>

</html>
