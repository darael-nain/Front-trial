    $(document).ready(function () {
      //business.search.business("");

    
        let starterdate=$("#dp-input").val();
    
        business.starter.list.charge(starterdate,"");
        
        $("#businessSearch").on("keyup", function () {

          var value = $(this).val().toLowerCase();
            
            if (value.length<1) {
             let target= $('datalist#bl');

              target.empty();
            }


               if (value.length >=1) {
                  business.search.business(value);
                  $("#businesslist div.business").filter(function () {
                    $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1)
                  });
              }
        });


         $("#businessSearch").on("change", function () {

          var value = $(this).val().toLowerCase();
            
              setTimeout(() => {
            $("#businesslist div.business").filter(function () {
                    $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1)
                  });
        }, 1000);
          
               
              
        });

        $("#dp-input").on("change", function () {

         
          var value = $(this).val();
          let listado = $('div#businesslist');

          listado.empty();
          business.starter.list.charge(value)
        });


       $(document).on('change', 'input#businessSearch', function(){
          
            var options = $('datalist')[0].options;
            for (var i=0;i<options.length;i++){


               if (options[i].value == $(this).val()) {
                let target=options[i];
                 // {alert($(this).val());break;}
                  business.search.selected.business(target);
                }
            }
        });
    



    });
  </script>
