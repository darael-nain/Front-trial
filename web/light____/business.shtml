       $("input#titleSearch").on("keyup", function () {
        
          var value = $(this).val().toLowerCase();
          let oldval=0;
        if (value.length==0) {
             let target= $('datalist#itemlist');

              target.empty();
        }

         if (value.length >=3 || value.length ==0) {
          

            business.search.items(value);
            $("#detalle-nv div.categoria").filter(function () {
              $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1)
            });
            // oldval=value.length;
         }

         
      });

       




       $(document).on('change', 'input#titleSearch', function(){
          
            var options = $('datalist')[0].options;
            if (options=="") {

            }else{

            }
            for (var i=0;i<options.length;i++){


               if (options[i].value == $(this).val()) {
                let target=options[i];
                 // {alert($(this).val());break;}
                  business.search.selected.item(target);
                }
            }
        });
    
    });
