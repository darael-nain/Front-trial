<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8"/>
    <link rel="stylesheet" href="/out/style.css"/>
        <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">

    <!-- Optional theme 
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap-theme.min.css" integrity="sha384-rHyoN1iRsVXV4nD0JutlnGaslCJuC7uwjduW9SVrLvRYooPp2bWYgmgJQIXwl/Sp" crossorigin="anonymous">
-->
     <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <!-- Include all compiled plugins (below), or include individual files as needed -->

    <!-- Latest compiled and minified JavaScript -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js" integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa" crossorigin="anonymous"></script>
    <title>REPORTES-UNABASE</title>
    <style>
       /* p{text-align:left;display:block!important; margin: 30px 0 0 40px;}
        label{font-weight:bold;font-size:12px} */
        table thead tr td{
            font-size: 10px!important;
        }
        table tfoot {
            font-size: 14px;
            font-weight: bold;
        }

        .bg-reporte{
            background-color:lightgray!important;
            font-weight:bold!important;
        }

        .box-ejecutivo{
            margin:5px;
            padding: 5px;
        }
            .box-ejecutivo h3{
                margin: 5px 25px;
                padding: 0px;
                text-align:left;
            }
            .box-ejecutivo td{
               text-transform: uppercase;
               padding:2px;
            }

        .left{
            text-align:left;
        }
        .right{
            text-align:right;
        }
        .center{
            text-align:center;
        }

        .line{
            border-bottom: 2px solid gray!important;
        }

        .reg{
            text-align: left;
            margin: 5px 5px 5px 25px;
            padding: 0px;
            font-size:12px;
        }

    </style>
</head>
<body>
<div class="contenedor" align="center">
 <div class="cuadro2">
   <div>
        <h4><!--#4DVAR v_Tit_Informe--></h4>
        <p><!--#4DVAR String(aReporteDesc)--></p>
    </div>
    <p><img src="<!--#4DVAR vUrlImagenLogo-->" width="<!--#4DVAR vAnchoPicture-->" height="<!--#4DVAR vAltoPicture-->" border="0"/></p>

<div class="row">
    <table class="totaleshead">  
        <tr>
            <td width="85%" class="title">TOTAL NETO</td>
            <td width="15%" class="text"><!--#4DVAR String(V_OCTotalNeto;"$ ###.###.###.##0")--></td>  
        </tr>
        <tr style="display:none">
            <td width="85%" class="title">TOTAL IMPUESTOS</td>
            <td width="15%" class="text"><!--#4DVAR String(V_OCTotalIMP;"$ ###.###.###.##0")--></td>  
        </tr>
        <tr style="display:none">
            <td width="85%" class="title">TOTAL OC</td>
            <td width="15%" class="text"><!--#4DVAR String(V_OCTotal;"$ ###.###.###.##0")--></td>  
        </tr>
        <tr>
            <td width="85%" class="title">TOTAL JUSTIFICADO</td>
            <td width="15%" class="text line"><!--#4DVAR String(V_OCTotalJusti;"$ ###.###.###.##0")--></td>  
        </tr>
        <tr>
            <td width="85%" class="title">TOTAL POR JUSTIFICAR</td>
            <td width="15%" class="text bold redtext"><!--#4DVAR String(V_OCTotalConsol;"$ ###.###.###.##0")--></td>  
        </tr>
        <tr>
            <td width="85%" class="title">TOTAL ABONO SIN JUSTIFICAR</td>
            <td width="15%" class="text redtext"><!--#4DVAR String(V_OCAbono;"$ ###.###.###.##0")--></td>  
        </tr>
    </table>

    <div class="totalreg">Total ordenes: <!--#4DVAR String(v_TotReg;"###.###.###.##0")--></div>

    <table class="table table-responsive table-bordered">
        <thead>
            <tr>
                <td class="center-c" width="1%">NRO.</td>
                <td class="center-c" width="3%">FECHA</td>
                <td class="center-c" width="5%">PROVEDOR</td>
                <td class="center-c" width="5%">TIPO DOC</td>
                <td class="center-c" width="2%">NETO</td>
                <td class="center-c" width="2%">EXENTO</td>
                <td class="center-c" width="2%">TOTAL</td>
                <td class="center-c" width="2%">ABONO</td>
                <td class="center-c" width="2%">JUSTIFICADO</td>
                <td class="center-c" width="2%">POR JUSTIFICAR</td>
                <td class="center-c" width="1%">ESTADO</td>
            </tr>
        </thead>
        <tbody>
        <!--#4DLOOP aFolioOcx_-->
            <tr>
                <td class="orden-alfa"><!--#4DTEXT aFolioOcx_{aFolioOcx_}--></td>
                <td class="items"><!--#4DTEXT aFechaOcx_{aFolioOcx_}--></td>
                <td class="items"><!--#4DTEXT Uppercase(arprovOcx_{aFolioOcx_};*)--></td>
                <td class="nro-items-cant left"><!--#4DTEXT aTipoOcx_{aFolioOcx_}--></td>
                <td class="nro-items-subtotal"><!--#4DTEXT  string(aNetoOcx_{aFolioOcx_};"$ ###.###.###.##0")--></td>
                <td class="nro-items-subtotal"><!--#4DTEXT  string(aEXENTOOcx_{aFolioOcx_};"$ ###.###.###.##0")--></td>
                <td class="nro-items-subtotal"><!--#4DTEXT  string(aTotalOcx_{aFolioOcx_};"$ ###.###.###.##0")--></td>
                <td class="nro-items-subtotal bg-reporte"><!--#4DTEXT String(a_monto_pagado{aFolioOcx_};"$ ###.###.###.##0")--></td>
                <td class="nro-items-subtotal bg-reporte"><!--#4DTEXT String(aTotJustifOcx_{aFolioOcx_};"$ ###.###.###.##0")--></td>    
                <td class="nro-items-subtotal bg-reporte"><!--#4DTEXT String(aSaldoConsoOcx_{aFolioOcx_};"$ ###.###.###.##0")--></td>
                <td class="nro-items-subtotal"><!--#4DTEXT aEstadoOcx_{aFolioOcx_}--></td>    
            </tr>
        <!--#4DENDLOOP-->
        </tbody>
    </table>
</div>

    <div class="contenedor-footer">
        <span class="datos-empresa-izq">
        <!--#4DTEXT nom_empresa--> / <!--#4DTEXT dir_empresa--> / <a target="_blank" href="<!--#4DTEXT sitio_empresa-->"><!--#4DTEXT sitio_empresa--></a></span><em></em>
    <span class="datos-empresa-der">Reporte enviado por <a href="http://www.unabase.cl" target="_blank" >UnaBase.cl</a></span>
    </div>

</div>
</div>
</body>
</html>
