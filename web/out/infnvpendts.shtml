<html>

    <!-- Latest compiled and minified JavaScript -->

    <script type="text/javascript" src="/out/report.js">

    <script type="text/javascript">
      
     // alert("ES REALMENTE IMPORTANTE QUE MANTENGAS ACTUALIZADO TU LISTA DE COTIZACIONES. ANULAR LAS NO APROBADAS Y PASAR A NEGOCIO LAS APROBADAS.");
    </script>

       <style>
      /*  p{text-align:left;display:block!important; margin: 30px 0 0 40px;}
        label{font-weight:bold;font-size:12px} */
        table thead tr td{
            font-size: 10px!important;
        }
        table tfoot {
            font-size: 14px;
            font-weight: bold;
        }

        .bg-reporte{
            background-color:lightgray!important;
            font-weight:bold!important;
        }

        .box-ejecutivo{
            margin:5px;
            padding: 5px;
        }
            .box-ejecutivo h3{
                margin: 5px 25px;
                padding: 0px;
                text-align:left;
            }
            .box-ejecutivo td{
               text-transform: uppercase;
               padding:2px;
            }

        .left{
            text-align:left;
        }
        .right{
            text-align:right;
        }
        .center{
            text-align:center;
        }

        .line{
            border-bottom: 2px solid gray!important;
        }

        .reg{
            text-align: left;
            margin: 5px 5px 5px 25px;
            padding: 0px;
            font-size:12px;
        }

        .negrita{
            font-weight:bold;
        }

    </style>


</head>
<body>
<div class="contenedor" align="center">
 <div class="cuadro2">
    <div style="float:left;width:60%;left:10px;vertical-align:top;">
        <div style="margin-left:20px;color:gray;font-size:11px;"><!--#4DTEXT nom_empresa--></div>
        <h4><!--#4DVAR v_Tit_Informe--></h4>
        <p>ACTUALIZA TU LISTA DE COTIZACIONES. ANULA LAS NO APROBADAS Y PASA A NEGOCIO LAS APROBADAS.</p>
    </div>
    <p style="vertical-align:top;"><img src="<!--#4DVAR vUrlImagenLogo-->" width="<!--#4DVAR vAnchoPicture-->" height="<!--#4DVAR vAltoPicture-->" border="0"/></p>

  <div class="row">
    <table class="totaleshead">  
        <tr>
          <td width="85%" class="title">TOTAL NETO</td>
          <td width="15%" class="text" style="font-weight:bold;"><!--#4DVAR _V3_formatCurrency(V_NCTOTAL)--></td>
       </tr>
    </table>

  <div class="totalreg">Total cotizaciones: <!--#4DVAR v_TotReg--></div>

  <table class="table table-responsive table-bordered" >
    <thead>
      <tr >
        <td class="center-c">Numero</td>
        <td class="center-c">Ejecutivo</td>
        <td class="center-c">Últ. Modificación</td>
        <td class="center-c">Días sin modificar</td>
        <td class="center-c">Cliente</td>
        <td class="center-c">Proyecto</td>
        <td class="center-c">Total Neto</td>
      </tr>
    </thead>
   	 <!--#4DLOOP aFolioNVx_-->           
     <tbody>
        <tr>
            <td class="orden-alfa"><!--#4DVAR aFolioNVx_{aFolioNVx_}--></td>
            <td class="items" style="text-align:center;"><!--#4DVAR aEjecutivo{aFolioNVx_}--></td>
            <td class="center cotfecha"><!--#4DVAR aFechaNVx_{aFolioNVx_}--></td>
            <td class="orden-alfa diasatras"><!--#4DVAR aCantidadDiasSinMod{aFolioNVx_}--></td>
            <td class="items" style="text-align:left;"><!--#4DVAR arprovNVx_{aFolioNVx_}--></td>
            <td class="nro-items-cant" style="text-align:left;"><!--#4DVAR aTipoNVx_{aFolioNVx_}--></td>
            <!--#4DIF aWorkingCurrency{aFolioNVx_}="USD"-->
              <td class="nro-items-subtotal"><!--#4DTEXT  String((aNetoNVx_{aFolioNVx_}/aValorCambioExchange{aFolioNVx_});"USD ###.###.###.##0,00")--></td>
            <!--#4DELSE-->
              <td class="nro-items-subtotal"><!--#4DVAR  _V3_formatCurrency(aNetoNVx_{aFolioNVx_})--></td>
            <!--#4DENDIF-->
        </tr> 
      </tbody>      
      <!--#4DENDLOOP--> 
  </table>
</div>
<div class="contenedor-footer">
	<span class="datos-empresa-izq">
    <!--#4DVAR nom_empresa--> / <!--#4DVAR dir_empresa--> / <a target="_blank" href="<!--#4DVAR sitio_empresa-->"><!--#4DVAR sitio_empresa--></a></span><em></em>
    <span class="datos-empresa-der">Reporte enviado por <a href="http://www.unabase.com" target="_blank" >unabase.com</a></span>
</div>


</div>
</div>
</body>
</html>
