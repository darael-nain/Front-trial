<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8"/>
    <link rel="stylesheet" href="/out/style.css"/>
    <title>REPORTES - UNABASE</title>
        <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">

    <!-- Optional theme 
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap-theme.min.css" integrity="sha384-rHyoN1iRsVXV4nD0JutlnGaslCJuC7uwjduW9SVrLvRYooPp2bWYgmgJQIXwl/Sp" crossorigin="anonymous">
-->
     <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <!-- Include all compiled plugins (below), or include individual files as needed -->

    <!-- Latest compiled and minified JavaScript -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js" integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa" crossorigin="anonymous"></script>
    <script type="text/javascript" src="/out/report.js"></script>

    <style>
        /*p{text-align:left;display:block!important; margin: 30px 0 0 40px;}
        label{font-weight:bold;font-size:12px} */      
    </style>

</head>
<body>
<div class="contenedor" align="center">
 <div class="cuadro2">
   <div>
        <h4><!--#4DVAR v_Tit_Informe--></h4>
        <p><!--#4DVAR String(aReporteDesc)--></p>
    </div>
    <p><img src="<!--#4DVAR vUrlImagenLogo-->" width="<!--#4DVAR vAnchoPicture-->" height="<!--#4DVAR vAltoPicture-->" border="0"/></p>

    <div class="row">

        <table class="totaleshead">  
            <tr>
                <td width="70%" class="title">
                    <div><label style="color:gray;font-weight:normal;">TOTAL</label><label style="margin-left:10px;font-size:15px;"><!--#4DHTML _V3_formatCurrency(V_OCTotal-v_sumTotalPresupGasto)--></label></div>
                </td>
            </tr>
            <tr>
                <td width="70%" class="title">
                    <div><label style="color:gray;font-weight:normal;">PAGADO</label><label style="margin-left:10px;border-bottom:1px solid gray;font-size:15px;"><!--#4DHTML _V3_formatCurrency(V_OCPagado-v_sumTotalpresupGastoAbono)--></label></div>
                </td>
            </tr>
            <tr>
                <td width="70%" class="title">
                    <div><label style="color:gray;">POR PAGAR</label><label style="margin-left:10px;font-size:15px;" class="redtext"><!--#4DHTML _V3_formatCurrency(V_OCSaldo-v_sumTotalPresupGastoSaldo)--></label></div>
                </td>
            </tr>
        </table>

        <div class="totalreg">TOTAL DE ORDEN DE COMPRA DE NEGOCIOS: <!--#4DTEXT v_TotReg-v_TotalPresupuestoGasto--></div>

        <table class="table table-responsive table-bordered" >
            <thead>
              <tr >
                <td class="center-c" width="1%">Número</td>
                <td class="center-c" width="5%">Fecha </td>
                <td class="center-c" width="15%">Proveedor/solicitante</td>
                <td class="center-c" width="10%">Referencia</td>
                <!--<td class="center-c" width="5%">Estado</td>-->
                <td class="center-c" width="5%">Forma de Pago </td>  
                <td class="center-c" width="5%">Total</td>
                <td class="center-c" width="5%">Pagado</td>
                <td class="center-c" width="5%">Por pagar</td>
              </tr>
            </thead> 
            <!--#4DLOOP aFolioOC-->
            <!--#4DIF Not(aPresupgasto{aFolioOC})-->      
            <tbody>    
                <tr>
                    <td class="orden-alfa"><!--#4DVAR aFolioOC{aFolioOC}--></td>
                    <td class="center" ><!--#4DVAR aFechaOC{aFolioOC}--></td>
                    <td class="items"><!--#4DVAR aProveedorOC{aFolioOC}--></td>
                    <td class="orden-alfa" style="text-align:left;"><!--#4DVAR aRefOC{aFolioOC}--></td>
                    <!--<td class="items"><!- -#4DVAR aEstadoOC{aFolioOC}- -></td>-->
                    <td class="items"><!--#4DVAR aFormaPagoOC{aFolioOC}--></td>
                    <td class="nro-items-subtotal"><!--#4DHTML _V3_formatCurrency(aTotalOC{aFolioOC})--></td>
                    <td class="nro-items-subtotal"><!--#4DHTML _V3_formatCurrency(aPagoOC{aFolioOC})--></td>
                    <td class="nro-items-subtotal"><!--#4DHTML _V3_formatCurrency(aSaldoOC{aFolioOC})--></td>
                </tr>       
            </tbody>
            <!--#4DENDIF-->
            <!--#4DENDLOOP--> 
        </table>
    </div>

    <div class="row">

        <table class="totaleshead">  
            <tr>
                <td width="70%" class="title">
                    <div><label style="color:gray;font-weight:normal;">TOTAL</label><label style="margin-left:10px;font-size:15px;"><!--#4DHTML _V3_formatCurrency(v_sumTotalPresupGasto)--></label></div>
                </td>
            </tr>
            <tr>
                <td width="70%" class="title">
                    <div><label style="color:gray;font-weight:normal;">PAGADO</label><label style="margin-left:10px;border-bottom:1px solid gray;font-size:15px;"><!--#4DHTML _V3_formatCurrency(v_sumTotalpresupGastoAbono)--></label></div>
                </td>
            </tr>
            <tr>
                <td width="70%" class="title">
                    <div><label style="color:gray;">POR PAGAR</label><label style="margin-left:10px;font-size:15px;" class="redtext"><!--#4DHTML _V3_formatCurrency(v_sumTotalPresupGastoSaldo)--></label></div>
                </td>
            </tr>
        </table>

        <div class="totalreg">TOTAL DE ORDEN DE COMPRA DE PRESUPUESTOS DE GASTOS: <!--#4DTEXT v_TotalPresupuestoGasto--></div>

        <table class="table table-responsive table-bordered" >
            <thead>
              <tr >
                <td class="center-c" width="1%">Número</td>
                <td class="center-c" width="5%">Fecha </td>
                <td class="center-c" width="15%">Proveedor/solicitante</td>
                <td class="center-c" width="10%">Referencia</td>
                <!--<td class="center-c" width="5%">Estado</td>-->
                <td class="center-c" width="5%">Forma de Pago </td>  
                <td class="center-c" width="5%">Total</td>
                <td class="center-c" width="5%">Pagado</td>
                <td class="center-c" width="5%">Por pagar</td>
              </tr>
            </thead> 
            <!--#4DLOOP aFolioOC-->
            <!--#4DIF (aPresupgasto{aFolioOC})-->      
            <tbody>    
                <tr>
                    <td class="orden-alfa"><!--#4DVAR aFolioOC{aFolioOC}--></td>
                    <td class="center" ><!--#4DVAR aFechaOC{aFolioOC}--></td>
                    <td class="items"><!--#4DVAR aProveedorOC{aFolioOC}--></td>
                    <td class="orden-alfa" style="text-align:left;"><!--#4DVAR aRefOC{aFolioOC}--></td>
                    <!--<td class="items"><!- -#4DVAR aEstadoOC{aFolioOC}- -></td>-->
                    <td class="items"><!--#4DVAR aFormaPagoOC{aFolioOC}--></td>
                    <td class="nro-items-subtotal"><!--#4DHTML _V3_formatCurrency(aTotalOC{aFolioOC})--></td>
                    <td class="nro-items-subtotal"><!--#4DHTML _V3_formatCurrency(aPagoOC{aFolioOC})--></td>
                    <td class="nro-items-subtotal"><!--#4DHTML _V3_formatCurrency(aSaldoOC{aFolioOC})--></td>
                </tr>       
            </tbody>
            <!--#4DENDIF-->
            <!--#4DENDLOOP--> 
        </table>
    </div>

    

    <div class="contenedor-footer">
        <span class="datos-empresa-izq">
        <!--#4DVAR nom_empresa--> / <!--#4DVAR dir_empresa--> / <a target="_blank" href="<!--#4DVAR sitio_empresa-->"><!--#4DVAR sitio_empresa--></a></span><em></em>
    <span class="datos-empresa-der">Reporte enviado por <a href="http://www.unabase.cl" target="_blank" >UnaBase.cl</a></span>
    </div>
</div>
</div>
</body>
</html>
