<div class="contenedor" align="center">
 <div class="cuadro2">

     	 <!--#4DLOOP aFolioRF_-->

    </tbody>        
        <!--#4DENDLOOP-->

        <!--#4DVAR nom_empresa--> / <!--#4DVAR dir_empresa--> / <a target="_blank" href="<!--#4DVAR sitio_empresa-->"><!--#4DVAR sitio_empresa--></a></span><em></em>
