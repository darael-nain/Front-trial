<body>
<div class="contenedor" align="center">
 <div class="cuadro2">
   <div>
        <h4><!--#4DVAR v_Tit_Informe--></h4>
        <!--<p><!- -#4DVAR String(aReporteDesc)- -></p>-->
        <p>Ordenadas de mayor a menor días de atraso.</p>
    </div>

    <p><img src="<!--#4DVAR vUrlImagenLogo-->" width="<!--#4DVAR vAnchoPicture-->" height="<!--#4DVAR vAltoPicture-->" border="0"/></p>



    <div class="row">
        <table class="totaleshead">  
                    <tr>
                        <td width="85%" class="title" style="font-weight:bold;">TOTAL NETO</td>
                        <td width="15%" class="text"><!--#4DVAR _V3_formatCurrency(V_NVTotal)--></td>  
                    </tr>
                    <tr>
                        <td width="85%" class="title" style="font-weight:bold;">TOTAL SALDO </td>
                        <td width="15%" class="text" style="font-weight:bold;"><!--#4DVAR _V3_formatCurrency(V_NVSaldo)--></td>  
                    </tr>    
        </table>


        <div class="totalreg">Total facturas: <!--#4DVAR v_TotReg--></div>

    <table class="table table-responsive table-bordered">
        <thead>
            <tr >
                <td class="center-c">Folio</td>
                <td class="center-c">Forma pago</td>
                <td class="center-c">Fecha Emision</td>
                <td class="center-c">F. Recepción</td>
                <td class="center-c">Fecha Vcto</td>
                <td class="center-c">Atraso</td>
                <!--<td class="center-c">Responsable</td>-->
                <td class="center-c">Cliente</td>
                <td class="center-c">Total Neto</td>
                <td class="center-c">Total <!--#4DVAR _V3_IVAName--></td>
                <td class="center-c">Total</td>
                <td class="center-c">Abono</td>
                <td class="center-c">Saldo</td>
                <!--<td class="center-c">Estado</td>-->
            </tr>
        </thead>
     	 <!--#4DLOOP aInfoFolio-->     
         <tbody>
            <tr>
                <td class="orden-alfa"><!--#4DVAR aInfoFolio{aInfoFolio}--></td>
                <td class="center"><!--#4DVAR aFormaPago{aFolioFacx_}--></td>
                <td class="center"><!--#4DVAR aInfoFechaEmision{aInfoFolio}--></td>
                <td class="center"><!--#4DVAR aFechaRecepcion{aFolioFacx_}--></td>
                <td class="center"><!--#4DVAR aFechaVcto{aInfoFolio}--></td>
                 <td class="center" style="color:red;"><!--#4DVAR aAtrasoFacx_Text{aInfoFolio}--></td>
                <!--<td class="items"><!- -#4DVAR aInfoResponsable{aInfoFolio}- -></td>-->
                <td class="nro-items-cant" style="text-align:left;text-transform:uppercase;"><!--#4DVAR aInfoCliente{aInfoFolio}--></td>
                <td class="nro-items-subtotal"><!--#4DVAR  _V3_formatCurrency(aInfoTotalNeto{aInfoFolio})--></td>
                <td class="nro-items-subtotal"><!--#4DVAR _V3_formatCurrency(aInfoTotalIva{aInfoFolio})--></td>    
                <td class="nro-items-subtotal"><!--#4DVAR _V3_formatCurrency(aInfoTotal{aInfoFolio})--></td>
                <td class="nro-items-subtotal"><!--#4DVAR _V3_formatCurrency(aInfoAbono{aInfoFolio})--></td>  
                <td class="nro-items-subtotal" style="font-weight:bold"><!--#4DVAR _V3_formatCurrency(aInfoSaldo{aInfoFolio})--></td>  
                <!--<td class="nro-items-subtotal"><!- -#4DVAR aInfoEstado{aInfoFolio}- -></td>-->
            </tr>   
        </tbody>          
        <!--#4DENDLOOP--> 
    </table>
</div>
