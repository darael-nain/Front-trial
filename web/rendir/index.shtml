	<title>Rendiciones</title>
	<script type="text/javascript">
		rendir.session.verify();
		rendir.navigate.init(true);
		rendir.navigate.current();


		$(document).ready(function () {
			let container = document.querySelector(".content");
			let localFilters;
			let filters;
			if (window.performance.navigation.type <= 1) {
				filters = { emitida: true, pagada: true };
				rendir.local.remove("filters");
			} else {
				localFilters = rendir.local.get("filters");
				filters = localFilters || { emitida: true, pagada: true };

			}
			rendir.get(container, filters);

			rendir.navbar.bottom.init(document.querySelector(".container.fxr"));


			// user button
			modal.create("userProfile");
			rendir.navbar.top.add({
				action: () => {

				},
				// classList: ["fas", "d-block", "fa-lg", "fa-arrow-left", "uGreen"],
				classList: ["far", "fa-user", "fa-lg"],
				dataset: {
					toggle: "modal",
					target: "#userProfile"
				},
				callback: () => {
					let user = rendir.user.get();
					modal.set({
						id: "userProfile",
						title: `Perfil ${user.name}`,
						body: `<ul class="list-group">
									  <li class="btn btn-light list-group-item align-items-center"><a class="anchor-no-style" href="/4DACTION/W_CERRAR_SESION/${user.session}"><span>Cerrar sesión</span> <i class="fas fa-power-off float-right fa-lg"></i></a></li>
									</ul>`,
						footer: ``,
						script: modal => {

						}
					})
				}
			});

			// back button
			modal.create("filters");
			rendir.navbar.bottom.add({
				action: () => {


				},
				classList: ["fas", "fa-2x", "fa-filter", "uGreen"],
				dataset: {
					toggle: "modal",
					target: "#filters"
				}
			});
			modal.set({
				id: "filters",
				title: "Filtrar",
				body: `<div class="input-group input-group-sm mb-3">
							<div class="input-group-prepend">
							    <span class="input-group-text" id="inputGroup-sizing-sm">Buscar</span>
							  </div>
							  <input type="text" class="m-right-10 form-control search" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-sm">
							  <i class="fas fa-eraser fa-2x eraseSearch"></i>
							</div>
							<div class="input-group mb-3 uFilters">
								<span class="children_inline">
								  <div class="input-group-prepend">
								    <div class="input-group-text">
								      <input type="checkbox" id="emitida" aria-label="Checkbox for following text input">
								    </div>
								  </div>
				    			<label class="input-group-text" for="emitida">Emitida</label>
									  <div class="input-group-prepend">
									    <div class="input-group-text">
									      <input type="checkbox" id="pagada" aria-label="Checkbox for following text input">
									    </div>
									  </div>
					    			<label class="input-group-text" for="pagada">Pagada</label>
								</span>

							</div>
							<div class="input-group mb-3 uFilters">
                  			<input  disabled type="text" class="m-right-10 form-control datepicker" id="fecha_emision" placeholder="Fecha emision">
						</div>`,
				footer: `
			        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cerrar</button>
			        <button type="button" class="btn white-text uBgGreen uBorderGreen btnFilter">Filtrar</button>`,
				script: modal => {
					let getFilters = () => {
						return {
							pagada: modal.querySelector("#pagada").checked,
							emitida: modal.querySelector("#emitida").checked,
							q: modal.querySelector(".search").value,
							year: modal.querySelector("#fecha_emision").dataset.year,
							month: modal.querySelector("#fecha_emision").dataset.month



						}
					}
					let search = () => {
						loading.start();
						rendir.empty();
						let filters = getFilters();
						rendir.get(container, filters);
						rendir.local.set(filters, "filters");
						$(modal).modal("hide");

						loading.stop();
					}
					let toggleFilters = state => {
						let uFilters = document.querySelectorAll("div.uFilters");
						uFilters.forEach(div => div.hidden = state);
					}
					modal.querySelector(".search").addEventListener("keypress", function (event) {
						if (event.keyCode == 13) {
							search();
						}

						toggleFilters(this !== "");
					});
					modal.querySelector(".eraseSearch").addEventListener("click", function (event) {
						modal.querySelector(".search").value = "";
						toggleFilters(false);
					});
					modal.querySelector(".btnFilter").addEventListener("click", function () {
						search();

					});
					$(modal).on('shown.bs.modal', function (e) {
						$("#fecha_emision").datepicker({
							changeMonth: true,
							changeYear: true,
							changeDate: false,
							showButtonPanel: true,
							showOn: "button",
							buttonImage: "css/calendar-alt-regular.svg",
							buttonImageOnly: true,
							buttonText: "Seleccionar fecha",
							dateFormat: 'mm yy',
							onClose: function (dateText, inst) {
								console.log(inst);
								$(this).datepicker('setDate', new Date(inst.selectedYear, inst.selectedMonth, 1));
								let month = inst.selectedMonth + 1;
								this.dataset.month = String(month).length === 1 ? `0${month}` : month;
								this.dataset.year = inst.selectedYear;
							},
							beforeShow: function (input, inst) {
								let div = inst.dpDiv[0];
								div.classList.add('uDatepicker');



							}
						});
						let localFilters = rendir.local.get("filters");
						if (localFilters) {
							modal.querySelector("#pagada").checked = localFilters.pagada;
							modal.querySelector("#emitida").checked = localFilters.emitida;
							modal.querySelector(".search").value = localFilters.q || "";
							if (localFilters.month) {
								modal.querySelector("#fecha_emision").dataset.month = String(localFilters.month).length === 1 ? `0${localFilters.month.length}` : localFilters.month;
								modal.querySelector("#fecha_emision").dataset.year = localFilters.year;

								document.querySelector("#fecha_emision").value = `${localFilters.month || ""} ${localFilters.year || ""}`;


							} else {
								modal.querySelector("#pagada").checked = true;
								modal.querySelector("#emitida").checked = true;

							}
						}
					});
				}
			})
		});
	</script>
