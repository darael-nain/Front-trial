<!DOCTYPE html>
<html>
  <head>
    <title>etiquetar</title>
    <meta charset="utf-8">

     <style type="text/css">
      #container-tags{
        font-size:11px!important;
        min-height:50px;
      }
      #container-tags ul{
        margin:3px;
        line-height: 16px;
        overflow-y: scroll;
        overflow-x: auto;
        width: 300px;
        max-height: 300px;
      }
      #container-tags ul > li{
        padding:2px;
      }
      #container-tags ul > li:hover{
        background:lightgray!important;
        cursor: pointer;
      }
      #container-tags ul > li > input{

      }
      #container-tags ul > li > span{
        display: inline-block!important;
        margin-left:3px;
        text-transform:none!important;
        vertical-align:middle;
        text-transform: uppercase!important;
      }
      #container-tags .search > label{
        display: block;
      }
      #container-tags input[type="checkbox"]{
        display: inline-block!important;
        vertical-align:middle;
        height:25px;
        width:25px;
      }
      #container-tags .actions{
        border-top:1px solid gray;
        text-align:center;
      }
       #container-tags .actions div{
        margin:5px;
      }
      #container-tags .actions div a{
        font-weight:bold;
        color:black;
      }
    </style>

    <script type="text/javascript">
        var ul = $('#container-tags > ul');

        var getSelectedTags = function(){
          return ul.find('li > input:checked');
        }

        var getSelectedContacts = function(){
          return $('.credencial > tbody > tr > td > div.chk > input:checked');
        }

        var clearSelected = function(){
          $('.credencial > tbody > tr > td > div.chk > input:not(:checked)').closest('tr').remove();
          setTimeout(function(){
            $('.credencial > tbody > tr > td > div.chk > input:checked').prop( "checked", false );
          }, 1000);
        }

        var applyTag = function(obj){
          
          var contacts = getSelectedContacts();
          var tags = [];
          var tag_add = "";

          if (obj) {
            tags.push(obj.id);
            tag_add = "<span>#"+ obj.name +"</span>";
          }else{
            getSelectedTags().each(function(key, item) {
              tags.push($(this).val());
              tag_add = tag_add + "<span>#"+ $(this).data('name') +"</span>";
            });
          }

          filter = "";
          for (var i = 0; i < tags.length; i++) {
              if (i < tags.length - 1) {
                filter+= tags[i] + '|';
              }
              else {
                filter+= tags[i];
              }
          }
          $('label.multiple button').data('value', filter);
          unaBase.toolbox.search._advancedSearch();

        };


        var restoreTag = function(){
            
          var filter = $('label.multiple button').data('value');
          tags = filter.split('|');
          ul.find('li:not(.select-all)').each(function(key, item) {
              
              var checkbox = $(item).find('input[type="checkbox"]');
              var name = String(checkbox.data('name'));
              if (tags.indexOf(name) != -1) {
                  checkbox.prop('checked', true);
              }
          });
        };

        // select tag from li or checkbox
        ul.on('click', 'li', function(event){
          if (event.target.tagName == "LI" || event.target.tagName == "SPAN") {
            var chk = $(this).find('input[type="checkbox"]');
            if (chk.prop('checked')) {
              chk.prop('checked', false);
            }else{
              chk.prop('checked', true);
            }
          }
          /*if (getSelectedTags().length > 0) {
            $('.actions a[data-action="apply"]').show();
          }else{
            $('.actions a[data-action="apply"]').hide();
            }*/
        });

        // apply only tag
        /*ul.on('dblclick', 'li', function(){
          var id = $(this).data('id');
          var name = $(this).data('name');
          applyTag({'id': id, 'name':name});
        });*/

        // apply tag
        // ul.on('click', 'li[data-applytag]', function(){
        $('.actions a[data-action="apply"]').click(function(){
          applyTag();
        });

        var get_tag = function(){
            var url = $.urlParam('datasource', $('label.multiple button').data('url'));
          $.ajax({
            url: '/4DACTION/_V3_' + url,
            dataType: 'json',
            data: {
                q: '@'
            },
            success: function(data) {
              var htmlObject;
              ul.find("*").remove();
              var cant = 0;

              htmlObject = $('<li class="select-all"><input type="checkbox"><span>&mdash;Seleccionar todo&mdash;</span></li>');
              htmlObject.find('input[type="checkbox"]').change(function(event) {
                  $(event.target).closest('ul').find('li:not(.select-all)').each(function(key, item) {
                      if ($(event.target).is(':checked')) {
                        $(item).find('input[type="checkbox"]').prop('checked', true);
                    } else {
                        $(item).find('input[type="checkbox"]').prop('checked', false);
                    }
                  });
              });
              ul.append(htmlObject);

              $.each(data.rows, function(key, item){
                if (item.tag_name != "") {
                    cant++;
                    htmlObject = $('<li data-id="'+ item.id +' data-name="'+ item.id +'"><input data-name="'+ item.id +'" type="checkbox" name="tags[tag_id]" value="'+ item.id +'"><span>'+ item.text +'</span></li>');
                    htmlObject.find('input[type="checkbox"]').change(function(event) {
                        var selectAll = $(event.target).closest('ul').find('li.select-all input[type="checkbox"]');
                        if (selectAll.is(':checked')) {
                            selectAll.prop('indeterminate', true);
                        }
                    });
                    ul.append(htmlObject);
                }
              });

              restoreTag();
              /*if (cant>0) {
                ul.append('<li><hr/></li>');
              }*/
              /*ul.append('<li data-applytag>Aplicar</li>');
              ul.append('<li data-newtag>Nueva etiqueta</li>');
              ul.find('li[data-applytag]').hide();*/
            }
          });
        }

        //  open new tag
        $('#container-tags .actions div a[data-action="new"]').click(function(){
            var htmlObject = $('<section> \
              <span>Ingresar un nuevo nombre de etiqueta:</span> \
              <input style="border-bottom:1px solid lightgray;width:300px;" type="text" name="tag[new_name]"> \
              </section>');

            htmlObject.find('input[name="tag[new_name]"]').on('change', function(){
              htmlObject.data('response', $(this).val());
            });

            htmlObject.find('button.show.motivo-anulacion').button({
              icons: {
                primary: 'ui-icon-carat-1-s'
              },
              text: false
            });

            prompt(htmlObject).done(function(data) {
              if (htmlObject.find('input[name="tag[new_name]"]').val()!="") {
                $.ajax({
                  url: '/4DACTION/_V3_setTag',
                  dataType: 'json',
                  data: {
                    'tag[name]': data
                  },
                  success: function(data) {
                    if (data.success) {
                      applyTag({'id': data.id, 'name': data.name});
                      toastr.success('Etiqueta se guardó exitosamente!');
                    }else {
                      if (data.opened) {
                        if (data.readonly)
                          toastr.error(NOTIFY.get('ERROR_RECORD_READONLY', 'Error'));
                      }
                    }
                  },
                  error: function(xhr, text, error) {
                    toastr.error(NOTIFY.get('ERROR_INTERNAL', 'Error'));
                  }
                });
              };
            });

        });

      $(document).ready(function() {
        get_tag();
       /* $('#container-tags input[name="tag[search]"]').on("change keyup",function(){
          get_tag();
        });*/

        //$('.actions a[data-action="apply"]').hide();
      });
    </script>
  </head>
  <body>
  <section id="container-tags">
    <div class="search">
      <label></label>
      <!--<input type="search" name="tag[search]">-->
    </div>
    <ul></ul>
    <div class="actions" style="height: 20px !important;">
      <div><a data-action="apply" href="#">Aplicar selección</a></div>
    </div>
  </section>
  </body>
</html>
