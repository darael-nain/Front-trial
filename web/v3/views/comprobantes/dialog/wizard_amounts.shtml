			let validarIngresoNroDocs = function(){
				let status = true;
				let rows = payout.container.find('table.step-2 tbody tr[data-show="True"]');
				$.each(rows, function(key, item){

					
					let doc = $(this).find('select[name="tipo_by_doc"]').val();
					let value = $(this).find('input[name="tipo_doc_numero"]').val();
					
					if ((doc != "CHEQUE" &&  doc != "") && value == "") {
						status = false;
						$(this).find('input[name="tipo_doc_numero"]').css('border', '2px solid red').focus();
					}
				});
				return status;
			}

						if(validarIngresoNroDocs()){

								if (data) {									
									var selected = $('#dtcporpagar table.step-2 tbody > tr');
									var pagos = {};
									var cont = 0;
									selected.each(function(key, item){
										cont++;
										var prov = $(this).data('prov');
										var dtc = $(this).data('dtc');
										var group = $(this).data('group');
										var monto = $(this).data('monto');
										var fecha = $(this).find('input[name="fecha"]').val();
										var tipo = $(this).find('select[name="tipo_by_doc"]').val();
										var pagara = $(this).find('input[name="pagara"]').val();
										var original = $(this).data('show');
										var nro = $(this).find('input[name="tipo_doc_numero"]').val();
										var ctacte = $('select[name="general_cta_cte"]').val();
										if (nro == "") {
											nro = 0;
										}
										var info = prov+"+"+dtc+"+"+group+"+"+monto+"+"+fecha+"+"+pagara+"+"+original+"+"+tipo+"+"+nro+"+"+ctacte;
										// eval("obj = { 'pago_"+ cont +"': '" + info + "' }");
								
										eval(`obj = { "pago_${cont}": "${info}" }`);
										$.extend(pagos, pagos, obj);
									});
									if (pagos) {							
										unaBase.ui.block();
										$.ajax({
											url: '/4DACTION/_V3_setOpsAgrupados',
											dataType: 'json',
											type: 'POST',
											data: pagos,
											success: function(data) {
												if (data.success) {
													toastr.success('Pagos generados con éxito.');


													if (data.ops.length == 1){
														unaBase.ui.unblock();
														$('.ui-dialog button[title="close"]').trigger('click');
														unaBase.loadInto.viewport('/v3/views/pagos/content2.shtml?id=' + data.ops[0].id);
													}else{
														
														payout.payments.showPagosCreados(data.ops,data.total);
														unaBase.ui.unblock();
													}
												}
											},
											error: function(e) {
												unaBase.ui.unblock();
												toastr.error('Ha ocurrido un error interno. Por favor comunicarse con soporte.');
												console.log(e);
											}
										});							
									}else{

									}
								}
							});

					var today = new Date();
					var dd = today.getDate();
					var mm = today.getMonth()+1; //January is 0!
					var yyyy = today.getFullYear();
					if(dd < 10){
				        dd ='0'+ dd;
				    }
				    if(mm < 10){
				        mm ='0'+ mm;
				    }
					return dd +'/'+ mm +'/'+ yyyy;
				}
