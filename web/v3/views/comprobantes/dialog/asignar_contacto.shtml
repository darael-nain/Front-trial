		<script>
			$(document).ready(function() {
				
				const id_detalle_comp = localStorage.getItem("id_detalle_comp")
				document.getElementById("contactos-por-asignar").dataset.iddetallecomp = id_detalle_comp;
				
				var containerdtc = $('#sheet-dtc');

				unaBase.toolbox.init();
				// Inicializamos un buscador
				var params = {
					// Función que genera una URL de listado JSON
					url: function() { return '/4DACTION/_light_get_contactos?page=1&results=100&q=' },
					entity: 'contactos',
					searchOff: true,
					/*data: {
						'idproveedor' : "<!--#4DTEXT idproveedor-->",
						'tipodtc' : "<!--#4DTEXT tipodtc-->",
						'totaljust': "<!--#4DTEXT totaljust-->"
					},*/
					row: {
						html: function(i, rows) {	

							
							//let folio; typeof data.rows[key].codigo != 'undefined') ? data.rows[key].codigo : ''



							return '<tr class="ocLine" data-id="' + rows[i].id + '" data-number="' + rows[i].numero + '" data-hasdtc="' + rows[i].hasDtc + '"  data-proveedor="' + rows[i].id_proveedor + '" data-doc="' + rows[i].id_tipo_doc + '">' + 
								'<td name="rut">' + (( rows[i].razon != '') ? rows[i].rut : 'No tiene rut')  + '</td>' +
								'<td name="razon">' + (( rows[i].razon != '') ? rows[i].razon : rows[i].nombre_completo) + '</td>' +
								'<td>' + (( rows[i].email != '') ? rows[i].email :"No tiene email") + '</td>' +
								//'<td class="left">' + rows[i].proveedor + '</td>' +
								'<td><input style="width:20px!important;height:20px!important" class="select" name="ocselect[id]'+rows[i].id+'" value="'+rows[i].id+'" type="checkbox" onchange="verifyCheck(event)"></td>' +						
							'</tr>'
						}
					},
					inflection: {
						singular: 'negocio',
						plural: 'negocios',
						none: 'ningún'
					},									
					// filters: [
						// { name: 'created_at', type: 'month', caption: 'Fecha de emisión', range: true, currentMonth: true},
						// { name: 'responsable', type: 'autocomplete', caption: 'Responsable', dataSource: 'getUsuario' },
						// { name: 'area_negocio', type: 'autocomplete', caption: 'Área de negocio', dataSource: 'getAreaNegocio' },
						
						// { name: 'por_negocio', type: 'autocomplete', caption: 'Por negocio', dataSource: 'getNegociosActivos' },
						// { name: 'tipo_doc', type: 'autocomplete', caption: 'Tipo Doc.', dataSource: 'getTiposDocDeVentas' },
						// { name: 'contabilizado', type: 'autocomplete', caption: '¿Contabilizado?', dataObject: [
						// 	{ id: false, text: 'Sin contabilizar' },
						// 	{ id: true, text: 'Contabilizado' },
						// ] },
						// { name: 'estado', type: 'autocomplete', caption: 'Estado del documento', dataObject: [
						// 	{ text: 'Por emitir', id: 'estado_por_emitir' },
						// 	{ text: 'Emitida', id: 'estado_emitida'},
						// 	{ text: 'Pagada', id: 'estado_pagado' },
						// 	{ text: 'Anulada', id: 'estado_anulada'}
						// ] },
						// { name: 'tiene_pago', type: 'autocomplete', caption: '¿Tiene Ingreso?', dataObject: [
						// 	{ id: 'true', text: 'CON INGRESO' },
						// 	{ id: 'false', text: 'SIN INGRESO' }
						// ]},
						// { name: 'por_cobrar', type: 'checkbox', caption: 'Por cobrar', options: [
						// 	{ caption: 'Por cobrar', name: 'por_cobrar', value: false },
						// ] },
						// { name: 'type_doc', type: 'autocomplete', caption: 'Tipo documento', dataObject: [
						// { id: "doc_dtc", text: 'Documento de compra'},	
						// { id: "doc_dtv", text: 'Documento de venta'}
							
					// 	]}
					// ]
				};

 
				unaBase.toolbox.search.init(params);

				unaBase.toolbox.menu.init({
					entity: 'contactos',
					buttons: ['searchOff', "assign_accounting_contact"]					  
				});


				// add selección
		    	$('button.addseleccionoc').button({icons: {primary: 'ui-icon-document'},text: true}).click(function(){		    		

		    		var element = $(this); 		
					var selectedoc = $('#compras-por-justificar > table > tbody').find('input.select:checked');
					var currentdtc = { "dtc[id]": '<!--#4DTEXT iddtc-->'};

					var ocselect = {};
					selectedoc.each(function(key, item) {			
						eval("obj = {'ocselect[id]"+ $(this).val() +"': '" + $(this).val() + "'}");
						$.extend(ocselect, ocselect, obj );
					});
					var finalobj = $.extend({}, currentdtc, ocselect);
					if (selectedoc.length > 0) {
						$.ajax({
							'url':'/4DACTION/_V3_getInfoComprasDtc',
							data: finalobj,
							dataType:'json',
							success: function(data) {
								
								containerdtc.find('input[name="dtc[referencia]"]').val(data.referencia);

								// tipo doc
								containerdtc.find('select[name="tipo_doc[id]"] > option[selected]').val(data.documento.id);
								containerdtc.find('select[name="tipo_doc[id]"] > option[selected]').text(data.documento.text);
								containerdtc.find('select[name="tipo_doc[id]"] > option[selected]').data('impuesto', data.documento.impuesto_valor);
								containerdtc.find('select[name="tipo_doc[id]"] > option[selected]').data('tipo', data.documento.impuesto_tipo);
								if (data.documento.especial) {							
									containerdtc.find('input[name="dtc[nro_folio]"]').val(data.documento.correlativo);
								}
								containerdtc.find('input[name="dtc[nro_folio]"]').focus();										

								// proveedor del doc
								containerdtc.find('input[name="contacto[info][id]"]').val(data.proveedor.id);
								containerdtc.find('input[name="contacto[info][alias]"]').val(data.proveedor.alias);
								containerdtc.find('input[name="contacto[info][razon_social]"]').val(data.proveedor.razon);
								containerdtc.find('input[name="contacto[info][rut]"]').val(unaBase.data.rut.format(data.proveedor.rut));
								containerdtc.find('input[name="contacto[info][giro]"]').val(data.proveedor.giro);
								element.parentTo('.ui-dialog-content').dialog('close');

								// forma pago del doc
								containerdtc.find('select[name="forma_pago[id]"] > option[selected]').val(data.forma.id);
								containerdtc.find('select[name="forma_pago[id]"] > option[selected]').text(data.forma.text);

								// carga ocs asociadas							
								var containeroc = containerdtc.find('table.ocs > tbody');     
		      					var htmlObject;
		  						containeroc.find("*").remove();
								$.each(data.compras, function(key, item){
									htmlObject = build_rows_compras(item);
									htmlObject.click(function(event){		 			
										if (event.srcElement.localName != 'input' && event.srcElement.className != 'ui-button-text')        
											unaBase.loadInto.viewport('/v3/views/compras/content.shtml?id=' + item.id);										
										//event.preventDefault();
										//event.stopPropagation();
									});
									containeroc.append(htmlObject);
								});
								$('button.remove.ocs').button({icons: {primary: 'ui-icon ui-icon-circle-minus'},text: true});			

								// carga items del doc
								var current = containerdtc.find('table.items > tbody');
								var currentTitulo;
								current.find("*").remove();
								
								if (data.detalle.length > 0) {
									containerdtc.find('table.items').show();
								}

								$.each(data.detalle, function(key, item){
									if (item.tipo=="TITULO"){
									  currentTitulo = get_detail.titulo('prependTo', current, item);
									}else{
									  var currentItem = containerdtc.find('table.items > tbody > tr[data-llave="'+item.llave_titulo+'"]');
									  if(item.llave_titulo == "") {
									    get_detail.item('prependTo', current, item);            
									  }else{
									    get_detail.item('insertAfter', currentItem, item);
									  }
									}
								});
								calcula_por_filas();
								update_subtotal_items();

								// otros ajustes
								containerdtc.find('#scrollocs h1 span').text(data.compras.length);
								containerdtc.find('.montos-justificados').hide();														

							},
							error: function(data) {
								toastr.error(NOTIFY.get('ERROR_INTERNAL'));
							}
						});
					}else{
						alert("Debe seleccionar al menos una Orden de compra.");
					}
				});

				$(`tr.ocLine input.select[type="checkbox"]`).on("change", function(){
					console.log(this);
					let th = this;
				});

				// Manejar la selección de contactos
				$(document).on('click', 'tr.ocLine', function() {
					// Deseleccionar todos los checkboxes
					$('tr.ocLine input.select').prop('checked', false);
					// Seleccionar el checkbox de la fila clickeada
					$(this).find('input.select').prop('checked', true);
				});

				// Función para asignar contacto - sobrescribe la función original
				window.assignContact = function() {
					let checkId = $("#dialog-viewport input[type=checkbox]:checked").val();
					if (!checkId) {
						alert('Debe seleccionar un contacto');
						return;
					}
					
					// Obtener datos del contacto seleccionado
					let contactRow = $(`#dialog-viewport tr[data-id="${checkId}"]`);
					let rut = contactRow.find('td[name="rut"]').text();
					let razon = contactRow.find('td[name="razon"]').text();
					
					// Actualizar el contacto seleccionado
					if (typeof window.updateSelectedContact === 'function') {
						window.updateSelectedContact({
							id: checkId,
							rut: rut,
							nombre: razon
						});
					}
					
					// Cerrar el diálogo
					$('div.ui-dialog button.ui-dialog-titlebar-close').click();
					
					// Mostrar mensaje de éxito
					if (typeof toastr !== 'undefined') {
						toastr.success("Se asignó correctamente!");
					}
				};

				// Sobrescribir la función original de unaBase
				if (typeof unaBase !== 'undefined' && unaBase.toolbox && unaBase.toolbox.menu) {
					// Interceptar la función assign_accounting_contact
					$(document).on('click', 'button[data-name="assign_accounting_contact"]', function() {
						window.assignContact();
						return false; // Prevenir que se ejecute la función original
					});
				}

			});
		</script>
	</head>
	<body>		
		<section id="contactos-por-asignar" class="sheet" data-iddetallecomp="">
			<table class="results">
				<thead>
					<tr>
						<th width="17%">Rut</th>
						<th width="40%">Razón Social</th>
						<th width="20%">Email</th>
						<th width="3%">Seleccionar</th>						
					</tr>
				</thead>
				<tbody></tbody>
				<tfoot></tfoot>
			</table>
		</section>
	</body>
</html>
