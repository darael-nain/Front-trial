	<link href='/v3/script/jquery/plugins/fullcalendar-1.6.4/fullcalendar/fullcalendar.css' rel='stylesheet' />
	<link href='/v3/script/jquery/plugins/fullcalendar-1.6.4/fullcalendar/fullcalendar.print.css' rel='stylesheet' media='print' />
	<script src="/v3/script/jquery/jquery.js"></script>
	<script src="/v3/script/jquery/plugins/jquery-ui/js/jquery-ui.js"></script> 
	<script src="/v3/script/jquery/plugins/fullcalendar-1.6.4/fullcalendar/fullcalendar.min.js"></script>

<script>

	$(document).ready(function() {	
		/*var date = new Date();
		var d = date.getDate();
		var m = date.getMonth();
		var y = date.getFullYear();*/
		$('.calendar-icon').button({icons:{primary:"ui-icon-calendar"}},{text:true});
		$('#calendar').fullCalendar({
			header: {
				left: 'prev,next today',
				center: 'title',
				right: 'month,agendaWeek,agendaDay'
			},			
			buttonText: {today:'Hoy',month:'Mensual', week:'Semanal',day:'Diario'},
		    dayNames:['Domingo', 'Lunes', 'Martes', 'Miércoles','Jueves', 'Viernes', 'Sabado'],
		    dayNamesShort:['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'],
		    monthNames:['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio','Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'],
		    monthNamesShort:['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun','Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'],
			editable: false,
			agenda: 'h:mm{ - h:mm}',			
			allDayText:'Todo el día',
			timeFormat: 'H:mm{ - H:mm}',
			axisFormat:'H(:mm)tt',
			events: {		      
		        url: '/4DACTION/_V3_get_planned_ot',
		        type: 'POST',		     
		        data: {
		        	type: 'calendar',
		        	format_fecha:'yyyy-mm-dd',
		            custom_param1: 'something',
		            custom_param2: 'somethingelse'
		        },
		        error: function() {		       
		            alert('OCURRIO UN ERROR AL CARGAR LOS DATOS, INTENTE NUEVAMENTE!');
		        }
		    },
		    eventClick: function(event) {
		        if (event.url) {
		            window.open(event.url);
		            return false;
		        }
    		}	
		});

	});

</script>
