<!DOCTYPE html>

<html>
	<head>
		<title>Proyectos</title>
		<meta charset="utf-8">
		<script type="text/javascript" src="/v3/views/proyectos/content.js"></script>
		<link rel="stylesheet" href="/v3/design/temporal.css?<!--#4DTEXT random-->">
		<script>

			/* Proyecto */

			var contentLoaded = false;
			var contentChanged = false;
			var contentReady = false;

			var summaryNegocioData = {};

			$(document).ready(function() {

				if ($('#main-container').data('closed')) {
					$('[data-name="open_compras_negocio"]').hide();
					$('[data-name="convert_cotizacion"]').hide();
				}

				$('#tabs-1').load('/v3/views/proyectos/general.shtml', 'id=<!--#4DVAR [Proyectos_V3]id-->');


				$('a[href="#tabs-1"]').click(function() {
					unaBase.interval.clearAll();
				}).trigger('click');


				$('a[href="#tabs-2"]').click(function() {
					unaBase.interval.clearAll();
					$("#tabs-2").load('/v3/views/proyectos/cotizaciones.shtml', 'id=<!--#4DVAR [Proyectos_V3]id-->');
				});

				$('a[href="#tabs-3"]').click(function() {
					unaBase.interval.clearAll();
					$("#tabs-3").load('/v3/views/proyectos/negocios.shtml', 'id=<!--#4DVAR [Proyectos_V3]id-->');
				});

				$('a[href="#tabs-4"]').click(function() {
					unaBase.interval.clearAll();
					$("#tabs-4").load('/v3/views/proyectos/ots.shtml', 'id=<!--#4DVAR [Proyectos_V3]id-->');
					// $("#tabs-4").load('/v3/views/proyectos/ots.shtml', 'id=<!--#4DVAR [Proyectos_V3]id-->');
				});



			});


		</script>
