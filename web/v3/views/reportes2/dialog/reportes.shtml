<!DOCTYPE html>
<html>
	<head>
		<title>REPORTES</title>
		<meta charset="utf-8">
		<script>

			$(document).ready(function() {


				unaBase.toolbox.init();

				// Inicializamos un buscador
				var params = {
					// Función que genera una URL de listado JSON
					url: function() { return '/4DACTION/api_reportes' },
					entity: 'api_reportes',
					callback : function(){

					var selectedMenu = $('html > body.menu.home > aside > div > div > ul > li.active').data('name');
					var modulo = (typeof selectedMenu != 'undefined')? selectedMenu.toUpperCase() : '';
					// 
			
						//$('table').fixedHeaderTable({ footer: true, cloneHeadToFoot: false, fixedColumn: false });
					},
					// Función que genera cada fila de la tabla, dado el valor de i (índice de posición)
					// y el valor de rows (array con todos los resultados)
					// El contenido de rows corresponde al objeto de mismo nombre generado mediante la llamada
					// a la api JSON. Ver /v3/json/get_cotizacion.shtml para conocer el formato.
					row: {
						html: function(i, rows) {
							var act;
							var envia="";
							//verifica si esta activo y guarda un checkbox activo o inactivo segun sea el caso			
								//verifica si esta activo y guarda un checkbox activo o inactivo segun sea el caso
							if(rows[i].estado === true){
								act = '<span>Si</span>';
							}else{
								act = '<span>No</span>';
							}
							
							// if(rows[i].enviara.length>1){
							// 	envia = " Para: "+ rows[i].enviara + "<br>";
							// }
							// if(rows[i].copiara.length>1){
							// 	envia += " Cc: "+ rows[i].copiara;
							// }

							// 	envia += " y " + rows[i].totalUsuarios + "+";
							// }else if(rows[i].totalUsuarios>0){
							// 	envia = rows[i].totalUsuarios;
							// }

							envia = rows[i].totalUsuarios;



							var htmlData = '';
								htmlData = '<tr data-id="' + rows[i].id + '">' +
									'<td colspan="3" style="text-align: left; padding-left: 5px">' + rows[i].descripcion + '</td>' +
									'<td class="modulo" data-modulo="'+rows[i].origen +'">' + rows[i].origen + '</td>' +
									'<td>' + rows[i].periocidad + '</td>' +
									'<td>' + rows[i].hora + '</td>' +
									'<td>' + envia + '</td>' +
									'<td>' + act	+ '</td>' +				
								'</tr>';
							return htmlData;
						}
					},


					detail: {
						url: function(id) { return '/v3/views/reportes2/content.shtml?id=' + id},
						iframe: false
					},
					// Inflexiones
					inflection: {
						singular: 'regla',
						plural: 'reglas',
						none: 'ninguna'
					},
					// Filtros
					filters: [
						
					/*	{ name: 'created_at', type: 'month', caption: 'Fecha de creación', range: true },*/
						//{ name: 'updated_at', type: 'month', caption: 'Fecha últ. modificación', range: true },

						// con jquery ui autocomplete
						/*{ name: 'area_negocio', type: 'autocomplete', caption: 'Área de negocio', dataSource: 'getAreaNegocio' },

						// 	{ caption: 'inactivo', name: 'inactivo', value: false }
						// ] },

							{ text: 'Ordenes de trabajo', id: "ot" },
							{ text: 'Rendiciones', id: "rendiciones" },
							{ text: 'Cotización', id: "cotizaciones" },
							{ text: 'Negocios', id: "negocios" },
							{ text: 'Timesheet', id: "timesheet" },
							{ text: 'Cobranza', id: "cobranza" },
							{ text: 'Gastos', id: "gastos" },
							{ text: 'Usuarios', id: "usuarios" },
							{ text: 'Dtc', id: "dtc" },
							{ text: 'Dtv', id: "dtv" }

				unaBase.toolbox.search.init(params);
				unaBase.toolbox.menu.init({

	</head>
	<body>

			<div class='maintitle'>

			</div>
		  <select name="modulo">

			  <option value="cotizaciones">cotizaciones</option>
			  <option value="negocios">negocios</option>
			  <option value="timesheet">timesheet</option>
			  <option value="cobranza">cobranza</option>
			  <option value="gastos">gastos</option>
			  <option value="usuarios">usuarios</option>
			  <option value="dtc">dtc</option>
			  <option value="dtv">dtv</option>
		</select>
		<!-- Maqueta de la tabla que contendrá los resultados de búsqueda -->

			<thead>
				<tr>
					<th colspan="3" >Nombre del reporte</th>

					<th>Destinatarios</th>

					<th>Habilitado</th>			
				</tr>

</html>
