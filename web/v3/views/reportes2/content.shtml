    	<script type="text/javascript">

    	// REMUEVE EL USUARIO ASIGNADO AL REPORTE
    	function del_usuario_asignado(login){
			$.ajax({
			    url: '/4DACTION/_V3_del_usuario_asignado',
			    dataType: 'json',
			    data: {
			    	'id_reporte': reportes.id,
			    	'login': login,			    	
			    	'delete': true
			    },
			    async: false,
			    success: function(data) {
			    	var login = $('[data-login='+login+']');
				    // login.hide();
				    get_users();
			    	

				},
				error: function() {
					alert("No se puede eliminar el usuario asignado");
				}
			});
			
		}


		


		function get_users(){
			$('tbody[name=usuario_asignado]').empty();

				$.ajax({
			    url: '/4DACTION/_v3_getUsuarioAsignado',
			    dataType: 'json',
			    data: {
			      'id': reportes.id
			    },
			    async: false,
			    success: function(data) {
				    for (var i = 0; i < data.rows.length; i++){
				    	var login = data.rows[i].login;
				    	// var fnt = del_usuario_asignado(login);

				    	var trObj = $('<tr ><td data-login="'+login+'"  >'+ data.rows[i].nombre +'</button></td><td   >'+ data.rows[i].mail +'</td><td   >'+ data.rows[i].cargo +'</td><td ><button   title="Remover usuario asignado al reporte" onclick=del_usuario_asignado("'+login+'") >Quitar</button></td></tr>');

				    	$('[name="usuario_asignado"]').append(trObj);

				    	trObj.find('button:first').button({icons: { primary: 'ui-icon-minus'}, text: false });

				    }
				}
			});		

		}
		
		$(document).ready(function(){
			get_users();




				//botton de asociar usuario
 				var addButton = $('.show.user');

			// al hacer click vuelve el campo search un autocomplete
				addButton.button({icons: { primary: 'ui-icon-triangle-1-s'}, text: false }).click(function() {
					$('input[name="select_user"]').autocomplete('search', '@').focus();
				});
				// activa boton de jquery ui
 				// addButton.button({icons: { primary: 'ui-icon-caret-1-s'}, text: false });

			//devuelve todos los usuarios
			if ($('input[name="select_user"]').length > 0)
					$('input[name="select_user"]').autocomplete({
						source: function(request, response) {
							$.ajax({
								url: '/4DACTION/_V3_getUsuario2?q2=&estado_activo=true',
								dataType: 'json',
								data: {										
								},
								success: function(data) {
									response($.map(data.rows, function(item) {
										return item;
									}));
								}
							});
						},
						minLength: 0,
						autoFocus: true,
						delay: 5,
						position: { my: "left top", at: "left bottom", collision: "flip" },
						open: function() {
							$(this).removeClass('ui-corner-all').addClass('ui-corner-top');
						},
						close: function() {
							$(this).removeClass('ui-corner-top').addClass('ui-corner-all');
						},
						focus: function(event, ui) {
							//$(this).val(ui.item.text);
							return false;
						},
						response: function(event, ui) {
						},
						select: function(event, ui) {
							$.ajax({
						        'url':'/4DACTION/_V3_set_usuario_asignado',
						        data:{
						          "id_reporte" : reportes.id,
						          "login" : ui.item.login,
						          "create_usuario_asignado" : true,
						          'delete': false
						        },
						        dataType:'json',
						        async: false,
						        success:function(data){
						        	get_users();
						        }
					      	});
							get_users();
							return false;
						}

					}).data('ui-autocomplete')._renderItem = function(ul, item) {
						return $('<li><a><strong class="highlight">' +  item.nombres +" "+item.ape_paterno +   '</strong><em>' + item.cargo + '</em><span>' + item.email + '</span></a></li>').appendTo(ul);
					};

			});

    	</script>

	<body>
		<section class="sheet" id="reportes" data-id="<!--#4DTEXT id-->">
			<footer>

						<li><span class="sg-input-title">Nombre</span> <span><input disabled type="text" class="form-control rise" name="descripcion" ></span></li>

						<!-- <li><span class="sg-input-title">Origen</span> <span><input type="text" class="form-control rise" name="origen" ></span></li> -->
						<!-- <li><span class="sg-input-title">Periocidad</span> <span><input type="text" class="form-control rise" name="periocidad" ></span></li> -->

						<li><span class="sg-input-title">Cc </span> <span><input type="email" class="form-control rise" name="copiara" ></span></li>
					    <li class="li">
			              <span class="sg-input-title">Periocidad

			              </span><br>
			              
			                <select name="periocidad"  >
			                    <option selected>Seleccionar</option>

			                    <option value="2">TODOS LOS VIERNES</option>
			                    <option value="3">TODOS LOS LUNES</option>
			                    <option value="4">MENSUAL (PRIMER LUNES)</option>
			                </select>
			            </li>

					</ul>
				</article>
				
				<article>

						<button  class="show user"></button>
					</div>

								<th >Usuario</th>

								<th >Cargo</th>

							</tr>
						</thead>
