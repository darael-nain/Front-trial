		<script>
			$(document).ready(function() {
				var container = $('#form-detalle-servicios');
				$(".tabs_servicios").tabs();

					unaBase.interval.clearAll();

				});

				<!--4DIF tipo_="ventas"-->
				container.find('a[href="#tabs-2"]').click(function() {

					container.find("#tabs-2").load('/v3/views/servicios/ventas.shtml', 'id=<!--#4DTEXT id-->');
				}).trigger('click');
				<!--4DENDIF-->
				
				<!--4DIF tipo_="compras"-->

					container.find("#tabs-3").load('/v3/views/servicios/compras.shtml', 'id=<!--#4DTEXT id-->');

				container.find('a[href="#tabs-4"]').click(function() {
					unaBase.interval.clearAll();
					container.find("#tabs-4").parentTo('section').find('article').empty();
					container.find("#tabs-4").load('/v3/views/servicios/fxr.shtml', 'id=<!--#4DTEXT id-->');
				});
