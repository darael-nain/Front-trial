			var validatePassword = () => {				
				var currentPassword = $('input[name="perfil[password_actual]"]').val();
				var newPassword = $('input[name="perfil[password_nueva]"]').val();
				var confirmPassword = $('input[name="perfil[password_confirmacion]"]').val();
				if ((currentPassword=="" || currentPassword==undefined) && (newPassword=="" || newPassword==undefined) && (confirmPassword=="" || confirmPassword==undefined)) {
					return false;
				}else{
					if (currentPassword=="" || newPassword=="" || confirmPassword=="") {
						toastr.error('Faltan datos para poder cambiar la contraseña.');
						return false;
					}else{
						if (newPassword.length<8 ) {
							toastr.error('Debes ingresar mínimo 8 caracteres para la nueva contraseña.');
							return false;
						}else if(newPassword.match(/\D+/g)==null || newPassword.match(/\d+/g)==null   ){
							toastr.error('La contraseña debe contener letras y números.');
							return false;	
						}else{
							if (newPassword!=confirmPassword) {
								toastr.error('Las contraseñas no coinciden.');
								return false;
							}
						}
					}
				}
				return true;	
			}
			var changePassword = function(event){
				event.preventDefault();
				let form = document.forms["changePassword"].getElementsByTagName("input");
				let data = {};
				for(let i = 0; i < form.length; i++) { 
					data[form[i].name] =  form[i].value;
				}
				if(validatePassword()){
					$.ajax({
						url: '/4DACTION/_V3_setUsuario',
						data,
						dataType: 'json',
						type: 'GET',
						success: function(data) {
							if (data.success && data.pass) {
								toastr.success(NOTIFY.get('SUCCESS_SAVE'));
								window.onbeforeunload = undefined;
								window.location.reload();
								// $('form#changePassword').closest('div.ui-dialog.ui-widget').remove();

							}else if(!data.pass){
								toastr.error('Contraseña incorrecta.');
							}else{
								toastr.error(NOTIFY.get('ERROR_RECORD_READONLY', 'Error'));
							}
						},
						error: function(data) {
							toastr.error(NOTIFY.get('ERROR_INTERNAL'));
						}
					});

				}

			}
