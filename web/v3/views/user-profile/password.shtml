<!DOCTYPE html>
<html>
	<head>
		<!--#4DSCRIPT/_V3_proxy_getUsuarioContent-->
		<title>General</title>
		<meta charset="utf-8">
		<script>
			$(document).ready(function() {				
				/*$('.get').click(function(){
					toastr.success('Tu contraseña ha sido enviada a tu correo.');
					return false;
				});*/
				let isValid = function(){

						var currentPassword = $('input[name="perfil[password_actual]"]').val();
						var newPassword = $('input[name="perfil[password_nueva]"]').val();
						var confirmPassword = $('input[name="perfil[password_confirmacion]"]').val();
						if ((currentPassword=="" || currentPassword==undefined) && (newPassword=="" || newPassword==undefined) && (confirmPassword=="" || confirmPassword==undefined)) {
							return false;
						}else{
							if (currentPassword=="" || newPassword=="" || confirmPassword=="") {
								toastr.error('Faltan datos para poder cambiar la contraseña.');
								return false;
							}else{
								if (newPassword.length<8 ) {
									toastr.error('Debe ingresar mínimo 8 caracteres para la nueva contraseña.');
									return false;
								}else if(newPassword.match(/\D+/g)==null || newPassword.match(/\d+/g)==null   ){
									toastr.error('La contraseña debe contener letras y números.');
									return false;	
								}								else{
									if (newPassword!=confirmPassword) {
										toastr.error('Las contraseñas no coinciden.');
										return false;
									}
								}
							}
						}
						return true;	
				}
				// var reiniciarbtn = $('input[name="reiniciar"]').detach();

				// reiniciarbtn.insertAfter('li[data-name="save"]');
				document.getElementById('changePassword').addEventListener('click', function(){
					if(isValid()){


						$.ajax({
							url: '/4DACTION/_V3_setUsuario',
							type: 'POST',
							dataType: 'json',
							data: {
								'id': currentUser.username,
								'perfil[password_actual]': $('input[name="perfil[password_actual]"]').val(),
								'perfil[password_nueva]': $('input[name="perfil[password_nueva]"]').val(),
								'perfil[password_confirmacion]': $('input[name="perfil[password_confirmacion]"]').val()
								
								
							},
							async: false // para poder hacer el save correctamente y esperar la respuesta
						}).done(function(data) {

							if (data.success && data.pass) {
								toastr.success(NOTIFY.get('SUCCESS_SAVE'));
								$('input[name="perfil[password_actual]"]').val("");
								$('input[name="perfil[password_nueva]"]').val("");
								$('input[name="perfil[password_confirmacion]"]').val("");
								$('.ui-dialog button[title="close"]').trigger('click');
							}else{
								if (!data.pass) {
									toastr.error(NOTIFY.get('ERROR_RECORD_READONLY', 'Error'));
									toastr.error("La contraseña ingresada es incorrecta.");
									$('input[name="perfil[password_actual]"]').val("").focus();
									$('input[name="perfil[password_nueva]"]').val("");
									$('input[name="perfil[password_confirmacion]"]').val("");
								}else{
									toastr.error(NOTIFY.get('ERROR_INTERNAL'));
								}
							}
							unaBase.ui.unblock();


						});
					}
				})
			});
			$('input[name="reiniciar"]').on('click', function(){

			unaBase.loadInto.dialog('/v3/views/user-profile/restartPassword.shtml', 'Reiniciar contraseña', 'large');					
			}).button({
					icons: {
						primary: 'ui-icon-alert'
					}
				});
		</script>
		<style type="text/css">
			/*
    		section fieldset p{
	          color: #04a76b;
	          font-weight: bold;
	          margin-left: 4em;
	          text-decoration: underline;
	          cursor: pointer;
    		}*/
		</style>
	</head>
	<body>
		<section>
			<fieldset>
				<!--<legend>Cambia tu contraseña, o recupera la actual.</legend>-->
					<legend>Cambia tu contraseña</legend>
					<label>
						<span>Contraseña actual</span>
						<input type="password" name="perfil[password_actual]" value="">
					</label><br><br><br>
					<!--<a class="get" style="color:blue" href="#">¿Olvidaste tu contraseña?</a><br><br><br>-->
					<label>
						<span>Nueva contraseña</span>
						<input type="password" name="perfil[password_nueva]" value="">
						<span style="margin:2px">(mínimo 8 caracteres, letras y números)</span>
					</label><br>
					<label>
						<span>Verificar contraseña</span>
						<input type="password" name="perfil[password_confirmacion]" value="">
					</label>
					<br/>
					<br/>
					<button id="changePassword" class="ui-button ui-widget ui-state-default ui-corner-all ui-button-text-icon-primary" role="button" aria-disabled="false"><span class="ui-button-icon-primary ui-icon ui-icon ui-icon-locked"></span><span class="ui-button-text">Cambiar contraseña</span></button>
			</fielset>

		<!-- 	<fieldset>				
					<input type="button" name="reiniciar" value="Reiniciar Contraseña">

					<p class="passwordLost">¿Olvidaste tu contraseña?</p>
			</fieldset> -->
		</section>
	</body>
</html>
