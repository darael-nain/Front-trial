<!DOCTYPE html>
<html>
	<head>
		<!--#4DSCRIPT/_V3_random_access-->
		<title>Perfil de Usuario</title>
		<meta charset="utf-8">
    <script src="/seguridad/js/passwordRecovery.js"></script>
		<script>		
			var validatePassword = () => {				
				var currentPassword = $('input[name="perfil[password_actual]"]').val();
				var newPassword = $('input[name="perfil[password_nueva]"]').val();
				var confirmPassword = $('input[name="perfil[password_confirmacion]"]').val();
				if ((currentPassword=="" || currentPassword==undefined) && (newPassword=="" || newPassword==undefined) && (confirmPassword=="" || confirmPassword==undefined)) {
					return false;
				}else{
					if (currentPassword=="" || newPassword=="" || confirmPassword=="") {
						toastr.error('Faltan datos para poder cambiar la contraseña.');
						return false;
					}else{
						if (newPassword.length<8 ) {
							toastr.error('Debes ingresar mínimo 8 caracteres para la nueva contraseña.');
							return false;
						}else if(newPassword.match(/\D+/g)==null || newPassword.match(/\d+/g)==null   ){
							toastr.error('La contraseña debe contener letras y números.');
							return false;	
						}else{
							if (newPassword!=confirmPassword) {
								toastr.error('Las contraseñas no coinciden.');
								return false;
							}
						}
					}
				}
				return true;	
			}
			var changePassword = function(event){
				event.preventDefault();
				let form = document.forms["changePassword"].getElementsByTagName("input");
				let data = {};
				for(let i = 0; i < form.length; i++) { 
					data[form[i].name] =  form[i].value;
				}
				if(validatePassword()){
					$.ajax({
						url: '/4DACTION/_V3_setUsuario',
						data,
						dataType: 'json',
						type: 'POST',
						success: function(data) {
							if (data.success && data.pass) {
								toastr.success(NOTIFY.get('SUCCESS_SAVE'));

								$('form#changePassword').closest('div.ui-dialog.ui-widget').remove();

							}else if(!data.pass){
								toastr.error('Contraseña incorrecta.');
							}else{
								toastr.error(NOTIFY.get('ERROR_RECORD_READONLY', 'Error'));
							}
						},
						error: function(data) {
							toastr.error(NOTIFY.get('ERROR_INTERNAL'));
						}
					});

				}

			}
			$(document).ready(function() {
					// $('section.tabs').tabs();
					$('input[name="id"]').val(currentUser.username);
			


			});

			$('#restart').on('click', function(){

					// $.ajax({
					//   url: '/4DACTION/_V3_SetRandomPassword',
					//   data: {
					//   	'fromLogin': false
					//   },
					//   async:false,
					//   dataType: 'json',
					//   success: function(data) {
					// 	toastr.success('Contraseña reiniciada, verifica tu correo electrónico');
					//   }
					// });
				});

		

		</script>
		<style>
			.ui-tabs .ui-tabs-panel {
				padding: 0 !important;
				overflow: hidden;
			}
			body section fieldset p {
				font-size: 14px;
				font-weight: bold;
				padding: 5px;
			}
			#restart{

	          color: #04a76b;
	          font-weight: bold;
	          text-decoration: underline;
	          cursor: pointer;
			}
		
			div.dialog{
				height: auto !important;
			}
			div#saveChanges{
				text-align: center;
			}
		</style>
	</head>
	<body>
		<section>
			<form onsubmit="changePassword(event)" id="changePassword" action="/4DACTION/_V3_setUsuario" method="POST">

				<input type="text" hidden="true" style="display: none;" name="id" value="">
				<fieldset>
						<!--<legend>Cambia tu contraseña, o recupera la actual.</legend>-->
						<legend>Cambiar contraseña temporal</legend>
							<!--#4DIF rand -->
							<p>Se reinició tu contraseña y debes ingresar una nueva. Revisa tu correo electrónico para obtener contraseña temporal o presiona <span id='restart'>aquí</span> para generar una nueva.
							</p>
						<label>
							<span>Contraseña temporal</span>	
							<!--#4DELSE-->
							<p>Por motivos de seguridad debes cambiar tu contraseña en el sistema, de lo contrario esta será reiniciada <!--#4DVAR restartDate --> de forma automática, sino la recuerdas haz click <span id='restart'>aquí</span> y te enviaremos una nueva a tu correo electrónico.
							</p>
						<label>
							<span>Contraseña actual</span>	

							<!--#4DENDIF -->
							<input type="password" name="perfil[password_actual]" value="">
						</label>


						<br><br><br>
						<!--<a class="get" style="color:blue" href="#">¿Olvidaste tu contraseña?</a><br><br><br>-->
						<label>
							<span>Nueva contraseña</span>
							<input type="password" name="perfil[password_nueva]" value="">
							<span style="margin:2px">(mínimo 8 caracteres, letras y números)</span>
						</label><br>
						<label>
							<span>Verificar contraseña</span>
							<input type="password" name="perfil[password_confirmacion]" value="">
						</label><br>

						<!-- <button form="changePassword" type="submit"  value="Submit">Guardar</button> -->
						<br/>
						<br/>
						<div id="saveChanges">
							<button class="ui-button ui-widget ui-state-default ui-corner-all ui-button-text-icon-primary" role="button" aria-disabled="false" form="changePassword" type="submit"  value="Submit"><span class="ui-button-icon-primary ui-icon ui-icon-disk"></span><span class="ui-button-text">Guardar</span></button>
							
						</div>
						
				</fielset>
			</form>
		</section>
	</body>
</html>
