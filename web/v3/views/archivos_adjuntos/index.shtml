<!DOCTYPE html>
<html>

<head>
    <title>Comentarios</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="/v3/design/grays.css?<!--#4DTEXT Random-->">


    <style>
        #title {
            display: block;
            background-color: #2C3F4D;
            color: white;
            padding: 5px !important;
            font-weight: bold;
            margin-bottom: 10px !important;
            font-size: 11px;
            text-transform: none !important;
        }

        .input-text {
            display: inline-block;
            /* width: calc(100% - 11px); */
            width: calc(100% - 16px);
            height: 18px;
            padding-right: 11px;
            /* background-image: url(_misc/input.png); */
            background-position: right center;
            background-repeat: no-repeat;
            /* border-bottom: 1px ridge rgb(210,210,210); */
            border-bottom: 1px ridge rgb(180, 180, 180);
            text-align: inherit;
            text-decoration: inherit;
            text-transform: uppercase;
            font-weight: inherit;
            margin-bottom: 10px;
        }

        article.css-section-comments {
            background-color: rgb(242, 242, 243);
        }
    </style>
</head>

<body>
    <section class="sheet-comentarios css-grays">
        <article class="css-section-comments">
            <fieldset>
                <legend id="title">Subir nuevo archivo</legend>

                <div class="row ml-3">
                    <label>
                        <span>Nombre</span>
                        <input type="text" name="upload[nombre]" class="input-text">
                    </label>
                    <label>
                        <span>Descripción</span>
                        <input type="text" name="upload[descripcion]" class="input-text">
                    </label>
                    <label>
                        <span>Archivo</span>
                        <input type="file" name="upload[attachment]" accept=".png, .jpg, .jpeg, .pdf">
                    </label>
                </div>
                <button class="btn btn-success ml-3 mb-4 btn-upload">Subir</button>
            </fieldset>
            <div class="row">
                <div class="col-12">
                    <div class="table-responsive">
                        <table class="table table-data">
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>Fecha</th>
                                    <th>Usuario</th>
                                    <th>Notas</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </article>
    </section>

    <script>
        var loadList = function () {
            $('.table-data > tbody > *');
            $.ajax({
                url: '/4DACTION/_V3_getAttachmentByCotizacion',
                data: {
                    id: $('section.sheet').data('id')
                },
                dataType: 'json',
                success: function (data) {
                    var htmlObject;
                                   
                    $.each(data.rows, function (key, item) {
                        htmlObject = $('<tr data-id="' + item.id + '" data-username="' + item.username + '">' +
                            '<td>' + item.text + '</td>' +
                            '<td>' + ((item.updated_at !== undefined) ? '<time datetime="' + new Date(item.updated_at).toISOString() + '">' + $.datepicker.formatDate('dd-mm-yy', new Date(item.updated_at)) + ' <span>' + new Date(item.updated_at).toTimeString().match(/^([0-9]{2}:[0-9]{2}:[0-9]{2})/)[0].substring(0, 5) + '</span></time>' : 'N/A') + '</td>' +
                            '<td>' + item.username + '</td>' +
                            '<td>' + item.notas + '</td>' +
                            '<td class="options">' +
                            '<button class="preview"></button>' +
                            '<button class="download"></button>' +
                            '<button class="delete"></button>' +
                            '</td>' +
                            '</tr>');
                        htmlObject.find('button.preview').button({
                            caption: 'Vista previa',
                            icons: {
                                primary: 'ui-icon-search'
                            },
                            text: false
                        }).click(function () {
                            $.fancybox(
                                {
                                    'autoScale': true,
                                    'type': 'iframe',
                                    'href': '/4DACTION/_V3_getAttachment?id=' + item.id
                                });
                        });
                        htmlObject.find('button.download').button({
                            caption: 'Descargar',
                            icons: {
                                primary: 'ui-icon-circle-arrow-s'
                            },
                            text: false
                        }).click(function () {
                            window.open('/4DACTION/_V3_getAttachment?id=' + item.id + '&download=true');
                        });
                        htmlObject.find('button.delete').button({
                            caption: 'Eliminar',
                            icons: {
                                primary: 'ui-icon-trash'
                            },
                            text: false
                        }).click(function () {
                             confirm('¿Está seguro que desea eliminar el adjunto?').done(function (data) {
                                if (data) {
                                $.ajax({
                                    url: '/4DACTION/_V3_removeAttachment',
                                    data: {
                                        id: item.id
                                    },
                                    dataType: 'json',
                                    success: function (data) {
                                        if (data.success) {
                                            toastr.success('El adjunto fue eliminado con éxito!');
                                            //$('.ui-dialog fieldset [name="attachment["]').val('');
                                            loadList();
                                        } else
                                            toastr.error('El adjunto no pudo eliminarse. Es posible que esté bloqueado.');
                                    }
                                });
                                }
                            });
                            
                        });
                        $('.table-data > tbody').append(htmlObject);
                    });
                }
            });
        };

        loadList();

        $('[name="upload[attachment]"]').change(function () {
            var file = this.files[0];
            if (file) {
                var fileType = file.type;
                var allowedTypes = ["application/pdf", "image/jpeg", "image/png", "image/gif", "image/bmp", "image/webp", "image/tiff", "image/svg+xml"];
                
                if (!allowedTypes.includes(fileType)) {
                    alert('Solo se permiten archivos PDF e imágenes (JPG, PNG, GIF, BMP, WEBP, TIFF, SVG)');
                    $(this).val('');   
                }
            }
        });

        $('.btn-upload').click(function () {

            var sid = "";
            $.each($.cookie(), function (clave, valor) {
                sid = valor;
            });

            var data = new FormData();
            let fileToUpload = $('[name="upload[attachment]"]').get(0).files[0];
            let fileType = fileToUpload.type.substring(fileToUpload.type.indexOf('/') + 1)
            data.append('upload[attachment]', $('[name="upload[attachment]"]').get(0).files[0]);
            data.append('upload[nombre]', $('[name="upload[nombre]"]').val());
            data.append('upload[descripcion]', $('[name="upload[descripcion]"]').val());
            data.append('fk', $('section.sheet').data('id'));
            data.append('sid', sid);
            data.append('fileName', fileToUpload.name);
            data.append('fileType', fileType);

            $.ajax({
                url: '/4DACTION/_V3_setAttachmentByCotizacion',
                type: 'POST',
                contentType: false,
                data: data,
                processData: false,
                cache: false,
                success: function (data) {
                    toastr.success('Archivo cargado con éxito!');
                    loadList();
                }
            });
        });
    </script>
</body>

</html>
