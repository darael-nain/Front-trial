      	// get contacto_catalogo / compras
        $.ajax({

          	'compras' : true 	
          },
          success: function(data) {

          	// Compras
          	var htmlObject;
          	var tbody = $('table.contact_compras > tbody');
          	var cant = 0;
            $.each(data.rows, function(key, item){

            $.each(data.rows, function(key, item){

            		htmlObject = $('<tr data-id="' + item.id + '" data-servicio="'+ item.servicio_id +'" style="background:white">' +

					tbody2.append(htmlObject);

            if (cant2==0) {

            }

		// show detalle promedio
		$('table.contact_compras > tbody').on('click', 'tr', function(){			
	    	var that = this;
	    	if (!$(this).hasClass('selected')) {
		    	var subtable = $(this).next().find('table > tbody');
		    	if (!$(this).hasClass('loaded')) {
			    	$.ajax({
			    		url: '/4DACTION/_V3_getComprasByServicio',
			    		data: {
			    			contacto: id,
			    			servicio: $(that).data('servicio')
			    		},
			    		dataType: 'json',
			    		success: function(data) {			    					
			    			subtable.parentTo('table').parent().prepend('<div style="font-weight: bold; text-align: right;">Cantidad: <span class="currency" style="width: 110px; display: inline-block;">' + Math.round(data.extra.count) + '</span></div>');

			} else {
