<!DOCTYPE html>
<html>
	<head>
		<title>Marcas</title>
		<meta charset="utf-8">
		<script>
			var loadMarca = function(){
			  $.ajax({
			    'url':'/4DACTION/_V3_getDatoOptions2',
			    data:{
			      "id":"1",
			      "q":""
			    },
			    dataType:'json',
			    success:function(data){
			      var container = $('.sheet.marcas table > tbody');
			      var htmlObject;
			      container.find("*").remove();
			      if (data.rows.length > 0) {
			        $.each(data.rows, function(key,item){
			        	if (item.text != "Nueva...") {
			        		 htmlObject = $('<tr data-id="' + item.id + '" data-inicial="' + item.correlativo + '">' +
				              '<td class="center">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;' + item.text + '</td>' +
				              '<td class="center">' + item.poto + '</td>' +
				              '<td class="center"><input type="number" style="width:80px;background:yellow;font-weight:bold" name="marca_cor" value="' + item.correlativo + '"></td>' +	
				            '</tr>');+
				            container.append(htmlObject);
				            htmlObject.find('input[name="marca_cor"]').on("change", function(){
				            	var tr =  $(this).closest("tr");
				            	var inicial =   tr.data("inicial");
				            	var id = tr.data("id");
				            	var corr =  parseFloat($(this).val());				            	
				            	if(corr >= 0){
				            		$.ajax({
										url: '/4DACTION/_V3_setMarca',
										data: {
											id: id,
											correlativo: corr
										},
										dataType: 'json',
										success: function(data) {
											if (data.success) {											
												toastr.success('Correlativo modificado con éxito.');
											} else{
												if (data.readonly) {
													toastr.error(NOTIFY.get('ERROR_RECORD_READONLY'));
												}else{
													toastr.error(NOTIFY.get('UNKNOWN_ERROR'));
												}
											}
										},
										error: function(){
											toastr.error(NOTIFY.get('ERROR_INTERNAL'));
										}
									});
				            	}else{
				            		toastr.error("INGRESE UN NÚMERO IGUAL O MAYOR A CERO.");
				            		$(this).val(inicial);
				            	}
				            });
			        	}			  
			        });
			      }else{
			        htmlObject = $('<tr><td colspan="4">No existen datos creadas.</td></tr>');
			        container.append(htmlObject);
			        $('.sheet.marcas table tfoot').hide();
			      }
			    }
			  });
			};
			$(document).ready(function() {
				loadMarca();
			});
		</script>
	</head>
	<body>
		<section class="sheet marcas">
			<footer>
				<article>
					<table width="100%">
						<thead>
							<tr>
								<th width="25%">Nombre</th>
								<th width="25%">Código</th>
								<th width="25%">Correlativo actual</th>
								<!--<th width="25%">Estado</th>-->
							</tr>
						</thead>
						<tbody></tbody>
						<tfoot>
							<tr>
								<th></th>
								<th></th>
								<th></th>
								<!--<th></th>-->
							</tr>
						</tfoot>
					</table>
				</article>
			</footer>
		</section>
	</body>

</html>
