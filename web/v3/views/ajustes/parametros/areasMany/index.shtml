				.then(response => {
					return response.json()
				})
				.then(data => {
					const container = $('.sheet-areas tbody.areas');

					data.rows.forEach( item => {

						let tr = $(`

										<td  class="descripcion_centrocosto">${item.descripcion_centrocosto} </td>
									</tr>
									`);

							$(this).toggleClass("selectedTr");
						});
					
					})
				})
				unaBase.ui.unblock();
			});
			var areas = {
				getSelectedAreas(){
					let result = {
						ids: [],
						lines: [],
						idsText: ""
					}
					// let ids = []		
					// let accessLines = []		
			        const accessSeleted = document.querySelectorAll(`tbody.areas tr.selectedTr`);
			        accessSeleted.forEach(access => {
			        	result.ids.push(access.dataset.id);
			        	result.idsText += `${access.dataset.id}/`;
			        	result.lines.push(`${access.querySelector(`td.descripcion_centrocosto`).innerHTML}`);
			        });
			        return result;
				},
				getSelectedUser(){
					let result = {
						ids: [],
						lines: [],
						idsText: ""
					}
					// let ids = []		
					// let accessLines = []		
			        const accessSeleted = document.querySelectorAll(`tbody.usuarios tr.selectedTr`);
			        accessSeleted.forEach(access => {
			        	result.ids.push(access.dataset.user);
			        	result.idsText += `${access.dataset.user}/`;
			        	result.lines.push(`${access.querySelector(`td.user`).innerHTML} / ${access.querySelector(`td.name`).innerHTML}`);
			        });
			        return result;
				}
			}
