<!DOCTYPE html>
<html>
<head>
	<title>conectividad</title>

</head>
<script type="text/javascript">
	$(document).ready(function(){

	  	unaBase.ui.block();    
	  	ParamConnect.menu();
	  	ParamConnect.init();
	  	unaBase.ui.unblock();
	  	unaBase.ui.expandable.init();
	  	unaBase.save.callback = () => {

              unaBase.node
                .quickRestart(true)
                .then(res => {})
                .catch(err => {});
	  	}


	});

</script>

<body>
	<section class="sheet" id="ParamConnect">
		<footer>
			<article>

					<li>
						<label for="urlWeb">Url</label>
						<input class="item" type="text" name="urlWeb" id="urlWeb">

					</li>
					<li>
						<label for="websiteUrl">Web url</label>
						<input class="item" type="text" name="websiteUrl" id="websiteUrl">

					</li>

						<label for="ipServer">Ip</label>
						<input class="item" type="text" name="ipServer" id="ipServer">
					</li>
					<li>
						<label for="webPort">Puerto Web</label>
						<input class="item" type="text" name="webPort" id="webPort">
					</li>
					<li>
						<label for="nodePort">Puerto Node</label>
						<input class="item" type="text" name="nodePort" id="nodePort">
					</li>
					<li>
						<label for="ipAlt1">Ip alternativa</label>
						<input class="item" type="text" name="ipAlt1" id="ipAlt1">

					<li>
						<label for="timeToCheckLogin">Tiempo para veficar sesión(segundos)</label>

					</li>
					<li>
						<label for="serviceNode">Servicio Node</label>
						<input class="item" type="checkbox" name="serviceNode" id="serviceNode">
					</li>
					<li>
						<label for="serviceNodeUrl">Servicio Node Url</label>

					</li>
