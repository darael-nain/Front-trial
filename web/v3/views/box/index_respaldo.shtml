<!DOCTYPE html>
<html>
	<head>
		<title>Cotizaciones</title>
		<meta charset="utf-8">
		<script>

			$(document).ready(function() {

				unaBase.toolbox.init();

				// Inicializamos un buscador
				unaBase.toolbox.search.init({
					// Función que genera una URL de listado JSON
					url: function() { return '/4DACTION/_V3_getContactos' },
					entity: 'Contacto',
					// Función que genera cada fila de la tabla, dado el valor de i (índice de posición)
					// y el valor de rows (array con todos los resultados)
					// El contenido de rows corresponde al objeto de mismo nombre generado mediante la llamada
					// a la api JSON. Ver /v3/json/get_cotizacion.shtml para conocer el formato.
					row: {
						html: function(i, rows) {

							var contacto = "";
							if (rows[i].tipo=="PERSONA") {
								if (rows[i].mostrar=="razon") {
									contacto = rows[i].nombres+" "+rows[i].paterno+" "+rows[i].materno;
								}else{
									contacto = rows[i].alias;
								}
							}else{
								if (rows[i].mostrar=="razon") {
									contacto = rows[i].razon;
								}else{
									contacto = rows[i].alias;
								}
							}

							return '<tr data-id="' + rows[i].id + '">' +
								'<td class="center">' + rows[i].fmodificacion  + '</td>' +
								'<td class="left">' + contacto  + '</td>' +
								'<td>' + rows[i].rut + '</td>' +
								'<td>' + rows[i].giro + '</td>' +								
								'<td>' + rows[i].telefono1 +' '+ rows[i].telefono2+ '</td>' +
								'<td>' + rows[i].email + '</td>' +					
							'</tr>'
						}
					},
					detail: {
						// Función que genera una URL de detalle, dado el id (identificador de item)
						url: function(id) { return '/v3/views/contactos/pop_perfil.shtml?id=' + id },
					},
					// Inflexiones
					inflection: {
						singular: 'contacto',
						plural: 'contactos',
						none: 'ningún'
					},
					// Filtros
					filters: [
						{ name: 'created_at', type: 'month', caption: 'Fecha de creación', range: true },
						{ name: 'updated_at', type: 'month', caption: 'Fecha últ. modificación', range: true },
						// Pendiente: agregar datasource remoto y convertir a checkbox
						// con jquery ui autocomplete
						{ name: 'area_negocio', type: 'autocomplete', caption: 'Área de negocio', dataSource: 'getAreaNegocio' },
						{ name: 'estado', type: 'checkbox', caption: 'Estado de la cotización', options: [
							{ caption: 'En proceso', name: 'estado_en_proceso', value: true },
							{ caption: 'Anulada', name: 'estado_nulo', value: true }
						] },
						{ name: 'ejecutivo_responsable', type: 'text', caption: 'Ejecutivo responsable' },
						{ name: 'custom1', type: 'text', caption: 'Personalizado 1' }
					]
				});

				unaBase.toolbox.menu.init({
					entity: 'Contacto', // especifica entidad sobre la cual se almacenan los datos
										  // y nombre para referenciar los views
					buttons: [ 'new' ]
				});

				$('#dialog-form').dialog({
					autoOpen: false,
					height: 350,
					width: 600,
					modal: true,
					title: 'Perfil',
					buttons: {
					"Aceptar": function() {
					  alert('Cambios guardados');
					},
					Cancelar: function() {
					  $( this ).dialog( "close" );
					}
					},
					close: function() {
					
					}
			    });

				$(".open-form").click(function() {
					alert();
					$( "#dialog-form" ).dialog( "open" );
				});
				
			});
		</script>
	</head>
	<body>		
		<div id="dialog-form" title="Perfil contacto"></div>
		<!-- Maqueta de la tabla que contendrá los resultados de búsqueda -->
		<table>
			<thead>
				<tr>
					<th>Fecha últ. mod</th>
					<th>Contacto</th>					
					<th>Rut</th>
					<th>Giro</th>
					<th>Fono</th>
					<th>Email</th>					
				</tr>				
			</thead>
			<tbody></tbody>
			<tfoot></tfoot>
		</table>
	</body>

</html>
