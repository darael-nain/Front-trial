<!DOCTYPE HTML>
<html>
<head>
    <title>SOLICITUD DE MODIFICACIÓN DE NEGOCIO</title>
	<meta charset="utf-8">
    <script>
		$(document).ready(function() {
			var container = $('#sheet-payment');
			var containerCompras = $('#sheet-compras');
			unaBase.toolbox.init();
			unaBase.toolbox.menu.init({
				buttons: ['sending_modification_request'],
				data: function(){
				  return $('#sheet-payment').serializeAnything();
				},
				validate:function(){
				  return true;
				}
			});
			var folio = $('section.sheet').data('index');
			var descripcion = "Solicito permiso para modificar el negocio Nº "+folio+".";
			container.find('textarea').val(descripcion);

            $.ajax({
                url: '/4DACTION/_V3_getUsuariosAutorizadoresNeg',
                dataType: 'json',
                success: function(data) {
                    $.each(data.rows, function(key, item) {
                        $('.autorizadores').append('<strong style="margin-right: 5px; padding-top: 2px; padding-bottom: 3px; padding-left: 5px; padding-right: 5px; font-size: 12px; border-radius: 5px; background-color: rgb(220,220,220) !important;">' + item.name.capitalizeAllWords() + '</strong>');
                    });
                }
            });
		});
    </script>
    <style>
		#sheet-payment > textarea{
			width:calc(100% - 10px);
			height:200px;
			font-size:12px!important;
		}
    </style>
</head>
<body>
    <p style="font-size: 12px; font-weight: bold;">La solicitud de autorización se enviará a:</p>
    <div class="autorizadores" style="padding: 5px; margin-top: 5px; margin-bottom: 5px;"></div>
    <p style="font-size: 12px; font-weight: bold;">Ingrese el mensaje:</p>
	<section class="sheet" id="sheet-payment">
		<textarea></textarea>
	</section>
</body>
</html>
