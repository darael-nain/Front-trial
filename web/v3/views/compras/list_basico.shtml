<!DOCTYPE html>
<!--#4DSCRIPT/_V3_serverInfo-->
<html>
	<head>
		<title>Compras</title>
		<meta charset="utf-8">
		<link rel="stylesheet" href="/v3/views/compras/lista.css">
		<script>

			$(document).ready(function() {

				unaBase.toolbox.init();

				// Inicializamos un buscador
				var params = {
					// Función que genera una URL de listado JSON
					url: function() { return '/4DACTION/_V3_getCompras2' },
					entity: 'Compras',
					callback : function(data){		
						$('.especial .totales').find('span[data-neto]').text(data.totales.neto);
						$('.especial .totales').find('span[data-total]').text(data.totales.total);
						$('.especial .totales').find('span[data-justificado]').text(data.totales.justificado);
						
						if ($('.fht-table-wrapper').length==0) {
							$('.especial').fixedHeaderTable({ footer: true, cloneHeadToFoot: false, fixedColumn: false });
						}						

					},
					// Función que genera cada fila de la tabla, dado el valor de i (índice de posición)
					// y el valor de rows (array con todos los resultados)
					// El contenido de rows corresponde al objeto de mismo nombre generado mediante la llamada
					// a la api JSON. Ver /v3/json/xxxxx.shtml para conocer el formato.
					row: {
						html: function(i, rows) {
							var v2 = "";
							var title = "";
							if (rows[i].version=="") {
								//v2 = '<strong style="font-size:8px!important;font-weight:bold">V2</strong>';
								v2 = '<strong title="oc creada en versión antigua" style="font-size:11px!important;font-weight:bold">*</strong>';
								title = "oc creada en versión antigua";
							}

							return '<tr title="'+ title +'" data-id="' + rows[i].id + '">' +											
								'<td width="5%">' + v2 + ' ' + rows[i].folio + '</td>' +
								'<td width="1%">' + rows[i].tipo + '</td>' +
								'<td class="center" width="5%">' + rows[i].doc + '</td>' +
								'<td width="5%">' + rows[i].fecha + '</td>' +
								'<td width="5%">' + rows[i].estado + '</td>' +											
								'<td class="left" width="25%">' + rows[i].referencia + '</td>' +							
								'<td class="left" width="15%">' + rows[i].proveedor + '</td>' +						
								'<td class="neto_c right" width="5%">' + rows[i].neto + '</td>' +
								'<td class="total_c right" width="5%">' + rows[i].total + '</td>' +
								'<td class="justificado_c right" width="5%">' + rows[i].justificado + '</td>' +
								'<td class="basico center" width="5%">' + rows[i].validado + '</td>' +								
							'</tr>'
						}
					},
					detail: {
						url: function(id) { return '/v3/views/compras/content.shtml?id=' + id +'&from=self'},
						iframe: false
					},
					// Inflexiones
					inflection: {
						singular: 'gasto',
						plural: 'gastos',
						none: 'ningún'
					},									
					filters: [
						{ name: 'created_at', type: 'month', caption: 'Fecha de creación', range: true },			
						{ name: 'tipo_gasto', type: 'autocomplete', caption: 'Tipo de gastos', dataSource: 'get_tipo_gasto' },
						{ name: 'validacion_gasto', type: 'autocomplete', caption: 'Según validación', dataSource: 'get_validacion' },
						{ name: 'estado', type: 'checkbox', caption: 'Estado de la compra', options: [
							{ caption: 'Emitida', name: 'estado_emitida', value: true },
							{ caption: 'Pagada', name: 'estado_pagada', value: false },							
							{ caption: 'Cerrada', name: 'estado_cerrada', value: false },
							{ caption: 'Anulada', name: 'estado_nulo', value: false }					
						]}
					]
				};

				unaBase.toolbox.search.init(params);
				unaBase.toolbox.menu.init({
					entity: 'Compras', // especifica entidad sobre la cual se almacenan los datos
										  // y nombre para referenciar los views
					/*buttons: [ 'new', 'clone', 'print' ]*/
					buttons: [ 'create_oc2', 'views_basico' ]
				});

				/*setTimeout(function(){
					$('.especial').fixedHeaderTable({ footer: false, cloneHeadToFoot: false, fixedColumn: false });
				}, 100);*/

			});
		</script>		
	</head>
	<body style="min-width: 850px !important;">
		<!-- Maqueta de la tabla que contendrá los resultados de búsqueda -->
		<table style="min-width: 850px !important; width: 100% !important;" class="especial">
				<thead>
					<tr>									
						<th>Número</th>
						<th>Tipo</th>
						<th>Doc.</th>
						<th>Fecha</th>
						<th>Estado</th>		
						<th>Referencia</th>
						<th>Proveedor</th>									
						<th>Neto [<!--#4DVAR _V3_defaultCurrencySymbol-->]</th>
						<th>Total [<!--#4DVAR _V3_defaultCurrencySymbol-->]</th>
						<th>Justificado [<!--#4DVAR _V3_defaultCurrencySymbol-->]</th>
						<th>Validado</th>										
					</tr>
				</thead>
				<tfoot class="totales">
					<th></th>
		            <th></th>
		           	<th></th>
		           	<th></th>
		            <th></th>   
		            <th></th>
		            <th></th>
		            <th class="right"><span data-neto="" class="label neto_b"><!--#4DVAR _V3_defaultCurrencySymbol-->0</span></th>
		           	<th class="right"><span data-total="" class="label total_b"><!--#4DVAR _V3_defaultCurrencySymbol-->0</span></th>
		            <th class="right"><span data-justificado="" class="label justificado_b"><!--#4DVAR _V3_defaultCurrencySymbol-->0</span></th>
		            <th></th>
				</tfoot>
				<tbody></tbody>			
			</table>
	</body>
</html>
