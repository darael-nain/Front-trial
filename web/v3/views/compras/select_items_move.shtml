<!DOCTYPE html>
<html>
	<head>
		<!--#4DSCRIPT/_V3_proxy_get_ItemsProyCompras-->
		<title>Items del negocio</title>
		<meta charset="utf-8">
		<script>

		var menus = function(){			
			unaBase.toolbox.init();
			unaBase.toolbox.menu.init({
				entity: 'Proyectos_compras',
				buttons: ['itemsoc_volver_proyectos2','move_items_oc'],
				data: function(){     
				  return $('.ui-dialog section.sheet').serializeAnything();            
				},
				validate:function(){     
				  return true;
				}    
			});
		};
		var getItemsGastos = function(){
			var container = $('#sheet-items_proyect-select > table.items > tbody');
			var itemsGastos = $('#items-gastos > tbody > tr[data-tipo="ITEM"]');
			var cant = 0;
			// Calcual diferencias en gasto por item, entre lo agregado en la OC y lo que está en el popup
			itemsGastos.each(function(key,item){
				var llave = $(this).find('input[name="oc[detalle_item][llave_nv]"]').val();
				var monto = parseFloat($(this).find('input[name="oc[detalle_item][total]"]').val());
				var tr = container.find('tr[data-llave="'+llave+'"]');
				if (tr.length>0) {
					var start = parseFloat(tr.find('input[data-diferencia]').val());
					var end = start - monto;
					tr.find('input[data-diferencia]').val(end);
					tr.find('input[type="checkbox"]').attr('disabled', !(end > 0 || access._486));
				}
			});			
			
		}
		$(document).ready(function() {
			menus();
			
			if ($('.ui-dialog section.sheet').data('permiso')) {
				$('.ui-dialog header nav ul li[data-name="itemsoc_otros_gastos2"]').show();
			}else{
				$('.ui-dialog header nav ul li[data-name="itemsoc_otros_gastos2"]').hide();
			}

			// Formato números
			$('.ui-dialog .numeric.currency input').number(true, currency.decimals, ',', '.');
			$('.ui-dialog .percent input').number(true, 2, ',', '.');

			// Expandir y contraer títulos
			$('.ui-dialog section.sheet table > thead button.toggle.all').click(function() {
				unaBase.ui.block();
				if ($(this).hasClass('ui-icon-folder-open')) {
					$(this).removeClass('ui-icon-folder-open');
					$(this).addClass('ui-icon-folder-collapsed');
					$(this).attr('title', 'Contraer todo');
					$('.ui-dialog section.sheet table > tbody > tr.title button.toggle.categoria.ui-icon-folder-open').each(function() {
						$(this).triggerHandler('click');
					});
				} else {
					$(this).removeClass('ui-icon-folder-collapsed');
					$(this).addClass('ui-icon-folder-open');
					$(this).attr('title', 'Expandir todo');
					$('.ui-dialog section.sheet table > tbody > tr.title button.toggle.categoria.ui-icon-folder-collapsed').each(function() {
						$(this).triggerHandler('click');
					});
				}
				unaBase.ui.unblock();
			});

			$('.ui-dialog section.sheet table > tbody button.toggle.categoria').click(function() {
				var target = $(this);

				var collapsed = target.hasClass('ui-icon-folder-collapsed');

				if (collapsed)
					target.removeClass('ui-icon-folder-collapsed').addClass('ui-icon-folder-open');
				else
					target.removeClass('ui-icon-folder-open').addClass('ui-icon-folder-collapsed');

				var titles = target.parentTo('tr').nextUntil('.title');

				if (collapsed) {
					titles.removeClass('collapsed');
					target.parentTo('tr').find('.info').html('');

				} else {
					titles.addClass('collapsed');
					target.parentTo('tr').find('.info').html(titles.length + ' ítem' + ((titles.length > 1)? 's' : ''));
				}
			});			
			
			getItemsGastos();

			// Mostrar datos del negocio en el título del popup

			/*var titulo = $('.ui-dialog-title').text();

			$('.ui-dialog-title').text('Ítems del negocio Nº <!--#4DTEXT negocio_index--> : <!--#4DTEXT negocio_text--> <!--#4DTEXT negocio_cliente-->');

			$('#dialog-menu button').click(function() {
				$('.ui-dialog-title').text(titulo);
			});*/

			$('li[data-name="itemsoc_agregar_items2"] > button').addClass('new-position-button');

		});		

		</script>
		<style>

			#dialog-viewport table.items > tbody {
				counter-reset: item;
			}

			#dialog-viewport table.items > tbody > tr:not(.title) > td:nth-of-type(2):before {
				counter-increment: item;
				content: counter(item);
				font-weight: bold;
			}

			#dialog-viewport table.items > * > * > * span[name] {
				display: block;
				color: black;
			}

/*			/ * Segunda cantidad * /
			<!--#4DIF NOT(vUsarsegunda_cantidad)-->
			.segunda-cantidad {
				display: none;
			}
			<!--#4DENDIF-->

			/ * 451	Ver sección totales * /
			<!--#4DIF NOT(_V3_verifica_permisos_web (_V3_data_username;451))-->
			.block-totales {
				display: none;
			}
			<!--#4DENDIF-->

			/ * 452	Ver precios de venta en ítems * /
			<!--#4DIF NOT(_V3_verifica_permisos_web (_V3_data_username;452))-->
			table .venta {
				display: none;
			}
			<!--#4DENDIF-->

			/ * 453	Ver utilidad presupuestada en ítems * /
			<!--#4DIF NOT(_V3_verifica_permisos_web (_V3_data_username;453))-->
			table .utilidad.presupuestado {
				display: none;
			}
			<!--#4DENDIF-->

			/ * 453	Ver utilidad real en ítems * /
			<!--#4DIF NOT(_V3_verifica_permisos_web (_V3_data_username;454))-->
			table .utilidad.real {
				display: none;
			}
			<!--#4DENDIF-->

			/ * 455	Ver gasto presupuestado en ítems * /
			<!--#4DIF NOT(_V3_verifica_permisos_web (_V3_data_username;455))-->
			table .costo.presupuestado {
				display: none;
			}
			<!--#4DENDIF-->

			/ * 456	Ver gasto real en ítems * /
			<!--#4DIF NOT(_V3_verifica_permisos_web (_V3_data_username;456))-->
			table .costo.real {
				display: none;
			}
			<!--#4DENDIF-->

			/ * 457	Ver márgenes en ítems * /
			<!--#4DIF NOT(_V3_verifica_permisos_web (_V3_data_username;457))-->
			table .margen {
				display: none;
			}
			<!--#4DENDIF-->

			/ * Márgenes según parámetro * /

			<!--#4DIF _V3_param_showMargenDesdeCompra-->
			table .margen-desde-venta {
				display: none;
			}
			<!--#4DELSE-->
			table .margen-desde-compra {
				display: none;
			}
			<!--#4DENDIF-->
*/

			#dialog-viewport section.sheet table .collapsed {
				display: none;
			}

			#dialog-viewport table .moving-src, table .moving-dst {
				outline: 1px dashed black;
				opacity: .3;
			}

			#dialog-viewport section.sheet table th:last-of-type {
				width: 28px;
			}

			/* Nuevo */

			#dialog-viewport section.sheet > footer > article {
				position: relative;
			}

			#dialog-viewport section.sheet > footer > article > button.expand {
				position: absolute;
				right: 23px;
				top: 23px;
				display: inline-block;
				margin: 0 !important;
				padding: 0 !important;
				width: 18px !important;
				height: 18px !important;
			}

			#dialog-viewport .costo > span > span[name] {
				color: #AF6D44;
			}

			#dialog-viewport .utilidad > span > span[name] {
				color: #44AF6D;
			}

			#dialog-viewport .numeric.percent > span > span[name] {
				display: inline;
			}

			#dialog-viewport .detalle {
				display: none;
			}

			/*
			Solución quick&dirty para poder mostrar correctamente los valores con decimales
			se usa input en vez de span, y se cambia la apariencia del input en línea
			*/

			#dialog-viewport table.items input:not([type="checkbox"]) {
				background: none !important;
				border: none !important;
				cursor: default !important;
				margin: 0 !important;
				padding: 0 !important;
				display: inline !important;
				font: inherit !important;
			}

			#dialog-viewport table.items .costo > span > input[name] {
				color: #AF6D44;
			}

			#dialog-viewport table.items .utilidad > span > input[name] {
				color: #44AF6D;
			}

			#dialog-viewport table.items .numeric.percent > span > input[name] {
				display: inline;
			}

			.new-position-button{
				position:absolute;
				right:20px;
				top:15px!important
			}

			/* permiso de ver precio de venta en negocios*/
			<!--#4DIF NOT(_V3_verifica_permisos_web (_V3_data_username;452))-->
			table .pventa{
				display: none;
			}
			<!--#4DENDIF-->

		</style>
	</head>
	<body>
		<section id="sheet-items_proyect-select" class="sheet" data-idnv="<!--#4DTEXT idNv-->" data-permiso="<!--#4DTEXT vPermisoOtrosGastos-->" data-from="<!--#4DTEXT from-->">
			<table class="items">
				<!--
				<thead>
					<tr>						
						<th width="50px">Código</th>
						<th>Nombre</th>
						<th class="costo">Gasto P. [<!--#4DVAR _V3_defaultCurrencySymbol-->]</th>			
						<th class="utilidad">Gasto R. [<!--#4DVAR _V3_defaultCurrencySymbol-->] </th>			
						<th class="utilidad">Por gastar [<!--#4DVAR _V3_defaultCurrencySymbol-->]</th>			
						<th></th>
					</tr>
				</thead>
				-->
				<thead>
					<tr>
						<th style="background-color: <!--#4DVAR vColorCorporativoCSS--> !important; width: 1px !important;"></th>
						<th style="width: 70px; text-align: left;"><button style="-webkit-filter: invert(100%);" class="ui-icon ui-icon-folder-collapsed toggle all" title="Contraer todo"></button> Código</th>
						<th >Nombre</th>
						<th>Cant.</th>
						<th class="pventa">Venta</th>
						<th class="costo presupuestado adquisicion">Gasto P.</th>
						<th class="costo real adquisicion">Gasto R.</th>
						<th class="adquisicion">Por gastar</th>
						<th><button class="dropdown-button actions items"></button></th>
					</tr>
				</thead>

				<tbody>
				<!--#4DLOOP a_llave-->
					<!--#4DIF a_tipo_det{a_llave}="TITULO"-->
					<tr class="title">
						<th></th>
				 		<th><button class="ui-icon toggle categoria ui-icon-folder-collapsed" title="Contraer o expandir título"></button></th>
						<th>
							<input readonly name="item[][nombre]" value="<!--#4DTEXT a_des{a_llave}-->">
						</th>
						<th></th>
						<th class="numeric currency pventa adquisicion"><!--#4DVAR _V3_defaultCurrencySymbol--> <span><input name="item[][subtotal_venta]" value="<!--#4DTEXT Replace string(String(a_subtotal{a_llave};"&xml");".";",")-->"></span></th>
						<th class="numeric currency costo presupuestado adquisicion"><!--#4DVAR _V3_defaultCurrencySymbol--> <span><input name="item[][subtotal_costo]" value="<!--#4DTEXT Replace string(String(a_gasto_p{a_llave};"&xml");".";",")-->"></span></th>
						<th class="numeric currency costo real adquisicion"><!--#4DVAR _V3_defaultCurrencySymbol--> <span><input readonly name="item[][subtotal_costo_real]" value="<!--#4DTEXT Replace string(String(a_gasto_real{a_llave};"&xml");".";",")-->"></span></th>
						<th class="numeric currency adquisicion"><!--#4DVAR _V3_defaultCurrencySymbol--> <span><input readonly name="item[][diferencia]" value="<!--#4DTEXT Replace string(String(a_gasto_p{a_llave}-a_gasto_real{a_llave};"&xml");".";",")-->"></span></th>
						<th></th>		
					</tr>
					<!--#4DELSE-->
					<tr data-llave="<!--#4DTEXT a_llave{a_llave}-->" class="collapsed">
						<td></td>
				 		<td class="numeric code"><input readonly name="item[][codigo]" value="<!--#4DTEXT a_cod_det{a_llave}-->"></td>
				 		<td>
				 			<input readonly name="item[][nombre]" value="<!--#4DTEXT a_des{a_llave}-->" style="width: 200px;">
				 			<button class="ui-icon ui-icon-notice detail item">Ver detalle del ítem</button>
				 		</td>
				 		<td class="center"><input readonly name="item[][cant]" value="<!--#4DTEXT a_cantidad{a_llave}-->"></td>
				 		<td class="numeric currency pventa adquisicion"><!--#4DVAR _V3_defaultCurrencySymbol--> <span><input readonly name="item[][subtotal_venta]" value="<!--#4DTEXT Replace string(String(a_subtotal{a_llave};"&xml");".";",")-->"></span></td>
				 		<td class="numeric currency costo presupuestado adquisicion"><!--#4DVAR _V3_defaultCurrencySymbol--> <span><input readonly name="item[][subtotal_costo]" value="<!--#4DTEXT Replace string(String(a_gasto_p{a_llave};"&xml");".";",")-->"></span></td>
				 		<td class="numeric currency costo real adquisicion"><!--#4DVAR _V3_defaultCurrencySymbol--> <span><input readonly name="item[][subtotal_costo_real]" value="<!--#4DTEXT Replace string(String(a_gasto_real{a_llave};"&xml");".";",")-->"></span></td>
				 		<td class="numeric currency adquisicion"><!--#4DVAR _V3_defaultCurrencySymbol--> <span><input data-diferencia="xxxx" readonly name="item[][diferencia]<!--#4DTEXT a_llave{a_llave}-->" value="<!--#4DTEXT Replace string(String(aDiferencia{a_llave};"&xml");".";",")-->"></span></td>
						<td>
							<input data-llavetit="<!--#4DTEXT a_llave_titulo{a_llave}-->" name="detalle[check_item][<!--#4DTEXT a_llave{a_llave}-->]" value="<!--#4DTEXT a_llave{a_llave}-->" type="checkbox"<!--#4DIF (aDiferencia{a_llave}<=0) & (Not(_V3_verifica_permisos_web(_V3_data_username;486)))--> disabled<!--#4DENDIF-->>
						</td>
					</tr>
					<script>
						<!--#4DIF ((a_obs{a_llave}#"") | (a_com{a_llave}#""))-->
						$('tr[data-llave="<!--#4DTEXT a_llave{a_llave}-->"]').find('button.detail.item').tooltipster({
							delay: 0,
							interactiveAutoClose: false,
							content: function() {
								var htmlObject = $('\
									<ul>																																							\
										<li data-name="observaciones">																																\
											<strong style="font-weight: bold; display: inline-block; width: 220px;">Descripción larga</strong>															\
											<pre style="font-size: 11px;"></pre>																																					\
										</li>																																						\
										<li data-name="comentarios">																																\
											<strong style="font-weight: bold; display: inline-block; width: 220px;">Observación</strong>														\
											<pre style="font-size: 11px;"></pre>																																					\
										</li>																																						\
									</ul>																																							\
								');
								htmlObject.find('li[data-name="observaciones"] > pre').text('<!--#4DIF a_obs{a_llave}#""--><!--#4DHTML _V3_escapeString(a_obs{a_llave})--><!--#4DELSE-->-<!--#4DENDIF-->');
								htmlObject.find('li[data-name="comentarios"] > pre').text('<!--#4DIF a_com{a_llave}#""--><!--#4DHTML _V3_escapeString(a_com{a_llave})--><!--#4DELSE-->-<!--#4DENDIF-->');
								return htmlObject;
							}
						}).unbind('hover').bind('hover', function(event) {
							$(this).tooltipster('show');
						}).unbind('mouseout').bind('mouseout', function(event) {
							$(this).tooltipster('hide');
						});
						<!--#4DELSE-->
						$('tr[data-llave="<!--#4DTEXT a_llave{a_llave}-->"]').find('button.detail.item').hide();
						<!--#4DENDIF-->
					</script>
					<!--#4DENDIF-->
				<!--#4DENDLOOP-->
				</tbody>		
			</table>
		</section>		
	</body>
</html>
