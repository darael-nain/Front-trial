        function currentDate() {
            var date = new Date();

        // formateador de los montos 000,000,000.00
        function formatNumber(number) {
            var str = number.toString();
            var parts = str.split('.');
            var intPart = parts[0];
            var decimalPart = parts[1] || '';

            var formattedIntPart = '';
            while (intPart.length > 3) {
                formattedIntPart = '.' + intPart.slice(-3) + formattedIntPart;
                intPart = intPart.slice(0, intPart.length - 3);
            }
            if (intPart) {
                formattedIntPart = intPart + formattedIntPart;
            }

            var decimalPartFormatted = '';
            if (decimalPart.length > 0) {
                decimalPartFormatted = decimalPart[2] >= 5 ? decimalPart = String(parseFloat(decimalPart.slice(0, 2)) + 1) : decimalPart.slice(0, 2)
                return formattedIntPart + ',' + decimalPartFormatted;
            } else
                return formattedIntPart


        }

        // url base
        function urlBase() {
            var protocol = location.protocol;
            var host = location.host;
            return protocol + '//' + host;
        }

        // url del logo de la empresa
        function urlLogo() {
            var protocol = location.protocol;
            var host = location.host;
            return urlBase() + '/4DACTION/logo_empresa_web';
        }

        // url del logo de unabase
        function urlLogoUnabase() {
            var protocol = location.protocol;
            var host = location.host;
            return urlBase() + '/v3/design/sidebar/logoperfil.png';
        }

        // informacion basica -> logos y titulo
        function basicInfo(data) {
            document.querySelector('.unabaseLogo').setAttribute('src', urlLogoUnabase());
            document.querySelector('.project_logo').setAttribute('src', urlLogo());
        }

        // id del documento de compra
        function getId() {
            return converToJson(location.search).id;
        }

        // obtener los parameros de la url
        function converToJson(url) {
            const params = {}
            var array = url.split("&")
            for (var index = 0; index < array.length; index++) {
                var vars = array[index].split("=")
                var key = vars[0].replace('?', '')
                var value = vars[1]
                params[key] = value

            }
            return params
        }

        //get data
        function getData(id) {
            $.ajax({
                'url': '/4DACTION/_V3_printInternational_compras',
                data: {
                    "id_oc": id,
                    "api": true
                },
                dataType: 'json',
                async: false,
                success: function (res) {
                    const data = res
                    fillInDataFromTable1(data, id)
                    fillInDataFromTable2(data)
                    fillInDataFromTable3(data)
                    basicInfo(data)
                }
            });
        }

        //get data
        function getClients(id) {
            var clientes = []
            $.ajax({
                'url': '/4DACTION/_V3_get_oc_clientes',
                data: {
                    "id": id,
                    "api": true
                },
                dataType: 'json',
                async: false,
                success: function (data) {
                    clientes = data.rows
                }
            });
            return clientes
        }

        // pintar los datos en el template
        function uploadData() {
            const id = getId()
            currentDate();
            getData(id)

        // Relleno de la tabla 1
        function fillInDataFromTable1(data, id) {
            //var clientes = getClients(id)
            document.getElementById('client').textContent = data.nombreEmisor
            document.getElementById('clientEmail').textContent = data.emailEmisor
            document.getElementById('vendor').textContent = data.razonEmp
            document.getElementById('folio_oc').textContent = data.folioOc
            document.getElementById('vendorEmail').textContent = data.emailEmp
            document.getElementById('jobName').textContent = data.job_name
            
            var ff =  data.due_date.split('-')
            document.getElementById('due_date').textContent = ff[1]+"-"+ff[0]+"-"+ff[2]
        }

        // Relleno de la tabla 2 - Descripcion
        function fillInDataFromTable2(data) {
            // var symbol = getSymbol(data.codigoByPrint)
            document.getElementById('total').textContent = data.montos.total_formated
            

            var table = document.getElementById("tableDescription");

            for (var i = 0; i < data.rows.length; i++) {
                var item = data.rows[i];

                var newRow = document.createElement("tr");
                if (item.tipo === 'TITULO') {
                    newRow.classList.add("description_container-parent");
                } else {
                    newRow.classList.add("description_container");
                }

                var itemCell = document.createElement("td");
                itemCell.classList.add("description_cell_text");
                var itemText = document.createElement("p");
                itemText.classList.add("description_cell_text_normal");
                itemText.textContent = item.tipo === 'TITULO' ? '' : item.items;
                itemCell.appendChild(itemText);

                var itemCodProdCell = document.createElement("td");
                itemCodProdCell.classList.add("description_cell_text");
                var itemCodProd = document.createElement("p");
                itemCodProd.classList.add("description_cell_text_normal");
                itemCodProd.textContent = item.tipo === 'TITULO' ? '' : item.cod_prod;
                itemCodProdCell.appendChild(itemCodProd);

                var descriptionCell = document.createElement("td");
                descriptionCell.classList.add("description_cell_text");
                var descriptionText = document.createElement("p");
                descriptionText.classList.add("description_cell_text_normal");
                descriptionText.textContent = item.nombre;
                descriptionCell.appendChild(descriptionText);

                var qtyCell = document.createElement("td");
                qtyCell.classList.add("description_cell_text");
                var qtyText = document.createElement("p");
                qtyText.classList.add("description_cell_text_normal");
                qtyText.textContent = item.tipo === 'TITULO' ? '' : item.cantidad_formated;
                qtyCell.appendChild(qtyText);

                var daysCell = document.createElement("td");
                daysCell.classList.add("description_cell_text");
                var daysText = document.createElement("p");
                daysText.classList.add("description_cell_text_normal");
                daysText.textContent = item.tipo === 'TITULO' ? '' : item.dias_formated;
                daysCell.appendChild(daysText);

                var priceCell = document.createElement("td");
                priceCell.classList.add("description_cell_item_price");

                var moneyDiv = document.createElement("span");
                moneyDiv.textContent = item.tipo === 'TITULO' ? '' : '$';

                var priceText = document.createElement("span");
                priceText.classList.add("description_cell_text_normal");
                priceText.textContent = item.tipo === 'TITULO' ? '' : item.precio_formated;

                priceCell.appendChild(moneyDiv);
                priceCell.appendChild(priceText);

                var subtotalCell = document.createElement("td");
                subtotalCell.classList.add("description_cell_item_price");

                var moneyDiv2 = document.createElement("span");
                moneyDiv2.textContent = item.tipo === 'TITULO' ? '' : '$';
                
                var subtotalText = document.createElement("span");
                subtotalText.classList.add("description_cell_text_normal");
                subtotalText.textContent = item.tipo === 'TITULO' ? '' : item.subtotal_formated;

                subtotalCell.appendChild(moneyDiv2);
                subtotalCell.appendChild(subtotalText);

                newRow.appendChild(itemCell);
                newRow.appendChild(itemCodProdCell);
                newRow.appendChild(descriptionCell);
                newRow.appendChild(qtyCell);
                newRow.appendChild(daysCell);
                newRow.appendChild(priceCell);
                newRow.appendChild(subtotalCell);

                table.appendChild(newRow);
            }


        }

            document.getElementById('company_name').textContent = data.company.name;

            //document.getElementById('description').textContent = data.comentarios
            document.getElementById('obs').textContent = data.obs

        }




        // Simbolo de la moneda
        function getSymbol(typeMoney) {
            if (typeMoney === 'EUR') return '€'
            return '$'
        }

        // Obtener Client PO
        function getClientPO(clientes) {
            var ids = [];

            for (var i = 0; i < clientes.length; i++) {
                ids.push(clientes[i].numero);
            }

            return ids.join('-');
        }

        function formatText(text) {
            var lines = text.split("\n");
            var formattedText = "";

            for (var i = 0; i < lines.length; i++) {
                formattedText += "<span>" + lines[i] + "</span><br>";
            }

            return formattedText;
        }
