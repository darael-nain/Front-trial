<!DOCTYPE html>
<html>
	<head>
		<!--#4DSCRIPT/_V3_proxy_getProyectosCompras-->
		<title>Buscar proyectos</title>
		<meta charset="utf-8">
		<script>
			$(document).ready(function() {
				unaBase.toolbox.init();
				// Inicializamos un buscador
				let ids =[];
				let nvs = [];
				let urlOc;
				let nvNumbers = document.querySelectorAll('table#items-gastos tbody tr td.nvId');
				if(access._653 && nvNumbers.length){
					for(let item of nvNumbers){						
						if(typeof item.dataset.nv !== 'undefined') nvs.push(item.dataset.nv);
					}
					ids = arrUnique(nvs);
					console.warn(ids);
					urlOc = ids.length ? '/4DACTION/_V3_get_proyectos_compras?id='+ids[0] : '/4DACTION/_V3_get_proyectos_compras';
				}else{
					urlOc ='/4DACTION/_V3_get_proyectos_compras';
				}
				var params = {
					// Función que genera una URL de listado JSON
					url: function() { return urlOc },
					entity: 'proyectos_compras',
					row: {
						html: function(i, rows) {
							let html = "";

							let symbolDOC = unaBase.defaultCurrencyCode != rows[i].exchange.type ? rows[i].exchange.type : currency.symbol
							

							let montoNeto = symbolDOC + ' ' + $.number(rows[i].neto_raw/ rows[i].exchange.rate, currency.decimals, currency.decimals_sep, currency.thousands_sep);
						
							let setRow = () =>{
								return '<tr data-id="' + rows[i].id_nv + '">' +
										'<td>' + rows[i].nro + '</td>' +
										'<td>' + rows[i].emision + '</td>' +
										'<td class="left">' + rows[i].cliente + '</td>' +
										'<td class="left">' + rows[i].referencia + '</td>' +
										<!--#4DIF _V3_verifica_permisos_web(_V3_data_username;452)-->'<td>' + montoNeto + '</td>' + <!--#4DENDIF-->
									'</tr>';
							}
							if(access._653 && ids.length){
								if(ids.includes(String(rows[i].id_nv))){
									html  = setRow();
								}
							}else{
								html  = setRow();

							}

							return html;
						}
					},
					detail: {
						url: function(id) {
							var container = $('#sheet-lista-negocios-gastos');
							var idoc = container.data('id');
							var from = container.data('from');
							return '/v3/views/negocios/items2.shtml?oc[negocio][id]=' + id +'&oc[id]='+idoc+'&from='+from
						},
						iframe: false,
						dialog: true
					},
					// Inflexiones
					inflection: {
						singular: 'negocio',
						plural: 'negocios',
						none: 'ningún'
					},
					filters: [
						{ name: 'created_at', type: 'month', caption: 'Fecha de asignacion', range: true, currentMonth: true}
					]
				};

				unaBase.toolbox.search.init(params);

				unaBase.toolbox.menu.init({
					entity: 'Proyectos_compras',
					buttons: []
				});


				if(access._653 && ids.length){
					$('#dialog-search').hide();
				}
			});
		</script>
	</head>
	<body>
		<section id="sheet-lista-negocios-gastos" class="sheet" data-id="<!--#4DTEXT id-->" data-from="<!--#4DTEXT from-->" style="min-width: 900px;">
			<table class="results">
				<thead>
					<tr>
						<th>Número</th>
						<th>Emisión</th>
						<th>Cliente</th>
						<th>Referencia</th>
						<!--#4DIF _V3_verifica_permisos_web(_V3_data_username;452)-->
						<th>Total Neto</th>
						<!--#4DENDIF-->
					</tr>
				</thead>
				<tbody></tbody>
				<tfoot></tfoot>
			</table>
		</section>
	</body>
</html>
