<!DOCTYPE html>
<!--#4DSCRIPT/_V3_proxy_getDtcPorJustificar-->
<html>
	<head>
		<title>Documentos de ventas disponibles</title>
		<meta charset="utf-8">
		<style type="text/css">
			.dialog{
				position: relative;
			}

			.dialog #dialog-menu li[data-name="asociar_dtv_a_factoring"] > button{
				position: absolute!important;
				top: 45px!important;
				right:20px!important;
				border: 2px solid gray!important;
			}
				.dialog #dialog-menu li[data-name="asociar_dtv_a_factoring"] > button > .ui-button-text{
					font-weight: bold;
				}
				
		</style>
		
		<script>
			$(document).ready(function() {
				var tipogasto = "<!--#4DTEXT tipogasto-->";		
				unaBase.toolbox.init();
				var params = {
					url: function() { return '/4DACTION/_V3_get_dtv_por_cobrar'},
					entity: 'dtc_compras',
					searchOff: true,
					data: {
						'id' : "<!--#4DTEXT id-->"
					},
					row: {
						html: function(i, rows) {							
							return '<tr data-id="' + rows[i].id + '" data-cliente="' + rows[i].id_cliente + '" data-saldo="' + rows[i].saldo_por_cobrar_ + '">' +
								'<td>' + rows[i].folio + '</td>' +
								'<td>' + rows[i].emision + '</td>' +		
								'<td>' + rows[i].estado + '</td>' +
								'<td class="left">' + rows[i].cliente + '</td>' +
								'<td class="left">' + rows[i].referencia + '</td>' +
								'<td>' + rows[i].neto + '</td>' +
								'<td>' + rows[i].total + '</td>' +		
								'<td>' + rows[i].saldo_por_cobrar + '</td>' +
								'<td><input style="width:20px!important;height:20px!important" class="select" name="dtvselect[id]'+rows[i].id+'" value="'+rows[i].id+'" type="checkbox"></td>' +						
							'</tr>'
						}
					},
					inflection: {
						singular: 'negocio',
						plural: 'negocios',
						none: 'ningún'
					},									
					filters: [
						// { name: 'tipo_dtc', type: 'autocomplete', caption: 'Tipo Doc.', dataSource: 'getTiposDocDeCompras' }
					]
				};

				unaBase.toolbox.search.init(params);
				unaBase.toolbox.menu.init({
					entity: 'dtv_compras',
					buttons: ['searchOff',"asociar_dtv_a_factoring"]					  
				});


				// counter
				$(".dialog #dialog-menu").append('<h5 class="counter"><!--#4DTEXT _V3_defaultCurrencySymbol--><span class="numeric currency">0</span></h5>');
				$("#dtv-por-cobrar table tbody").on("click", "input.select", function(){
					var selected = $("#dtv-por-cobrar table tbody tr td input:checked");
					var sum = 0;
					if (selected.length > 0) {
						selected.each(function(key, item){
							sum += $(this).closest("tr").data("saldo");
						});
						$(".dialog #dialog-menu").find('h5 > span').text(sum);
					}else{
						$(".dialog #dialog-menu").find('h5 > span').text("0");
					}

					$('.dialog #dialog-menu span.numeric.currency').number(true, currency.decimals, ',', '.');
				});



			});
		</script>
		<style type="text/css">
			h5.counter{
				position: absolute;
				top:50px;
				right:150px;
				font-weight:bold;
				z-index:2;
				font-size:15px!important;
				color: gray;
			}
		</style>
	</head>
	<body>		
		<section id="dtv-por-cobrar" class="sheet" data-oc="<!--#4DTEXT id-->">
			<table class="results">
				<thead>
					<tr>
						<th width="5%">Número</th>
						<th width="10%">Emisión</th>			
						<th width="3%">Estado</th>
						<th width="20%">Cliente</th>
						<th width="20%">Referencia</th>						
						<th width="10%">Neto [$]</th>
						<th width="10%">Total [$]</th>
						<th width="10%">Por Cobrar [$]</th>
						<th width="2%">Seleccionar para agregar</th>
					</tr>
				</thead>
				<tbody></tbody>
				<tfoot></tfoot>
			</table>
		</section>
	</body>
</html>
