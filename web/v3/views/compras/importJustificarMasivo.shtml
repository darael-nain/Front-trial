<!DOCTYPE html>
<!--#4DSCRIPT/_V3_serverInfo-->
<html>
	<head>
		<meta charset="utf-8">
		<title>Justificar gastos masivos</title>
		<script>

			let modulo = $('html > body.menu.home > aside > div > div > ul > li.active').data('name').toUpperCase();

			var importLoad = function(append, element) {			

				let sid = '';					
				$.each($.cookie(),function(clave,valor) {sid+= (valor + ' '); });

				let data = new FormData();
				let attachment = $('.ui-dialog fieldset [name="upload[attachment]"]').get(0).files[0];
				let separate = $('input[name="separate"]').prop('checked');
				data.append('upload[attachment]', attachment);
				data.append('separate', separate);
				data.append('sid', sid);

				if (modulo == "GASTOS") {
					data.append('tipo', "OC");
				}else{
					data.append('tipo', "FXR");
				}			
				
				if (attachment) {
					unaBase.ui.block();
					$.ajax({
						url: nodeUrl + '/importJustificarMasivos?hostname=' + window.location.origin + '&id=' + $('section.sheet').data('id') + '&sid=' + encodeURIComponent(sid),
						type: 'POST',
						contentType: false,
						data: data,
						processData: false,
						cache: false,
						success: function(dataLog) {
							
							
							if (dataLog.success) {
								if (dataLog.rows) {
									$.each(dataLog.rows, function(key, row) {
										
										$.ajax({
											url: '/4DACTION/_V3_getLogValidacionByIndex',
											data: {
			
												id: row.idToVal,
												index: 'Orden_de_compra|' + String(row.idToVal),
												tablita: 'Orden_de_compra'
											},
											dataType: 'json',
											success: function(subdata) {
												//var record_name = $('input[name="oc[tipo_gastos][des]"]').val();
												var record_name = 'Gasto';
											
												var userlink = {};

												$.each(subdata.rows, function(key, entry) {
													userlink[entry.username] = {
														record: entry.record,
														username: entry.username,
														name: entry.full_name,
														email: entry.email,
														block_email: entry.block_email
													};
												});
												let ocultar_antes_despues_email_oc=false;
												// Construye tabla con valores del item en el negocio despues de haber creado la oc
												if (subdata.origen_gasto == "PROYECTO" || subdata.origen_gasto == "PRESUPUESTO"){

													if (!ocultar_antes_despues_email_oc) {
														var table = $('<table border="0" width="100%" style="display:table;border-collapse:separate;border-spacing:0;margin:0 0 20px 0">\
														<thead>\
															<tr style="font-family:Open Sans,sans-serif !important;background-color:rgb(189,189,192);font-weight:bold;text-align:center;">\
																<th style="font-size:10px;color:white;vertical-align:bottom;padding:5px;border:1px solid lightgray;" rowspan="2">NEGOCIO</th>\
																<th style="font-size:10px;color:white;vertical-align:bottom;padding:5px;padding:5px;border:1px solid lightgray;" rowspan="2">CÓDIGO</th>\
																<th style="font-size:10px;color:white;vertical-align:bottom;padding:5px;border:1px solid lightgray;" rowspan="2">NOMBRE</th>\
																<th style="font-size:10px;color:white;vertical-align:bottom;padding:5px;border:1px solid lightgray;" rowspan="2">VENTA</th>\
																<th style="font-size:10px;color:white;vertical-align:bottom;padding:5px;border:1px solid lightgray;" rowspan="2">PRESUP.</th>\
																<th style="font-size:10px;color:white;vertical-align:bottom;padding:5px;border:1px solid lightgray;" rowspan="2">GASTO ACTUAL</th>\
																<th style="font-size:10px;color:white;padding:5px;border:1px solid lightgray;" colspan="2">ANTES</th>\
																<th style="font-size:10px;color:white;padding:5px;border:1px solid lightgray;" colspan="2">DESPUÉS</th>\
															</tr>\
															<tr style="font-family:Open Sans,sans-serif !important;background-color:rgb(189,189,192);color:white;font-size:10px;font-weight:bold;text-align:center;">\
																<th style="font-size:10px;color:white;font-size:10px;color:white;padding:5px;border:1px solid lightgray;">G. REAL</th>\
																<th style="font-size:10px;color:white;padding:5px;border:1px solid lightgray;">DIFERENCIA</th>\
																<th style="font-size:10px;color:white;padding:5px;border:1px solid lightgray;">G. REAL</th>\
																<th style="font-size:10px;color:white;padding:5px;border:1px solid lightgray;">DIFERENCIA</th>\
															</tr>\
														</thead>\
														<tbody></tbody>\
													</table>');
													}else{
														var table = $('<table border="0" width="100%" style="display:table;border-collapse:separate;border-spacing:0;margin:0 0 20px 0">\
															<thead>\
																<tr style="font-family:Open Sans,sans-serif !important;background-color:rgb(189,189,192);font-weight:bold;text-align:center;">\
																	<th style="font-size:10px;color:white;vertical-align:bottom;padding:5px;border:1px solid lightgray;" rowspan="2">NEGOCIO</th>\
																	<th style="font-size:10px;color:white;vertical-align:bottom;padding:5px;padding:5px;border:1px solid lightgray;" rowspan="2">CÓDIGO</th>\
																	<th style="font-size:10px;color:white;vertical-align:bottom;padding:5px;border:1px solid lightgray;" rowspan="2">NOMBRE</th>\
																	<th style="font-size:10px;color:white;vertical-align:bottom;padding:5px;border:1px solid lightgray;" rowspan="2">VENTA</th>\
																	<th style="font-size:10px;color:white;vertical-align:bottom;padding:5px;border:1px solid lightgray;" rowspan="2">PRESUPUESTO</th>\
																	<th style="font-size:10px;color:white;vertical-align:bottom;padding:5px;border:1px solid lightgray;" rowspan="2">GASTO ACTUAL</th>\
																</tr>\
															</thead>\
															<tbody></tbody>\
														</table>');
													}
															
													$.each(subdata.items, function(key, item) {
														var rowsItem = '';

														rowsItem += '<tr style="font-family:Open Sans,sans-serif !important;">';

														rowsItem += '<td style="color:rgb(103,103,103);font-size:11px;text-align:left;padding:5px;border:1px solid lightgray;">'+ item.infoNeg +'</td>';

														rowsItem += '<td style="color:rgb(103,103,103);font-size:10px;text-align:center;padding:5px;border:1px solid lightgray;">'+ item.codigo +'</td>';

														rowsItem += '<td style="color:rgb(103,103,103);font-size:10px;text-align:left;padding:5px;border:1px solid lightgray;">'+ item.nombre +'</td>';

														rowsItem += '<td style="color:rgb(103,103,103);font-size:10px;text-align:left;padding:5px;border:1px solid lightgray;">'+ item.venta +'</td>';

														rowsItem += '<td style="color:rgb(103,103,103);font-size:11px;text-align:right;padding:5px;border:1px solid lightgray;">'+ item.presupuestado +'</td>';

														rowsItem += '<td style="color:black;font-weight:bold;font-size:11px;text-align:right;padding:5px;border:1px solid lightgray;">'+ item.gasto +'</td>';

														if (!ocultar_antes_despues_email_oc) {

															rowsItem += '<td style="color:rgb(103,103,103);font-size:11px;text-align:right;padding:5px;border:1px solid lightgray;">'+ item.realAntes +'</td>';

															if (item.porGastarAntes_ < 0 ) {
																rowsItem += '<td style="color:red;font-size:11px;text-align:right;padding:5px;border:1px solid lightgray;">'+ item.porGastarAntes +'</td>';
															}else{
																rowsItem += '<td style="color:rgb(103,103,103);font-size:11px;text-align:right;padding:5px;border:1px solid lightgray;">'+ item.porGastarAntes +'</td>';
															}


															rowsItem += '<td style="color:rgb(103,103,103);font-size:11px;text-align:right;padding:5px;border:1px solid lightgray;">'+ item.realDespues +'</td>';

															if (item.porGastarDespues_ < 0 ) {
																rowsItem += '<td style="color:red;font-size:11px;text-align:right;padding:5px;border:1px solid lightgray;">'+ item.porGastarDespues +'</td>';
															}else{
																rowsItem += '<td style="color:rgb(103,103,103);font-size:11px;text-align:right;padding:5px;border:1px solid lightgray;">'+ item.porGastarDespues +'</td>';
															}

														}


														rowsItem += '</tr>';
														table.find('tbody').append(rowsItem);
													});

												}else{
													var table = "";
												}
												
												$.each(userlink, function(key, entry) {
													var email_link = generate_link_email_validacion(subdata, entry.username, table);
													
													var comentarioEmisor = '<p style="font-weight:bold;background-color:#f0f0f0;padding:5px!important;margin:0!important;border:1px solid #f0f0f0;box-sizing:border-box;">Mensaje del emisor ('+ $('html > body.menu.home > aside > div > div > h1').text() +'):</p><div style="margin:0 5px 0 5px!important"><strong></strong></div>';

														record_name = "Orden de Compra";
													
													

													if (!entry.block_email){
														
														// solicita validacion
												
															let paramsData = {
																to: entry.username,
																toName: entry.name,
																toEmail: entry.email,
															  template: 'validation_request',
															  document: record_name,
															  index: entry.record.index,
															  title: entry.record.text,
															  extra: email_link + comentarioEmisor,
															  detail_uri: 'compras/content.shtml',
															  id_item: entry.record.id,
															  attach: true
															}
												        const email = import("../../script/unabase/email.js?1");
												        email.then(functions => {	
												          functions.notifyRequestValidationOC(paramsData);
												        });
														

													}
												
												});
											}
										});
									});

									unaBase.ui.unblock();
									toastr.success('Justificado con exito!');
								}
								

							

								unaBase.ui.unblock();
									toastr.success('Justificado con exito!');
								setTimeout(function() {
									unaBase.toolbox.search.save();
									unaBase.toolbox.search.restore();
								}, 1000);
								$(element).parentTo('.ui-dialog-content').dialog('close');
							} else {
								unaBase.ui.unblock();
								toastr.warning('No fue posible importar la información!');
								let errorMsg = typeof dataLog.errorMsg != 'undefined' ? dataLog.errorMsg.replace(/SL/g, '<br>'): '';
								alert("<span style='font-weight:bold;'>Falta información:</span><br><br>" + errorMsg + "<br><span style='font-weight:bold;'>Verfica tu excel y vuelve a intentar.</span>");
								$(element).parentTo('.ui-dialog-content').dialog('close');
							}
						},
						fail: function(e1,e2,e3) {
							toastr.warning('No fue posible realizar la cargar de los datos debido a un problema con el servidor, Por favor intente nuevamente. <p><small>Si el inconveniente persiste, por favor comuniquese con Soporte@una.cl.</small></p>');
						}
					});
				}else{
					alert("Falta seleccionar archivo excel.");
				}
				
			};

				var generate_link_email_validacion = function(data, loginValidator, table) {
								
								if (table != "") {
									var htmlObject_link = $('<section> \
										<div> \
										<p style="font-weight:bold;background-color:#f0f0f0;padding:5px!important;margin:0!important;border:1px solid #f0f0f0;box-sizing:border-box;">Motivo:</p> \
										<ul style="list-style-type: none; list-style-position: outside;padding:0px!important;"></ul> \
										<div style="margin-bottom: 10px;"><a style="margin-left:10px; font-size: 16px;background-color: lightblue;color: black;padding: 5px; border-radius: 5px;" href="'+nodeUrl+'/expenses/tovalidate">Bandeja de validación</a><span> acá puedes entrar a un listado de gastos por validar.</span></div> \
										<div class="table"><p style="font-weight:bold;background-color:#f0f0f0;padding:5px!important;margin:0!important;border:1px solid #f0f0f0;box-sizing:border-box;">Estatus de gasto del ítem en el negocio:</p><div></div></div> \
										</div> \
										<!--<span>Ingrese algún comentario. Se notificará cuando el gasto sea autorizado o rechazado.</span> \
										<textarea required name="comentario"></textarea>--> \
									</section>');
								}else{
									var htmlObject_link = $('<section> \
										<div> \
										<p style="font-weight:bold;background-color:#f0f0f0;padding:5px!important;margin:0!important;border:1px solid #f0f0f0;box-sizing:border-box;">Motivo:</p> \
										<ul style="list-style-type: none; list-style-position: outside;padding:0px!important;"></ul> \
									</section>');
								}

								var criteria_list_link = $('<ul>');
								$.each(data.rows, function(i, item) {
									if (criteria_list_link.find('li[data-motivo="' + item.motivo + '"]').length == 0) {
										var li = '<li data-motivo="' + item.motivo + '"><div style="font-size: inherit !important;">' + item.motivo + '</div>';
										li += '<ul style="list-style-type:none!important;margin:0px!important;padding:0px!important;">';
										$.each(data.rows, function(k, user) {
											if ($(li).find('li[data-user="' + user.username + '"]').length == 0 && item.motivo == user.motivo) {
												if (user.username == loginValidator) {

													li += '<li style="margin:10px!important;" data-user="' + user.username + '"><span><a style="font-size: inherit !important; display: inline-block !important; padding: 10px!important; background-color: rgb(67,175,124) !important; border: 1px solid rgb(67,175,124) !important; border-radius: 3px !important; margin: 5px 10px 5px 0px!important; color:black; text-decoration: underline" href="http://' + window.location.hostname + ':' + window.location.port + '/v3/views/email/express_validation_accepted.shtml?i=' + user.id + '">Validar</a><a style="font-size: inherit !important; display: inline-block !important; padding: 10px!important; background-color: rgb(204,51,0) !important; border: 1px solid rgb(204,51,0) !important; border-radius: 3px !important; margin: 5px 10px 5px 10px!important; color:black; text-decoration: underline" href="http://' + window.location.hostname + ':' + window.location.port + '/v3/views/email/express_validation_rejected.shtml?i=' + user.id + '">Rechazar</a></span></li>';

													/*li += '<li data-user="' + user.username + '"><span style="font-size: inherit !important; display: inline-block !important; padding: 3px; background-color: rgb(240,240,240) !important; border: 1px solid rgb(220,220,220) !important; border-radius: 3px !important; margin: 3px;text-transform:capitalize!important;">' + user.full_name.toLowerCase() + '</span></li>';*/

												} else{
													li += '<li data-user="' + user.username + '"><span style="font-size: inherit !important; display: inline-block !important; padding: 3px; background-color: rgb(240,240,240) !important; border: 1px solid rgb(220,220,220) !important; border-radius: 3px !important; margin: 3px;text-transform:capitalize!important;">Debe validar ' + user.full_name.toLowerCase() + '</span></li>';
												}
											}
										});
										li += "</ul>";
										li += "</li>";
										criteria_list_link.append(li);
									}
								});

								htmlObject_link.find('ul').append(criteria_list_link.html());
								if (table != "") {
									htmlObject_link.find('div.table > div').append(table[0].outerHTML);
								}
								email_link = htmlObject_link.find('div')[0].outerHTML;
								return email_link;
							};


			$(document).ready(function() {

				let fileName = '';
				let modulo = $('html > body.menu.home > aside > div > div > ul > li.active').data('name').toUpperCase();

				if (modulo == 'GASTOS') {
					fileName = "orden_de_compra_S_N";
					$('.separate').find('label').text('Marcar para crear sólo una Orden de compra por todo el excel.');
					$('.btn-create-gasto').html('<label style="font-weight:bold;">Subir y justificar OC</label>');
				}else{
					fileName = "rendicion_S_N";
					$('.separate').find('label').text('Marcar para crear sólo una Rendición por todo el excel.');
					$('.btn-create-gasto').html('<label style="font-weight:bold;">Subir y justificar FXR</label>');
				}

				unaBase.toolbox.init();

				$('.ui-dialog fieldset.export button').button({
					icons: {
						primary: 'ui-icon-circle-arrow-s'
					},
					text: true
				}).click(function() {

					let sid = '';					
					$.each($.cookie(),function(clave,valor) {sid+= (valor + ' '); });

					var url = nodeUrl + '/exportPlantillaJustificarMasivo?hostname=' + window.location.origin + '&sid=' + encodeURIComponent(sid);

					var download = window.open(url).blur();
					window.focus();

					download.close();

				});

				$('.ui-dialog fieldset.import button').button({
					icons: {
						primary: 'ui-icon-circle-arrow-n'
					},
					text: true
				}).click(function() {
					var element = this;
					var items = $('section.sheet > table.items > tbody').find('tr');
					if (items.length > 0) {
						var itemsConGastos = false;
						$('section.sheet > table.items > tbody').find('tr').each(function(key, item) {
							if ($(item).find('td:first-of-type').find('button.remove.item').css('visibility') == 'hidden') {
								itemsConGastos = true;
							}
						});
						if (itemsConGastos) {
							confirm("<!--#4DTEXT _V3_escapeString(etiqueta_cotizacion)--> actualmente tiene ítems agregados que cuentan con gastos asociados.\n\nSolamente es posible añadir ítems\n\n¿Desea continuar?").done(function(option) {
								if (option) {
									importLoad(true, element);
								}
							});
						} else {
							confirm("La cotización actualmente tiene ítems agregados.\n\n¿Desea reemplazar o agregar?", "Agregar", "Reemplazar").done(function(option) {
								importLoad(option, element);
							});
						}
					} else {
						importLoad(false, element);
					}
				});

			});
		</script>
	</head>
	<body>
		<fieldset class="export">
			<legend>Paso 1 - Descargar plantilla Excel</legend>
			<button>Descargar plantilla de ayuda</button>
		</fieldset>
		<p style="padding: 5px; font-weight: bold;">Una vez descargada la plantilla Excel, puede reemplazar los datos de prueba con los definitivos.</p>
		<p style="padding: 5px; font-weight: bold;">Para cargar y justificar masivo, vuelve aquí y cargue el archivo excel utilizando el siguiente formulario (paso 2).</p>
		<fieldset class="import">
			<legend>Paso 2 - Subir y justificar desde Excel</legend>
			<label>
				<span style="width: 200px; margin-bottom: 5px;">Archivo XLSX</span>
				<input style="width: 100% !important; display: block !important;" type="file" name="upload[attachment]" accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
			</label><br><br>
			<!-- <div style="margin-bottom:15px" class="separate">
				<input id="separate" type="checkbox" name="separate">
				<label for="separate"></label>
			</div>	 -->		
			<button style="border:2px solid gray;" class="btn-create-gasto">Justificar gastos</button>
		</fieldset>
	</body>
</html>
