<!DOCTYPE html>
<html>
	<head>
		<!--#4DSCRIPT/_V3_proxy_getComprasContent-->
		<title>Archivos adjuntos</title>
		<meta charset="utf-8">
		<script>
			$(document).ready(function() {
				// Constante para el tamaño máximo (20MB en bytes)
				const MAX_FILE_SIZE = 20 * 1024 * 1024; 

				var loadList = function() {
					$('section.sheet table.upload > tbody > *').remove();
					$.ajax({
						url: '/4DACTION/_V3_getUpload',
						data: {
							index: 'Orden_de_compra|<!--#4DTEXT [Orden_de_compra]Id_Ocompra-->|@',
							list: true
						},
						dataType: 'json',
						success: function(data) {
							var htmlObject;
							$.each(data.rows, function(key, item) {
								htmlObject = $('<tr data-id="' + item.id + '" data-username="' + item.username + '" data-index="' + item.index + '">' +
									'<td>' + item.filename + '</td>' +
									'<td>' + ((item.created_at !== undefined)? '<time datetime="' + new Date(item.created_at).toISOString() + '">' + $.datepicker.formatDate('dd-mm-yy', new Date(item.created_at)) + ' <span>' + new Date(item.created_at).toTimeString().match( /^([0-9]{2}:[0-9]{2}:[0-9]{2})/ )[0].substring(0, 5) +  '</span></time>' : 'N/A' ) + '</td>' +
									'<td>' + item.user_full_name + '</td>' +
									'<td class="options">' +
									'<button class="u-display preview"></button>' +
									'<button class="u-display download"></button>' +
									'<button class="delete"></button>' +
									'</td>' +
								'</tr>');

								var is_supported = false;
								$.each(navigator.mimeTypes, function(index, mimetype) {
									if (item.mimetype == mimetype.type) {
										is_supported = true;
										return false;
									}
								});

								if (!is_supported) {
									switch(item.mimetype) {
										case 'image/jpeg':
											is_supported = true;
											break;
										case 'image/png':
											is_supported = true;
											break;
										case 'image/gif':
											is_supported = true;
											break;
										default:
											is_supported = false;
											break;
									}
								}

								if (is_supported)
									htmlObject.find('button.preview').button({
										caption: 'Vista previa',
										icons: {
											primary: 'ui-icon-search'
										},
										text: false
									}).click(function() {
										$.fancybox(
										{
											'autoScale'			: true,
											'type'				: 'iframe',
											'href'				: '/4DACTION/_V3_getUpload?index=' + $(event.target).parentTo('tr').data('index')
										});
									});
								htmlObject.find('button.download').button({
									caption: 'Descargar',
									icons: {
										primary: 'ui-icon-circle-arrow-s'
									},
									text: false
								}).click(function(event) {
									//window.open('/4DACTION/_V3_getUpload?index=' + $(event.target).parentTo('tr').data('index') + '&download=true');

									window.open('/4DACTION/_V3_getUpload?index=' + $(this).closest('tr').data('index') + '&download=true');

								});
								htmlObject.find('button.delete').button({
									caption: 'Eliminar',
									icons: {
										primary: 'ui-icon-trash'
									},
									text: false
								}).click(function(event) {
									confirm('¿Está seguro que desea eliminar el adjunto?').done(function(accept) {
										if (accept)
											$.ajax({
												url: '/4DACTION/_V3_removeUpload',
												data: {
													index: $(event.target).parentTo('tr').data('index')
												},
												dataType: 'json',
												success: function(data) {
													if (data.success) {
														toastr.success('El adjunto fue eliminado con éxito!');
														$('section.sheet .upload [name="attachment["]').val('');
														loadList();
													} else
														toastr.error('El adjunto no pudo eliminarse. Es posible que esté bloqueado.');
												}
											});
									});
								});
								$('section.sheet table.upload > tbody').append(htmlObject);
							});
						}
					});
				};

				loadList();
			

				$('section.sheet .upload button').button({
					icons: {
						primary: 'ui-icon-circle-arrow-n'
					},
					text: true
				}).click(function () {
					var is_valid = true;

					$('section.sheet .upload input[required]').each(function (key, element) {
						if ($(element).val() == '') {
							is_valid = false;
							return false;
						}
					});

					// Validar tamaño del archivo
					var fileInput = $('section.sheet .upload [name="upload[attachment]"]').get(0);
					if (fileInput.files.length > 0) {
						var fileSize = fileInput.files[0].size;
						if (fileSize > MAX_FILE_SIZE) {
							toastr.error('El archivo excede el tamaño máximo permitido de 20MB');
							is_valid = false;
							return;
						}
					}

					if (is_valid) {
						var file = $('section.sheet .upload [name="upload[attachment]"]').get(0).files[0];

						// Validar tamaño máximo (20MB)
						if (file && file.size > 20 * 1024 * 1024) {
							toastr.error('El archivo supera el tamaño máximo permitido de 20MB.');
							return;
						}

						unaBase.ui.block();
						var data = new FormData();
						data.append('file', fileInput.files[0]);
						data.append('filename', $('section.sheet .upload [name="upload[filename]"]').val());
						data.append('index', 'Orden_de_compra|<!--#4DTEXT [Orden_de_compra]Id_Ocompra-->|' + Math.floor(Math.random() * 2147483647));

						$.ajax({
							url: '/4DACTION/_V3_setUpload',
							type: 'POST',
							contentType: false,
							data: data,
							processData: false,
							cache: false,
							success: function (data) {
								toastr.success('Archivo cargado con éxito!');
								$('section.sheet .upload input[required]').val(undefined);
								loadList();
								unaBase.ui.unblock();
							},
							error: function(xhr, status, error) {
								toastr.error('Error al cargar el archivo: ' + error);
								unaBase.ui.unblock();
							}
						});
					} else if (!is_valid && fileInput.files.length === 0) {
						toastr.error(NOTIFY.get('ERROR_DATA'));
					}
				});
				
				// Agregar validación en tiempo real al seleccionar el archivo
				$('section.sheet .upload [name="upload[attachment]"]').on('change', function() {
					if (this.files.length > 0) {
						var fileSize = this.files[0].size;
						if (fileSize > MAX_FILE_SIZE) {
							toastr.warning('El archivo seleccionado excede el tamaño máximo permitido de 20MB');
							this.value = ''; // Limpiar la selección
						}
					}
				});
			});
		</script>
	</head>
	<body>
		<section class="sheet">
			<footer>
				<article class="upload">
					<h1>Subir nuevo archivo</h1>
					<label>
						<span>Nombre</span>
						<input type="text" name="upload[filename]" class="inputCustom" required>
					</label>
					<label>
						<span>Archivo (máx. 20MB)</span>
						<input type="file" name="upload[attachment]" required>
					</label>
					<button>Subir</button>
				</article>
			</footer>
			<table class="upload">
				<thead>
					<tr>
						<th>Nombre</th>
						<th>Fecha</th>
						<th>Subido por</th>
						<th>Acción</th>
					</tr>
				</thead>
				<tbody></tbody>
			</table>
		</section>
	</body>
</html>
