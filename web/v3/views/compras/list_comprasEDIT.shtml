	function tooltipsList(ocID,ocBtn){

	  var tooltipHtml;
		      $.ajax({
		                'url':'/4DACTION/_V3_getItemFromOcList',
		                data:{
		                  'id_Oc':  ocID
		                },
		                dataType:'json',
		                async: false,
		                success:function(data){

		                  var trbody;

		                  for(var k = 0; k < data.rows.length; k++){

		                  	var diferencia = parseInt(data.rows[k].aPresupuesto) - parseInt(data.rows[k].aGastoActual);
								var diferenciaV = parseInt(data.rows[k].aPresupuesto) - parseInt(data.rows[k].aGastoActual) - parseInt(data.rows[k].aItem);

		                  	var aVenta = $.number(data.rows[k].aVenta, currency.decimals, currency.decimals_sep, currency.thousands_sep);
		                  	var aPresupuesto = $.number(data.rows[k].aPresupuesto, currency.decimals, currency.decimals_sep, currency.thousands_sep);
		                  	var aGastoActual = $.number(data.rows[k].aGastoActual, currency.decimals, currency.decimals_sep, currency.thousands_sep);
		                  	var aItem = $.number(data.rows[k].aItem, currency.decimals, currency.decimals_sep, currency.thousands_sep);
		                  	var aDiferencia =  $.number(diferencia, currency.decimals, currency.decimals_sep, currency.thousands_sep);
								var aDiferenciaValidado = $.number(diferenciaV, currency.decimals, currency.decimals_sep, currency.thousands_sep);


		                  if(aVenta<0){

		                  	var tdVenta = "<td class='rightNum redTd'>"+aVenta+"</td>";
		                  }else {
		                  	
		                  	var tdVenta = "<td class='rightNum'>"+aVenta+"</td>";
		                  }

		                  	if(aPresupuesto<0){

		                  	var tdPresupuesto = "<td class='rightNum redTd'>"+aPresupuesto+"</td>";
		                  }else {
		                  	
		                  	var tdPresupuesto = "<td class='rightNum'>"+aPresupuesto+"</td>";
		                  }

		                  	if(aGastoActual<0){

		                  	var tdGastoActual = "<td class='rightNum redTd'>"+aGastoActual+"</td>";
		                  }else {
		                  	
		                  	var tdGastoActual = "<td class='rightNum'>"+aGastoActual+"</td>";
		                  }
		                  	if(aItem<0){

		                  	var tdItem = "<td class='rightNum redTd boldtext'>"+aItem+"</td>";
		                  }else {
		                  	
		                  	var tdItem = "<td class='rightNum boldtext'>"+aItem+"</td>";
		                  }

		                  	if(aDiferencia<0){

		                  	var tdDiferencia = "<td class='rightNum redTd'>"+aDiferencia+"</td>";
		                  }else {
		                  	
		                  	var tdDiferencia = "<td class='rightNum'>"+aDiferencia+"</td>";
		                  }
	                        if(aDiferenciaValidado<0){

	                        var tdDiferenciaValidado = "<td class='rightNum redTd'>"+aDiferenciaValidado+"</td>";
	                      }else {
	                        
	                        var tdDiferenciaValidado = "<td class='rightNum'>"+aDiferenciaValidado+"</td>";
	                      }



		                  	if(typeof trbody !== 'undefined'){
			                  	trbody += "<tr>\
			                      <td>"+data.rows[k].aNegocio+"\
			                      </td>\
			                      <td>"+data.rows[k].aNombre+"\
			                      </td>"+tdVenta+tdPresupuesto+tdGastoActual+tdItem+tdDiferencia+tdDiferenciaValidado+"\
			                    </tr>";
		                  		
		                  	}else {
			                  	trbody = "<tr>\
			                      <td>"+data.rows[k].aNegocio+"\
			                      </td>\
			                      <td>"+data.rows[k].aNombre+"\
			                      </td>"+tdVenta+tdPresupuesto+tdGastoActual+tdItem+tdDiferencia+tdDiferenciaValidado+"\
			                    </tr>";
		                  		
		                  	}
		                  }

		                  tooltipHtml = "<table class='tabletooltip' id='table"+ocID+"' >\
		                  <thead>\
		                    <tr>\
		                      <tr><th colspan='3' class='blacknv'>Costo</th><th class='greynv'>Presupuestado</th><th class='orangenv'>Actual</th><th class='orange2nv'>Por validar</th><th class='greennv' colspan='2'>Diferencia</th></tr>\
		                      <th class='blacknv'>Negocio\
		                      </th>\
		                      <th class='blacknv'>Ítem\
		                      </th>\
		                      <th class='blacknv'>Venta\
		                      </th>\
		                      <th class='greynv'>Presupuesto\
		                      </th>\
		                      <th class='orangenv'>Gasto Real\
		                      </th>\
		                      <th class='orange2nv'>Monto\
		                      </th>\
		                      <th class='greennv'>Actual\
		                      </th>\
		                      <th class='greennv'>Después de validar\
		                      </th>\
		                    </tr>\
		                  </thead>\
		                  <tbody>\
		                  "+trbody+"\
		                  </tbody>\
		                  </table>";


		                  ocBtn.title = tooltipHtml;
		                }
		            });		

	}
