	<script>
		// Configuración de timeouts y reintentos
		const CONFIG = {
			timeout: 30000,           // Timeout en milisegundos (30 segundos)
			maxRetries: 3,            // Máximo número de reintentos
			retryDelay: 2000,         // Delay entre reintentos en milisegundos
			backendTimeout: 25000     // Timeout del backend (menor que el frontend)
		};

		// Función para mostrar mensajes de error
		function mostrarError(mensaje) {
			var modalContent = document.getElementById('modalContent');
			var modalLoading = document.getElementById('modalLoading');

			if (modalLoading) modalLoading.style.display = 'none';
			if (modalContent) modalContent.style.display = 'block';

			modalContent.innerHTML = '<div class="alert alert-danger" style="margin: 20px;">' +
				'<h4><i class="fa fa-exclamation-triangle"></i> Error</h4>' +
				'<p>' + mensaje + '</p>' +
				'<button class="btn btn-primary" onclick="volverACategorias()">Volver a Categorías</button>' +
				'</div>';
		}

		// Función para mostrar mensajes de éxito
		function mostrarExito(mensaje) {
			var modalContent = document.getElementById('modalContent');
			var modalLoading = document.getElementById('modalLoading');

			if (modalLoading) modalLoading.style.display = 'none';
			if (modalContent) modalContent.style.display = 'block';

			modalContent.innerHTML = '<div class="alert alert-success" style="margin: 20px;">' +
				'<h4><i class="fa fa-check-circle"></i> Éxito</h4>' +
				'<p>' + mensaje + '</p>' +
				'<button class="btn btn-primary" onclick="volverACategorias()">Volver a Categorías</button>' +
				'</div>';
		}

		// Función para mostrar loading
		function mostrarLoading(mensaje = 'Cargando...') {
			var modalContent = document.getElementById('modalContent');
			var modalLoading = document.getElementById('modalLoading');

			if (modalLoading) modalLoading.style.display = 'block';
			if (modalContent) modalContent.style.display = 'none';
		}

		// Función para ocultar loading
		function ocultarLoading() {
			var modalLoading = document.getElementById('modalLoading');
			if (modalLoading) modalLoading.style.display = 'none';
		}

		// Función para hacer peticiones AJAX con retry automático
		function ajaxWithRetry(config, maxRetries = CONFIG.maxRetries, retryDelay = CONFIG.retryDelay) {
			return new Promise((resolve, reject) => {
				let intento = 1;

				function hacerPeticion() {
					$.ajax({
						...config,
						timeout: CONFIG.timeout,
						success: function(data) {
							resolve(data);
						},
						error: function(xhr, status, error) {
							// Si es timeout y no hemos agotado los intentos, reintentar
							if ((status === 'timeout' || xhr.status === 408) && intento < maxRetries) {
								console.log(`Timeout en petición AJAX, reintentando... Intento ${intento + 1} de ${maxRetries}`);
								intento++;
								setTimeout(hacerPeticion, retryDelay);
							} else {
								reject({ xhr, status, error, intentos: intento });
							}
						}
					});
				}

				hacerPeticion();
			});
		}

		// Función para escapar caracteres HTML especiales
		function escapeHtml(text) {
			if (!text) return '';
			var map = {
				'&': '&amp;',
				'<': '&lt;',
				'>': '&gt;',
				'"': '&quot;',
				"'": '&#039;'
			};
			return text.replace(/[&<>"']/g, function(m) { return map[m]; });
		}

		// Función para mostrar la descripción completa en un modal
		function mostrarDescripcionCompleta(descripcion, nombre, fecha, hora) {
			// Crear el modal si no existe
			var modalDescripcion = document.getElementById('modalDescripcion');
			if (!modalDescripcion) {
				modalDescripcion = document.createElement('div');
				modalDescripcion.id = 'modalDescripcion';
				modalDescripcion.className = 'modal-descripcion';
				document.body.appendChild(modalDescripcion);
			}

			// Formatear la descripción para el modal
			var descripcionFormateada = formatearDescripcion(descripcion);

			// Contenido del modal
			modalDescripcion.innerHTML = `
				<div class="modal-descripcion-content">
					<div class="modal-descripcion-header">
						<span class="close" onclick="cerrarModalDescripcion()">&times;</span>
						<h4 class="modal-descripcion-title">Descripción Completa del Cambio</h4>
					</div>
					<div class="modal-descripcion-body">
						<div class="item-info">
							<p><strong>Item:</strong> ${escapeHtml(nombre)}</p>

		// Función para copiar la descripción al portapapeles
		function copiarDescripcion() {
			var modalDescripcion = document.getElementById('modalDescripcion');
			if (!modalDescripcion) return;

			// Obtener el texto de la descripción (sin formato HTML)
			var descripcionTexto = modalDescripcion.querySelector('.descripcion-texto').textContent || 
								  modalDescripcion.querySelector('.descripcion-texto').innerText;

			// Crear un elemento temporal para copiar
			var textArea = document.createElement('textarea');
			textArea.value = descripcionTexto;
			document.body.appendChild(textArea);
			textArea.select();

			try {
				// Intentar copiar al portapapeles
				var successful = document.execCommand('copy');
				if (successful) {
					// Mostrar mensaje de éxito
					mostrarMensajeCopiado();
				} else {
					// Fallback: usar la API moderna del portapapeles
					navigator.clipboard.writeText(descripcionTexto).then(function() {
						mostrarMensajeCopiado();
					}).catch(function() {
						alert('No se pudo copiar la descripción. Por favor, selecciona y copia manualmente.');
					});
				}
			} catch (err) {
				// Fallback: usar la API moderna del portapapeles
				navigator.clipboard.writeText(descripcionTexto).then(function() {
					mostrarMensajeCopiado();
				}).catch(function() {
					alert('No se pudo copiar la descripción. Por favor, selecciona y copia manualmente.');
				});
			}

			// Limpiar
			document.body.removeChild(textArea);
		}

		// Función para mostrar mensaje de copiado exitoso
		function mostrarMensajeCopiado() {
			var modalDescripcion = document.getElementById('modalDescripcion');
			if (!modalDescripcion) return;

			var botonCopiar = modalDescripcion.querySelector('.btn-secondary');
			if (botonCopiar) {
				var textoOriginal = botonCopiar.innerHTML;
				botonCopiar.innerHTML = '<i class="fa fa-check"></i> ¡Copiado!';
				botonCopiar.classList.remove('btn-secondary');
				botonCopiar.classList.add('btn-success');
				botonCopiar.disabled = true;

				// Restaurar después de 2 segundos
				setTimeout(function() {
					botonCopiar.innerHTML = textoOriginal;
					botonCopiar.classList.remove('btn-success');
					botonCopiar.classList.add('btn-secondary');

		// Función para formatear la descripción del cambio
		function formatearDescripcion(descripcion) {
			if (!descripcion) return 'No hay descripción disponible';

			// Dividir por líneas y formatear cada una
			var lineas = descripcion.split('\n').filter(linea => linea.trim());
			
			if (lineas.length === 0) return 'No hay descripción disponible';

			var htmlFormateado = '';

			lineas.forEach(function(linea, index) {
				linea = linea.trim();
				
				// Detectar si es un encabezado de categoría (contiene "/" y está en mayúsculas)
				if (linea.includes('/') && linea === linea.toUpperCase()) {
					htmlFormateado += `<div class="categoria-header">${escapeHtml(linea)}</div>`;
				}
				// Detectar si es un encabezado de categoría (contiene "/")
				else if (linea.includes('/') && !linea.includes('=') && !linea.includes(':')) {
					htmlFormateado += `<div class="categoria-header">${escapeHtml(linea)}</div>`;
				}
				// Detectar si es una línea con clave-valor separada por ":"
				else if (linea.includes(':') && !linea.includes('=')) {
					var partes = linea.split(':');
					if (partes.length >= 2) {
						var clave = partes[0].trim();
						var valor = partes.slice(1).join(':').trim();
						
						// Detectar si es un precio o cantidad
						if (clave.toLowerCase().includes('precio') || clave.toLowerCase().includes('cantidad') || 
							clave.toLowerCase().includes('costo') || clave.toLowerCase().includes('total')) {
							htmlFormateado += `<div class="clave-valor destacado">
								<span class="clave">${escapeHtml(clave)}:</span>
								<span class="valor">${escapeHtml(valor)}</span>
							</div>`;
						} else {
							htmlFormateado += `<div class="clave-valor">
								<span class="clave">${escapeHtml(clave)}:</span>
								<span class="valor">${escapeHtml(valor)}</span>
							</div>`;
						}
					} else {
						htmlFormateado += `<div class="linea-texto">${escapeHtml(linea)}</div>`;
					}
				}
				// Detectar si es una línea con asignación separada por "="
				else if (linea.includes('=') && !linea.includes(':')) {
					var partes = linea.split('=');
					if (partes.length >= 2) {
						var clave = partes[0].trim();
						var valor = partes.slice(1).join('=').trim();
						
						// Detectar si es un precio o cantidad
						if (clave.toLowerCase().includes('precio') || clave.toLowerCase().includes('cantidad') || 
							clave.toLowerCase().includes('costo') || clave.toLowerCase().includes('total')) {
							htmlFormateado += `<div class="clave-valor destacado">
								<span class="clave">${escapeHtml(clave)}:</span>
								<span class="valor">${escapeHtml(valor)}</span>
							</div>`;
						} else {
							htmlFormateado += `<div class="clave-valor">
								<span class="clave">${escapeHtml(clave)}:</span>
								<span class="valor">${escapeHtml(valor)}</span>
							</div>`;
						}
					} else {
						htmlFormateado += `<div class="linea-texto">${escapeHtml(linea)}</div>`;
					}
				}
				// Detectar si es una línea que contiene números y moneda
				else if (/\d+\.?\d*\s*\$/.test(linea) || /\$\s*\d+\.?\d*/.test(linea)) {
					htmlFormateado += `<div class="linea-texto moneda">${escapeHtml(linea)}</div>`;
				}
				// Detectar si es una línea que contiene solo números
				else if (/^\d+\.?\d*$/.test(linea)) {
					htmlFormateado += `<div class="linea-texto numero">${escapeHtml(linea)}</div>`;
				}
				// Es texto normal
				else {
					htmlFormateado += `<div class="linea-texto">${escapeHtml(linea)}</div>`;
				}
			});

			return htmlFormateado;
		}

		// Función para obtener la cantidad real de items por categoría
		function obtenerCantidadItemsPorCategoria(categorias, callback, intento = 1) {

			// Obtener SID dinámicamente
			var sid = '';
			if (typeof unaBase !== 'undefined' && unaBase.sid) {
				sid = unaBase.sid.encoded();
			}

			if (!sid) {
				callback(categorias);
				return;
			}

			// Construir URL para obtener todos los items
			var baseUrl = 'https://frank.unabase.com/node/get-business-items';
			var params = {
				id: folioActual,
				hostname: window.location.origin,
				sid: sid
			};

			var fullUrl = baseUrl + '?' + $.param(params);

			$.ajax({
				url: fullUrl,
				type: 'GET',
				dataType: 'json',
				crossDomain: true,
				timeout: CONFIG.timeout,
				success: function (data) {
					if (data && data.rows) {
						// Contar items por categoría
						categorias.forEach(function (categoria) {
							var nombreCategoria = categoria.nombre || categoria.categoria || '';
							var itemsEnCategoria = data.rows.filter(function (item) {
								return item.tipo_item === 'item' &&
									(item.categoria === nombreCategoria || item.nombre_categoria === nombreCategoria);
							});
							categoria.cantidad_real = itemsEnCategoria.length;
						});
					}
					callback(categorias);
				},
				error: function (xhr, status, error) {
					// Si es timeout y no hemos agotado los intentos, reintentar
					if ((status === 'timeout' || xhr.status === 408) && intento < 3) {
						console.log('Timeout en obtenerCantidadItemsPorCategoria, reintentando... Intento ' + (intento + 1));
						setTimeout(function() {
							obtenerCantidadItemsPorCategoria(categorias, callback, intento + 1);
						}, 2000);
					} else {
						console.log('Error en obtenerCantidadItemsPorCategoria después de ' + intento + ' intentos:', error);
						callback(categorias);
					}
				}
			});
		}

		// Función para cargar items de una categoría
		function cargarItemsDeCategoria(categoria, intento = 1) {

			var modalContent = document.getElementById('modalContent');
			var modalLoading = document.getElementById('modalLoading');

			if (modalLoading) modalLoading.style.display = 'block';
			if (modalContent) modalContent.style.display = 'none';

			// Obtener SID dinámicamente
			var sid = '';
			if (typeof unaBase !== 'undefined' && unaBase.sid) {
				sid = unaBase.sid.encoded();
			}

			if (!sid) {
				mostrarError('No se pudo obtener el SID de las cookies');
				return;
			}

			// Construir URL para obtener items
			var baseUrl = 'https://frank.unabase.com/node/get-business-items-modulo';
			var params = {
				id: folioActual,
				categoria: categoria, // Agregar la categoría específica
				hostname: window.location.origin,
				sid: sid
			};

			var fullUrl = baseUrl + '?' + $.param(params);

			$.ajax({
				url: fullUrl,
				type: 'GET',
				dataType: 'json',
				crossDomain: true,
				timeout: CONFIG.timeout,
				success: function (data) {
					if (data && data.rows) {
						// Tomar registros relacionados con la categoría, sin restringir por tipo_item
						var items = data.rows.filter(function (item) {
							return (item.categoria === categoria || item.nombre_categoria === categoria || item.nombre === categoria);
						});

						// Ordenar por Fecha/Hora descendente cuando existan; de lo contrario por nombre
						function parseTimestamp(it) {
							var f = it.Fecha || it.fecha || '';
							var h = it.Hora || it.hora || '00:00:00';
							var p = String(f).split('-'); // DD-MM-YYYY
							if (p.length === 3) {
								var iso = p[2] + '-' + p[1] + '-' + p[0] + 'T' + h;
								var t = Date.parse(iso);
								return isNaN(t) ? 0 : t;
							}
							return 0;
						}

						items.sort(function (a, b) {
							var tb = parseTimestamp(b) - parseTimestamp(a);
							return tb !== 0 ? tb : (a.nombre || '').localeCompare(b.nombre || '');
						});


						mostrarItemsEnModal(items, categoria);
					} else {
						mostrarError('No se encontraron items para esta categoría');
					}
				},
				error: function (xhr, status, error) {
					var errorMessage = 'Error al cargar los items de la categoría';
					var shouldRetry = false;
					
					// Manejar diferentes tipos de errores
					if (status === 'timeout') {
						errorMessage = 'Timeout: El servidor tardó demasiado en responder';
						shouldRetry = true;
					} else if (xhr.status === 408) {
						errorMessage = 'Timeout del servidor: El servidor 4D tardó demasiado en responder';
						shouldRetry = true;
					} else if (xhr.status === 500) {
						// Intentar parsear el error del backend
						try {
							var errorData = JSON.parse(xhr.responseText);
							if (errorData.message) {
								errorMessage = errorData.message;
							}
							if (errorData.error === 'Request Timeout') {
								shouldRetry = true;
							}
						} catch (e) {
							errorMessage = 'Error del servidor: ' + error;
						}
					}
					
					// Mostrar mensaje de error con opción de retry
					if (shouldRetry && intento < 3) {
						var retryMessage = errorMessage + '<br><br>Reintentando... (Intento ' + (intento + 1) + ' de 3)';
						mostrarError(retryMessage);
						
						// Retry automático después de 2 segundos
						setTimeout(function() {
							cargarItemsDeCategoria(categoria, intento + 1);
						}, 2000);
					} else if (intento >= 3) {
						mostrarError(errorMessage + '<br><br>Se han agotado los intentos. Por favor, inténtalo de nuevo más tarde.');
					} else {
						mostrarError(errorMessage);
					}
				}
			});
		}

		// Función para mostrar items en el modal
		function mostrarItemsEnModal(items, categoria) {
			var modalContent = document.getElementById('modalContent');
			var modalLoading = document.getElementById('modalLoading');

			if (!modalContent) {
				console.error('Error: modalContent no encontrado');
				return;
			}

			if (modalLoading) modalLoading.style.display = 'none';
			modalContent.style.display = 'block';

			var html = '<button class="btn-back" onclick="volverACategorias()">← Volver a Categorías</button>';

			if (!items || items.length === 0) {
				html += '<div style="text-align: center; color: #666; padding: 20px;">No se encontraron items en esta categoría</div>';
				modalContent.innerHTML = html;
				return;
			}

			html += '<div class="table-responsive"><table class="table table-hover">';
			html += '<thead><tr><th>Item</th><th>Fecha</th><th>Hora</th><th>Descripción del Cambio</th><th>Acciones</th></tr></thead><tbody>';

			items.forEach(function (item, index) {
				var nombre = item.nombre || item.item || '';
				var fecha = item.Fecha || item.fecha || '';
				var hora = item.Hora || item.hora || '';
				var descripcionCambio = item.Cambio || '';
				
				// Truncar la descripción para la tabla (primeros 100 caracteres + "...")
				var descripcionCorta = descripcionCambio.length > 100 ? 
					descripcionCambio.substring(0, 100) + '...' : descripcionCambio;

				html += '<tr>';
				html += '  <td><strong>' + (nombre || '') + '</strong></td>';
				html += '  <td>' + (fecha || '') + '</td>';
				html += '  <td>' + (hora || '') + '</td>';
				html += '  <td style="max-width: 300px; word-wrap: break-word;">' + (descripcionCorta || '') + '</td>';
				html += '  <td>';
				
				if (descripcionCambio && descripcionCambio.trim()) {
					// Crear botón "Ver Completa" con ID único para evitar conflictos
					var botonId = 'btn-ver-completa-' + index;
					var botonHtml = '<button id="' + botonId + '" class="btn btn-sm btn-info">';
					botonHtml += '<i class="fa fa-eye"></i> Ver Completa</button>';
					html += botonHtml;
					
					// Agregar event listener después de que el botón esté en el DOM
					setTimeout(function() {
						var boton = document.getElementById(botonId);
						if (boton) {
							boton.addEventListener('click', function() {
								mostrarDescripcionCompleta(descripcionCambio, nombre, fecha, hora);
							});
						}
					}, 100);
				}
				html += '  </td>';
				html += '</tr>';
			});

			html += '</tbody></table></div>';
			modalContent.innerHTML = html;
		}

		// Variable para evitar doble ejecución
		var volviendoACategorias = false;

		// Función para volver a categorías
		function volverACategorias(intento = 1) {
			if (volviendoACategorias) {
				return;
			}

			volviendoACategorias = true;

			// Mostrar loading en el modal
			var modalContent = document.getElementById('modalContent');
			var modalLoading = document.getElementById('modalLoading');

			if (modalLoading) modalLoading.style.display = 'block';
			if (modalContent) modalContent.style.display = 'none';

			// Obtener SID dinámicamente
			var sid = '';
			if (typeof unaBase !== 'undefined' && unaBase.sid) {
				sid = unaBase.sid.encoded();
			}

			if (!sid) {
				mostrarError('No se pudo obtener el SID de las cookies');
				volviendoACategorias = false;
				return;
			}

			// Construir URL para obtener categorías
			var baseUrl = 'https://frank.unabase.com/node/get-business-items';
			var params = {
				id: folioActual,
				categorias: 'True',
				hostname: window.location.origin,
				sid: sid
			};

			var fullUrl = baseUrl + '?' + $.param(params);

			$.ajax({
				url: fullUrl,
				type: 'GET',
				dataType: 'json',
				crossDomain: true,
				timeout: CONFIG.timeout,
				success: function (data) {
					if (data && data.rows) {
						
						// Filtrar solo las categorías
						var categorias = data.rows.filter(function (item) {
							return item.tipo_item === 'categoria';
						});

						// Ordenar por nombre
						categorias.sort(function (a, b) {
							var nombreA = a.nombre || a.categoria || '';
							var nombreB = b.nombre || b.categoria || '';
							return nombreA.localeCompare(nombreB);
						});

						// Mostrar categorías en el modal
						mostrarCategoriasEnModal(categorias);
					} else {
						mostrarError('No se encontraron categorías para este negocio');
					}
					volviendoACategorias = false;
				},
				error: function (xhr, status, error) {
					// Si es timeout y no hemos agotado los intentos, reintentar
					if ((status === 'timeout' || xhr.status === 408) && intento < 3) {
						console.log('Timeout en volverACategorias, reintentando... Intento ' + (intento + 1));
						setTimeout(function() {
							volverACategorias(intento + 1);
						}, 2000);
					} else {
						console.log('Error en volverACategorias después de ' + intento + ' intentos:', error);
						mostrarError('Error al cargar las categorías: ' + error);
						volviendoACategorias = false;
					}
				}
			});
		}

		// Función para cargar datos iniciales
		function cargarDatosIniciales() {
			// Obtener SID dinámicamente
			var sid = '';
			if (typeof unaBase !== 'undefined' && unaBase.sid) {
				sid = unaBase.sid.encoded();
			}

			if (!sid) {
				mostrarMensajeNoDatos();
				return;
			}

			// Construir URL con SID dinámico
			var baseUrl = 'https://frank.unabase.com/node/get-business-list';
			var params = {
				hostname: window.location.origin,
				sid: sid
			};

			var fullUrl = baseUrl + '?' + $.param(params);

			$.ajax({
				url: fullUrl,
				type: 'GET',
				dataType: 'json',
				crossDomain: true,
				timeout: CONFIG.timeout,
				success: function (data) {
					try {
						if (data && data.data && data.data.rows) {
							// Ordenar negocios alfabéticamente por nombre
							var negociosOrdenados = data.data.rows.sort(function (a, b) {
								var nombreA = a.referencia || a.nombre || '';
								var nombreB = b.referencia || b.nombre || '';
								return nombreA.localeCompare(nombreB);
							});

							// Guardar todos los negocios para filtrado
							todosLosNegocios = negociosOrdenados;

							// Renderizar tabla manualmente
							renderizarTabla(negociosOrdenados);

						} else {
							mostrarMensajeNoDatos();
						}
					} catch (error) {
						mostrarMensajeNoDatos();
					}
				},
				error: function (xhr, status, error) {
					mostrarMensajeNoDatos();
				}
			});
		}

		// Función para filtrar negocios
		function filtrarNegocios() {
			if (!todosLosNegocios || todosLosNegocios.length === 0) {
				return;
			}

			var negociosFiltrados = todosLosNegocios.filter(function (negocio) {
				var cumpleFiltroNegocio = true;
				var cumpleFiltroFecha = true;

				// Filtro por nombre del negocio
				if (filtroNegocio && filtroNegocio.trim() !== '') {
					var nombreNegocio = (negocio.referencia || negocio.nombre || '').toLowerCase();
					var busqueda = filtroNegocio.toLowerCase();
					cumpleFiltroNegocio = nombreNegocio.includes(busqueda);
				}

				// Filtro por fecha
				if (filtroFecha && filtroFecha.trim() !== '') {
					var fechaNegocio = negocio.fecha_realizacion || negocio.fecha_asignacion || '';
					if (fechaNegocio && fechaNegocio !== '00-00-00') {
						// Convertir fecha del formato DD-MM-YYYY a YYYY-MM-DD para comparar
						var partes = fechaNegocio.split('-');
						if (partes.length === 3) {
							var fechaFormateada = partes[2] + '-' + partes[1] + '-' + partes[0];
							cumpleFiltroFecha = fechaFormateada === filtroFecha;
						} else {
							cumpleFiltroFecha = false;
						}
					} else {
						cumpleFiltroFecha = false;
					}
				}

				return cumpleFiltroNegocio && cumpleFiltroFecha;
			});

			// Ordenar resultados filtrados alfabéticamente
			negociosFiltrados.sort(function (a, b) {
				var nombreA = a.referencia || a.nombre || '';
				var nombreB = b.referencia || b.nombre || '';
				return nombreA.localeCompare(nombreB);
			});

			renderizarTabla(negociosFiltrados);
		}

		// Función para limpiar filtros
		function limpiarFiltros() {
			filtroNegocio = '';
			filtroFecha = '';

			// Limpiar campos de entrada
			document.getElementById('search-negocio').value = '';
			document.getElementById('search-fecha').value = '';

			// Mostrar todos los negocios
			if (todosLosNegocios && todosLosNegocios.length > 0) {
				renderizarTabla(todosLosNegocios);
			}
		}

		// Inicializar event listeners para el buscador
		function inicializarBuscador() {
			// Event listener para búsqueda por texto
			var searchInput = document.getElementById('search-negocio');
			if (searchInput) {
				searchInput.addEventListener('input', function () {
					filtroNegocio = this.value;
					filtrarNegocios();
				});
			}

			// Event listener para filtro por fecha
			var fechaInput = document.getElementById('search-fecha');
			if (fechaInput) {
				fechaInput.addEventListener('change', function () {
					filtroFecha = this.value;
					filtrarNegocios();
				});
			}

			// Event listener para botón limpiar
			var btnLimpiar = document.getElementById('btn-limpiar-filtros');
			if (btnLimpiar) {
				btnLimpiar.addEventListener('click', function () {
					limpiarFiltros();
				});
			}
		}

		// Función para ocultar header global
		function ocultarHeaderGlobal() {
			// Ocultar cualquier elemento que esté antes del viewport
			var viewport = document.getElementById('viewport');
			if (viewport) {
				var elementosAntes = [];
				var elemento = viewport.previousElementSibling;
				while (elemento) {
					elementosAntes.push(elemento);
					elemento = elemento.previousElementSibling;
				}

				// Ocultar todos los elementos antes del viewport
				elementosAntes.forEach(function (el) {
					el.style.display = 'none';
				});

				// También ocultar el primer elemento del body si no es el viewport
				var primerElemento = document.body.firstElementChild;
				if (primerElemento && primerElemento.id !== 'viewport') {
					primerElemento.style.display = 'none';
				}
			}

			// Forzar el viewport al tope
			document.body.style.marginTop = '0';
			document.body.style.paddingTop = '0';
		}

		// Inicializar el módulo
		function inicializarModulo() {
			$(document).ready(function () {
				// Ocultar header global
				ocultarHeaderGlobal();

				// Inicializar unaBase
				try {
					if (typeof unaBase !== 'undefined') {
						unaBase.toolbox.init();
					}
				} catch (e) {
					// Silenciar errores
				}

				// Inicializar buscador
				inicializarBuscador();

				// Cerrar modal al hacer click en X
				$('.close').click(function () {
					$('#modalMovimientos').hide();
				});

				// Cerrar modal al hacer click fuera
				$(window).click(function (event) {
					var modal = document.getElementById('modalMovimientos');
					if (event.target == modal) {
						modal.style.display = 'none';
					}
				});

				// Cargar datos iniciales
				cargarDatosIniciales();

				// Asegurar que el header global se oculte después de un breve delay
				setTimeout(function () {
					ocultarHeaderGlobal();
				}, 100);
			});
		}

		// Verificar si jQuery está disponible
		if (typeof $ === 'undefined') {
			var script = document.createElement('script');
			script.src = 'https://code.jquery.com/jquery-3.6.0.min.js';
			script.onload = function () {
				inicializarModulo();
			};
			document.head.appendChild(script);
		} else {
			inicializarModulo();
		}
	</script>
