<!DOCTYPE html>
<html>
	<head>
		<!--#4DSCRIPT/_V3_proxy_getDocsAsociarBanco-->
		<title>DOCS disponibles</title>
		<meta charset="utf-8">
		<script>

			var globalBalanceMov = <!--#4DTEXT String(globalBalanceMov;"&xml")-->;
			var defaultMoneda = "<!--#4DTEXT _V3_defaultCurrencyCode-->";
			var moneda = "<!--#4DTEXT MONEDA-->";
			var restante = globalBalanceMov;
			var idempresaSelected = 0;

			function asociarBanco(){
				var element = $(this);
				var selectedDOCS = document.querySelectorAll('#containerDocsAsociar > tbody > tr > td > input.select:checked');
				var docsToAssociate = {};
				for (let input of selectedDOCS) {
					var monto = input.closest('tr').querySelector('input[name="montoaconciliar"]').value;
					var tipoDocs2 = input.closest('tr').dataset.tipodoc2;
					eval("obj = {'docs-"+ input.value +"' : '" + monto + "'}");
					$.extend(docsToAssociate, docsToAssociate,obj);
				}
				var infoMovimiento = {
					'id':'<!--#4DTEXT idAUX-->',
					'tipodocs' : '<!--#4DTEXT tipodocAUX-->',
					'tipodocs2' : tipoDocs2
				};
				var finalobj = $.extend({}, infoMovimiento, docsToAssociate);
				if (selectedDOCS.length > 0) {
					$.ajax({
						'url':'/4DACTION/_V3_setAsociarDocsBanco',
						data: finalobj,
						dataType:'json',
						success: function(data) {
							if (data.success) {
								toastr.success("Asociado con éxito.");
								$('.ui-dialog-content').dialog('close');
								$('#search [name="q"]').data("manual", true).trigger('keydown');
								$('#search [name="q"]').data("manual", true).trigger('keyup');
							}else{
								toastr.error("No fue posible asociar el documento. Intente nuevamente.");
							}
						},
						error: function(data) {
							toastr.error(NOTIFY.get('ERROR_INTERNAL'));
						}
					});
				}else{
					alert("Debes seleccionar al menos un documento.");
				}
			}

			function enabledAndDisabled(suma, globalBalanceMov){
				var objButton = document.querySelector('.css-button-asociar > li > button');
				if (suma == globalBalanceMov) {
					objButton.disabled = false;
					objButton.classList.add("border-on");
				}else{
					objButton.disabled = true;
					objButton.classList.remove("border-on");
				}
			}

			function counter(){
				let listToInsert = document.querySelectorAll('#containerDocsAsociar > tbody > tr > td > input[name="montoaconciliar"]');
				
				var suma = 0;
				for (let input of listToInsert) {
					var PreEnteredValue = "0";
					if (currency.code == "PEN") {
						var PreEnteredValue = input.value.replace(/,/g, ''); // 2,544.00 to 2544.00
					}else{
						var PreEnteredValue = input.value.replace(/./g, ''); // 2.544,00 to 2544,00
						var PreEnteredValue = PreEnteredValue.replace(/,/g, '.'); // 2544,00 to 2544.00
					}
					var enteredValue = parseFloat(PreEnteredValue);
					var toPay = parseFloat(input.closest('tr').dataset.saldo);
					if (enteredValue > toPay) {
						toastr.warning("Monto excede al total del documento.");
						input.value = 0;
					}else{
						suma += enteredValue;
					}
				}

				document.querySelector(".totales-suma").innerHTML = currency.symbol + " " + $.number(suma, currency.decimals, currency.decimals_sep, currency.thousands_sep);

				restante = globalBalanceMov - suma;
				document.querySelector(".total-restante").innerHTML = currency.symbol + " " + $.number(restante, currency.decimals, currency.decimals_sep, currency.thousands_sep);

				enabledAndDisabled(suma, globalBalanceMov);

				if (suma < globalBalanceMov) {
					document.querySelector('.totales-suma').classList.add("color-black");
					document.querySelector('.totales-suma').classList.remove("color-green");
					document.querySelector('.totales-suma').classList.remove("color-red");
				}else if (suma == globalBalanceMov) {
					document.querySelector('.totales-suma').classList.remove("color-black");
					document.querySelector('.totales-suma').classList.add("color-green");
					document.querySelector('.totales-suma').classList.remove("color-red");
				}else{
					document.querySelector('.totales-suma').classList.remove("color-black");
					document.querySelector('.totales-suma').classList.remove("color-green");
					document.querySelector('.totales-suma').classList.add("color-red");
				}

			}

			function goInsert(event){

				// -- assign value
				var target = event.currentTarget;
				var saldo = target.dataset.saldo;

				if (saldo > restante) {
					target.closest('tr').querySelector('input[name="montoaconciliar"]').value = $.number(restante, currency.decimals, currency.decimals_sep, currency.thousands_sep);
				}else{
					target.closest('tr').querySelector('input[name="montoaconciliar"]').value = $.number(saldo, currency.decimals, currency.decimals_sep, currency.thousands_sep);
				}

				// -- reset check
				if (!target.checked) {
					target.closest('tr').querySelector('input[name="montoaconciliar"]').value = 0;
				}

				counter();

			}

			$(document).ready(function() {
				var containerdtc = $('#sheet-dtc');
				unaBase.toolbox.init();
				var params = {
					url: function() { return '/4DACTION/_V3_getDocsParaAsociarBanco' },
					entity: 'Banco',
					data: {
						'id' : "<!--#4DTEXT idAUX-->",
						'tipodoc' : "<!--#4DTEXT tipodocAUX-->"
					},
					row: {
						html: function(i, rows) {
							return '<tr style="background-color:white;border-bottom:1px solid lightgray;" data-id="' + rows[i].id + '" data-tipodoc2="' + rows[i].tipo_doc + '" data-saldo="' + rows[i].saldo + '" data-idempresa="' + rows[i].id_empresa + '">' +
								'<td style="text-align:center">' + rows[i].documento + '</td>' +
								'<td>' + rows[i].folio + '</td>' +
								'<td class="left">' + rows[i].cliente + '</td>' +
								'<td class="left">' + rows[i].referencia + '</td>' +

								'<td style="text-align:right;">' + currency.symbol + " " + $.number(rows[i].saldo, currency.decimals, currency.decimals_sep, currency.thousands_sep) + '</td>' +

								'<td style="text-align:right;"><input name="montoaconciliar" type="text" value="'+ $.number(0, currency.decimals, currency.decimals_sep, currency.thousands_sep) +'" style="background-color:yellow;padding:5px;text-align:right;width:60px;border:1px solid lightgray;" onmouseout="counter()" onblur="counter()"/></td>' +

								'<td><input onclick="goInsert(event);" data-saldo="'+ rows[i].saldo + '" style="width:20px!important;height:20px!important" class="select" name="ocselect[id]'+ rows[i].id +'" value="'+ rows[i].id +'" type="checkbox"></td>' +

							'</tr>'
						}
					},
					inflection: {
						singular: 'negocio',
						plural: 'negocios',
						none: 'ningún'
					},
					filters: [
						//{ name: 'tipo_doc', type: 'autocomplete', caption: 'Tipo Doc.', dataSource: 'getTiposDocDeCompras' }

						{ name: 'otros_filtros', type: 'autocomplete', caption: 'Otros filtros', dataObject: [
							{ id: "docs_otros_montos", text: 'Mostrar Docs. con otros montos'},
							{ id: "incluir_oc", text: 'Mostrar órdenes de compra'}
						]}

					]
				};

				unaBase.toolbox.search.init(params);

				unaBase.toolbox.menu.init({
					entity: 'banco',
					buttons: ["asociar_banco_a_docs"]
				});

				$('[data-name="asociar_banco_a_docs"]').closest('ul').addClass('css-button-asociar');
				document.querySelector('.css-button-asociar > li > button').disabled = true;

				if (moneda != "" && moneda != defaultMoneda) {

					document.querySelector('.global-balance').innerHTML = moneda + " " + $.number(globalBalanceMov, currency.decimals, currency.decimals_sep, currency.thousands_sep);

					document.querySelector('.totales-suma').innerHTML = moneda + " " + $.number(0, currency.decimals, currency.decimals_sep, currency.thousands_sep);

					document.querySelector('.total-restante').innerHTML = moneda + " " + $.number(0, currency.decimals, currency.decimals_sep, currency.thousands_sep);

				}else{

					document.querySelector('.global-balance').innerHTML = currency.symbol + " " + $.number(globalBalanceMov, currency.decimals, currency.decimals_sep, currency.thousands_sep);

					document.querySelector('.totales-suma').innerHTML = currency.symbol + " " + $.number(0, currency.decimals, currency.decimals_sep, currency.thousands_sep);

					document.querySelector('.total-restante').innerHTML = currency.symbol + " " + $.number(0, currency.decimals, currency.decimals_sep, currency.thousands_sep);

				}

				//$('.numeric.currency input').number(true, currency.decimals, currency.decimals_sep, currency.thousands_sep);

				// $("#tabs-docs-conciliar").tabs();

			});
		</script>
