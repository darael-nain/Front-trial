   .table-fixed tbody {
    height: 300px;
    overflow-y: auto;
    width: 100%;
}

.table-fixed thead,
.table-fixed tbody,
.table-fixed tr,
.table-fixed td,
.table-fixed th {
    display: block;
    width: 100%;
}

.table-fixed tbody td,
.table-fixed tbody th,
.table-fixed thead > tr > th {
    float: left;
    position: relative;

    &::after {
        content: '';
        clear: both;
        display: block;
    }
}
#tooltip {
    width: 500px;
    background-color: rgb(110, 108, 108);
    color: white;
    padding: 10px 50px;
    border-radius: 10px;
    font-size: 13px;
  }
  </style>

</head>

<body class="container-fluid mx-auto body-index">
  <main class="row mb-3">
    <div class="container p-2">
      <div class="fixed-bottom container-fluid mx-auto " id="alertas"></div>
      <nav
        class="navbar navbar-expand-md navbar-dark fixed-top  shadow p-2 mb-5 bg-white rounded  mx-auto container  ">
        <div class="card border-0" style="width: 100%;">
          <div class="container mx-auto">
            <h5 class="card-title t">Lista de movimientos bancarios</h5>
           
           
             
            </button>
            <small style=" color: #a2a6a6;"> <span  id="doc_cont" class="badge rounded-pill" style="background-color:black; color: white;font-weight: bold;font-size: 12px;">   0
            </span>  movimientos.</small>
          </div>
         
          <div class="card-body">
            
            <div class="row align-items-center mx-auto">
              

              <div class="searchbar col-6 col-md-2">
                <input id="searchDtc" class="form-control " type="text" 
                  placeholder="Buscar por proveedor..." autocomplete="off">
              </div>
              <div class="col-4 col-md-2">
                <input type="month" name="fecha" id="fecha" class="form-control" value="">
              </div>
              <div class="col-2 col-md-1">
                <button type="button" class="btn colorSelector" value="green" title="Filtrar y seleccionar las coincidencias de cada documentos con 1 gasto">
                  <span class="a"><i class="fas fa-square-full " style="color: #34CC02"></i> 1 DTC</span>
                </button>
              </div>
              <div class="col-2 col-md-1">
                <button type="button" class="btn colorSelector" value="blue" title="Filtrar las coincidencias de cada documentos con varios gastos">
                  <span class="a"><i class="fas fa-square-full " style="color: #03D6F9"> </i> +1 DTC</span>
                </button>
              </div>
              <div class="col-2 col-md-1" style="border-right: black;">
                <button type="button" class="btn colorSelector" value="red" title="Filtrar y seleccionar los documentos sin gastos coincidentes">
                  <span class="a"><i class="fas fa-square-full " style="color: #FC4903"></i> 0 DTC</span>
                </button>
              </div>
             
              <!-- <div class="col-2 col-md-1">
                <button type="button" class="btn colorSelector" value="grey"  title="Estas son las notas de credito">
                  <span class="a"><i class="fas fa-square-full " style="color: #c2c5c3"></i> NC</span>
                </button>
              </div> -->
              <div class="col-2 col-md-1">
                <button type="button"  class="btn colorSelector" value="black"  title="Estos son los documentos nulos">
                  <span class="a"><i class="fas fa-square-full " style="color: black"></i> Nulos</span>
                </button>
              </div>
              <!-- <div class="col-2 col-md-1">
                <button type="button" class="btn colorSelector" value="orange"  title="Estos son los documentos por asignar">
                  <span class="a"><i class="fas fa-square-full " style="color: #F9BD00"></i> Pendientes</span>
                </button>
              </div> -->
              <div class="col-2 col-md-1 d-flex flex-row-reverse">
                <button type="button" class="btn colorSelector" value="cancel" title="Activa solo los filtro de DTCs">
                  <i class="fas fa-ban"></i>
                </button>
              </div>
              <div class="col-12 col-md-1 d-flex flex-row-reverse">
                <button type="button" id="reload" class="btn float-right" style="cursor: pointer;" title="Consultar movimientos al sii manualmente"> <i
                    style="color: #34CC02;" class="fas fa-sync fa-2x"></i></button>
              </div>
              <div class="col-md-12">
                <br>
                <!--  <i   class=" fas fa-search  float-left"></i> -->
                <button type="button" class="btn float-right action green"
                  style="width: 15em; background-color: #34CC02; color: white; display: none;cursor: pointer; font-weight: bold;"
                  data-bs-toggle="modal" data-bs-target="#modalmatch">Justificar</button>
                <button type="button" class="btn float-right action blue"
                  style="width: 15em; background-color: #03D6F9; color: black; display: none;cursor: pointer;font-weight: bold;"
                  data-bs-toggle="modal" data-bs-target="#modalmatch">Seleccionar DTC</button>
                <button type="button" class="btn btn-danger float-right action red"
                  style="width: 15em; background-color: #FC4903; color: white; display: none;cursor: pointer;font-weight: bold;"
                  data-bs-toggle="modal" data-bs-target="#modalmatch">Crear DTC y Pagar</button>
                <!-- <button type="button" class="btn btn-danger float-right action red two"
                  style="width: 25em; background-color: #FC4903; color: white; display: none;cursor: pointer;font-weight: bold;"
                  title="Dejar los documentos creados y en estado 'Por asignar' a gasto">Dejar pendiente (Contabilizar)</button> -->
                <button type="button" class="btn btn-danger float-right action yellow"
                  style="width: 15em; background-color: #FC4903; color: white; display: none;cursor: pointer;font-weight: bold;"
                  title="Selecciona una rendicion del listado y justificala"  data-bs-toggle="modal" data-bs-target="#modalmatch">Pagar DTC</button>
                <button type="button" class="btn btn-danger float-right action black"
                  style="width: 15em; background-color: black; color: white; display: none;cursor: pointer;font-weight: bold;"
                  title="Dejar documento nulo"  >Anular</button>
              </div>

            </div>
            <div id="loading"></div>
          </div>
        </div>



      </nav>
      
      <div class="pt-5 table-responsive" style="margin-top: 120px; ">
       
        <table class="table table-striped table-hover " id="tables"></table>
      </div>

      <div id="msg"></div>
    </div>
    </div>
    
    <div id="modal-oc-match">

      <!-- Modal -->
      <div class="modal fade" id="modalmatch" data-bs-keyboard="false"  data-bs-backdrop="static" tabindex="-1" role="dialog" aria-labelledby="modaltitle" aria-hidden="true" >
        <!--  <div class="modal fade show" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-modal="true" role="dialog" style="display: block;"> -->
        <div class="modal-dialog modal-xl"> 
          <div class="modal-content">
            <div class="fixed-bottom container mx-auto" id="alertas-modal"></div>

            <div class="modal-header">
              <div class="container-fluid">
              
                <div id="item_list">
                  <datalist id="il" >
                  </datalist>
                </div> 
                <div class="row justify-content-start">
                  <div class="col-md-12 col-lg-4">
                    <h5 class="modaltitle" id="modaltitle">Documentos de compra coincidentes:</h5>
                    <div id="loading-modal"></div>
                  </div>              
                  <div id="div-fecha-neg" class="col-4 justify-content-end " style="text-align: left; display: none;">
                    <label for="fecha-neg" style="font-size: 0.8rem;">Filtrar negocios por año:</label>
                    <select  id="fecha-neg" class="form-control custom-select" style="max-width: 50%;"></select>
                  </div>
                  <div id="div-fecha-fxr" class="col-4 justify-content-end " style="text-align: left; display: none;">
                    <label for="fecha-fxr" style="font-size: 0.8rem;">Filtrar gastos por año:</label>
                    <select  id="fecha-fxr" class="form-control custom-select" style="max-width: 50%;"></select>
                  </div>
                  <div class="col justify-content-end d-flex align-items-center" style="text-align: right;  ">
                    <button type="button" class="btn float-right" id="justify-btn"
                    style="width: 10em; background-color: #34CC02; color: white;cursor: pointer; font-weight: bold;">Justificar</button>
                  </div>
                  <div class=" col-1 justify-content-end" style="text-align: right;  ">
                    <button type="button" class="btn-close col-lg-1" data-bs-dismiss="modal"
                      aria-label="Close" id="closemodal"></button>
                  </div>
                </div>

              </div>

            </div>
            <div class="modal-body">
              
              <div id="modal-list"></div>
            </div>
            <div class="modal-footer">
              <!--  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary">Save changes</button> -->
            </div>
          </div>
        </div>
      </div>

    </div>

    <div id="confirm-modal">

      <!-- Modal -->
      <div class="modal fade" id="confirm" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
        aria-labelledby="staticConfirmLabel" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="staticConfirmLabel">CONFIRMAR</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              Se crearan los DTCs y pago  de los movimientos seleccionados, favor confirmar.
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cancelar</button>
              <button type="button" class="btn btn-success">Aceptar</button>
            </div>
          </div>
        </div>
      </div>
    </div>

  </main>
