<!DOCTYPE html>
<html>
	<head>
		<!--#4DSCRIPT/_V3_proxy_getDetalleItems-->
		<meta charset="utf-8">
		<title>Compras - items</title>
		<script>
		$(document).ready(function() {
			var container = $('section.sheet-list-compras');
			var llave_detalle_nv = container.data('llave');			
			var tbody = container.find('table > tbody');
			var tfoot = container.find('table > tfoot');
			
			var loadComprasNegocio = function(data) {

				// Elimina todas las oc de la tabla
				tbody.find("*").remove();

				var sumaNeto = 0;
				
				var htmlObject;
				$.each(data.rows, function(key, item) {

					if(item.estado!="ANULADA"){						
						sumaNeto = sumaNeto + item.neto;	
					}

					var v2 = "";
					if(item.version!="V3"){
						v2 = '<strong style="font-size:8px!important;font-weight:bold">V2</strong>';	
					}										

					htmlObject = $('<tr data-id="'+item.id+'" data-version="'+item.version+'" data-neto="'+item.neto+'" data-estado="'+item.estado+'">'+
								'<td>'+v2+'</td>' +
								'<td>'+item.folio+'</td>' +
								'<td>'+item.emisor+'</td>' +
								'<td>'+item.fecha+'</td>' +
								'<td>'+item.factura_tipo+'</td>' +
								'<td class="left">'+item.proveedor+'</td>' +
								'<td class="left">'+item.referencia+'</td>' +								
								'<td class="currency">'+item.neto+'</td>' +	
								'<td class="status">'+item.estado+'</td>' +
								'<td>'+((item.saldo_consolidar<=0)? '<input disabled checked type="checkbox">': '<input disabled type="checkbox">')+'</td>' +
								'</tr>');
					tbody.append(htmlObject);
				});

				var htmlObject;
				var total_footer = 0;		

				htmlObject = $('<tr>'+
							'<th></th>' +
							'<th></th>' +
							'<th></th>' +
							'<th></th>' +
							'<th></th>' +
							'<th></th>' +
							'<th></th>' +						
							'<th class="currency right">'+sumaNeto+'</th>' +							
							'<th></th>' +
							'<th></th>' +		
							'</tr>');
				tfoot.html(htmlObject);
				formatCurrency();

				$('table.gastos-items tbody').find('tr[data-estado="ANULADA"]').hide();

			};

			$.ajax({
				url: '/4DACTION/_V3_getOrdenesByNegocioItems',
				dataType: 'json',
				async: false, // para que no avance hasta que la llamada se complete
				cache: false,
				data: {
					llave: llave_detalle_nv					
				},
				success: loadComprasNegocio
			}).fail(function(a, b, c) {
				
			});

			formatCurrency();

			//Ingresar a una oc, dando doble click
			
		    /*tbody.find('tr').unbind('click').bind('click', function(event) {
				unaBase.loadInto.viewport('/v3/views/compras/content.shtml?id=' + $(this).data('id'), 'Modificar orden de compra');
			});*/		    

			// by state
			$('select.by-status').change(function(event) {
				var status = $(this).val();

				// disabled checked
				$('input.show-hide-null').prop('checked', false);

				$('table.gastos-items tbody').find('tr').show();			

				switch(status) {
					case 'EMITIDA':
						$('table.gastos-items tbody').find('tr[data-estado!="EMITIDA"]').hide();
						break;
					case 'CERRADA':
						$('table.gastos-items tbody').find('tr[data-estado!="CERRADA"]').hide();
						break;
					case 'PAGADA':
						$('table.gastos-items tbody').find('tr[data-estado!="PAGADA"]').hide();
						break;
					case 'ANULADA':
						$('table.gastos-items tbody').find('tr[data-estado!="ANULADA"]').hide();
						break;
					case '':
						$('table.gastos-items tbody').find('tr[data-estado="ANULADA"]').hide();
						break;					
				}

				var sumaNeto = 0;				
				if (status=="") {					
					tbody.find('tr:not(:hidden)').each(function() {
						var item = $(this);
						if (item.is(':visible') && item.find('td.status') != 'ANULADA'){				
							sumaNeto+= item.data('neto');							
						}						
					});
				}else{					
					tbody.find('tr:not(:hidden)').each(function() {
						var item = $(this);
						sumaNeto+= item.data('neto');									
					});
				}

				htmlObject = $('<tr>'+
							'<th></th>' +
							'<th></th>' +
							'<th></th>' +
							'<th></th>' +
							'<th></th>' +
							'<th></th>' +
							'<th></th>' +						
							'<th class="currency right">'+sumaNeto+'</th>' +						
							'<th></th>' +
							'<th></th>' +		
							'</tr>');
				tfoot.html(htmlObject);
				formatCurrency();

			});
			
			// show / hide null
			$('input.show-hide-null').change(function(event) {				
				var checked = $(this);
				var sumaNeto = 0;				

				if (checked.prop('checked')){					
					//$('table.gastos tbody').find('tr').show();
					$('table.gastos-items tbody').find('tr[data-estado="ANULADA"]').show();
					tbody.find('tr:not(:hidden)').each(function() {
						var item = $(this);
						sumaNeto+= item.data('neto');								
					});
				}else{				
					$('table.gastos-items tbody').find('tr[data-estado="ANULADA"]').hide();
					tbody.find('tr:not(:hidden)').each(function() {
						var item = $(this);
						if (item.is(':visible') && item.find('td.status') != 'ANULADA'){
							sumaNeto+= item.data('neto');							
						}
					});
				}				

				htmlObject = $('<tr>'+
							'<th></th>' +
							'<th></th>' +
							'<th></th>' +
							'<th></th>' +
							'<th></th>' +
							'<th></th>' +
							'<th></th>' +						
							'<th class="currency right">'+sumaNeto+'</th>' +							
							'<th></th>' +
							'<th></th>' +		
							'</tr>');
				tfoot.html(htmlObject);
				formatCurrency();

			});

		});
		</script>
	</head>
	<body>
		<section class="sheet-list-compras sheet" data-llave="<!--#4DTEXT [Detalle_NV]Llave_NV-->">

			<header style="display:none">
				<span>
					<input readonly name="oc[tipo_gastos][des]" placeholder="Seleccionar tipo" type="search" value="<!--#4DTEXT [Orden_de_compra]des_tipo_gasto-->">
					<button type="button" class="show tiposg">ver tipos</button>
				</span>
			</header>

			<section style="height: 25px; padding:3px">				
				<label style="float:left;">
					Estado
					<select class="by-status" style="border:1px solid gray;margin:2px">
						<option value="">Todos</option>
						<option value="EMITIDA">Emitida</option>
						<option value="PAGADA">Pagada</option>
						<option value="CERRADA">Cerrada</option>
						<option value="ANULADA">Anulada</option>
					</select>
					<span><input class="show-hide-null" type="checkbox" value="ANULADA"> Anuladas</span>
				</label>
			</section>

			<table class="gastos-items">
				<thead>
					<tr>
						<th width=""></th>
						<th width="5%">Folio</th>
						<th width="5%">Emisor</th>
						<th width="10%">F.Emisión</th>
						<th width="10%">Tipo Doc.</th>
						<th width="25%" class="left">Proveedor</th>
						<th width="25%" class="left">Referencia</th>
						<th width="15%" class="right">Neto[$]</th>						
						<th width="5%">Estado</th>	
						<th width="5%" title="Justificada">Just.</th>			
					</tr>		
				</thead>				
				<tbody class="ui-selectable"></tbody>
			  	<tfoot></tfoot>
			</table>
		</section>
	</body>
</html>
