		var hideTotals = () => {
			let titles= document.querySelectorAll('table.items tbody tr.title, table.items tbody tr.itemParent');
			titles.forEach(title => {
				title.querySelectorAll('th.numeric').forEach(element => {
					while(element.hasChildNodes()){
						element.removeChild(element.firstElementChild)
						element.textContent = ""
					}
				});

			});
		}

			unaBase.toolbox.init();

				  return $('.ui-dialog section.sheet').serializeAnything();

				  return true;
				}

		var getItemsGastos = function(title){
			
			var itemsGastos = $(`#items-gastos tbody tr[data-tipo="ITEM"]`);
			var cant = 0;
			// Calcual diferencias en gasto por item, entre lo agregado en la OC y lo que está en el popup
			itemsGastos.each(function(key,item){
				var llave = $(this).find('input[name="oc[detalle_item][llave_nv]"]').val();
				var monto = parseFloat($(this).find('input[name="oc[detalle_item][total]"]').val());
				var tr = $(`#sheet-items_proyect-select table.items tbody tr[data-llave="${llave}"]`);

				if (tr.length>0 && tr.data('parent') == title.data('id')) {

					var start = parseFloat(tr.find('input[data-diferencia]').val());
					var end = start - monto;
					tr.find('input[data-diferencia]').val(end);
					tr.find('input[type="checkbox"]').attr('disabled', !(end > 0 || access._486));
				}
			});

		}

		function todoCheck(){ // Checkbox para seleccionar todos los items de la categoria  Simon jun-2017
			
			var itm = $('input[data-llavetit]');
			for(var i = 0; i<itm.length; i++)
				{
					if(!itm[i].disabled){
						itm[i].checked = event.target.checked
						
					}
				}
		}

		function todoTituloCheck(parentCheckID){ // Checkbox para seleccionar todos los items del negocio  Simon jun-2017

					if(!itm[i].disabled){

					}
				}


		}

		<script>
			var loadItems = function(toggle) {
				unaBase.ui.block();
				$('#sheet-items_proyect-select table.items tbody').find('tr').remove();
				$.ajax({
					url: '/4DACTION/_V3_proxy_get_ItemsProyCompras',
					data: {
						'oc[negocio][id]': <!--#4DVAR idNv-->,
						'oc[id]': <!--#4DVAR idOc-->,
						from: '<!--#4DVAR from-->',
						only_titles: true,
						only_used: $('[name="cotizacion[ver_solo_items_usados]"]').is(':checked')
					},
					async: false,
					dataType: 'json',
					success: function(data) {
						
						var target = $('#sheet-items_proyect-select table.items tbody');

						var exchangeType = data.exchange.type;
						var exchangeRate = data.exchange.rate;
						

						$.each(data.rows, function(key, item) {

							let symbol = currency.symbol;
							let subTotalVenta = item.subtotal_venta;
							let subTotalCosto = item.subtotal_costo;
							let subTotalGastoR = item.diferencia
							let subTotalCostoReal = item.subtotal_costo_real;
							if (exchangeType != '' && currency.code == "PEN") {
								symbol = exchangeType;
								subTotalVenta = item.subtotal_venta/exchangeRate;
								subTotalCosto = item.subtotal_costo/exchangeRate;
								subTotalGastoR = item.diferencia/exchangeRate;
								subTotalCostoReal = item.subtotal_costo_real/exchangeRate;
							}
							subTotalVenta = subTotalVenta.toString().replace(/\./g,',');
							subTotalGastoR = subTotalGastoR.toString().replace(/\./g,',');
							subTotalCosto = subTotalCosto.toString().replace(/\./g,',');
							subTotalCostoReal = subTotalCostoReal.toString().replace(/\./g,',');

							var htmlObject = $('\
								<tr class="title" data-id="' + item.id + '" data-origen2="origen_negocios">																			\
									<th></th>																											\
									<th>																												\
										<button class="ui-icon toggle categoria ui-icon-folder-collapsed"  title="Contraer o expandir título"></button>	\
									</th>																												\
									<th>																												\
										<input readonly name="item[][nombre]" value="' + item.nombre + '">												\
									</th>																												\
									<th></th>																											\
									<th class="numeric currency pventa adquisicion">' + symbol + ' <span>															\
										<input name="item[][subtotal_venta]" value="' + subTotalVenta + '"></span>								\
