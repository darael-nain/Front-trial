<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <title>Reporte de Costos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0b0f14;
      --card: #111827;
      --muted: #9CA3AF;
      --text: #E5E7EB;
      --brand: #2DAC90;
      --brand-600: #239377;
      --error: #ef4444;
      --ring: #2dac9033;
      --border: #1f2937;
    }

    * {
      box-sizing: border-box
    }

    .card {
      width: 100%;
      max-width: 720px;
      padding: 22px 22px 16px;
    }

    .card h1 {
      font-size: 20px;
      margin: 0 0 6px;
      letter-spacing: .3px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 18px
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap
    }

    .col {
      flex: 1 1 220px
    }

    label {
      display: block;
      font-size: 12px;
      color: black;
      margin: 8px 0 6px
    }

    input[type="date"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      outline: none;
      transition: border .2s, box-shadow .2s;
    }

    input[type="date"]:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 6px var(--ring)
    }

    .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px
    }

    .error {
      font-size: 12px;
      color: var(--error);
      margin-top: 6px;
      display: none
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px
    }

    .btn {
      appearance: none;
      border: 1px solid var(--border);
      background: #0c1626;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: transform .06s ease, background .2s, border-color .2s, opacity .2s;
    }

    .btn:active {
      transform: translateY(1px)
    }

    .btn[disabled] {
      opacity: .5;
      cursor: not-allowed
    }

    .btn--ghost:hover {
      background: #0e1a2d
    }

    .btn--brand {
      background: var(--brand);
      border-color: transparent;
      color: white
    }

    .btn--brand:hover {
      background: var(--brand-600)
    }

    .footer-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
      text-align: right
    }
  </style>
</head>

<body>

  <div class="card" role="region" aria-labelledby="title">
    <h1 id="title">CostReport</h1>
    <div class="subtitle">Selecciona el rango de fechas para generar el Excel.</div>

    <form id="reportForm" novalidate>
      <div class="row">
        <div class="col">
          <label for="dateFrom">Desde</label>
          <input type="date" id="dateFrom" name="dateFrom" required />
          <div class="error" id="errFrom">Debes indicar una fecha de inicio.</div>
        </div>
        <div class="col">
          <label for="dateTo">Hasta</label>
          <input type="date" id="dateTo" name="dateTo" required />
          <div class="error" id="errTo">Debes indicar una fecha de término.</div>
        </div>
      </div>

      <div class="error" id="errRange" style="margin-top:10px">La fecha de inicio no puede ser mayor que la fecha de
        término.</div>

      <div class="actions">
        <button type="button" class="btn btn--brand" id="excelBtn" disabled>Descargar Excel</button>
      </div>
      <div class="footer-note">Se abrirá en una nueva pestaña.</div>
    </form>
  </div>

  <script>
    // ===== Utilidades =====
    function fmtLocalYMD(d) {
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    const TODAY = new Date();
    const DEFAULT_FROM = '2024-01-01';          // Fijo
    const DEFAULT_TO = fmtLocalYMD(TODAY);      // Hoy (zona local)

    // ===== DOM =====
    const form = document.getElementById('reportForm');
    const dateFrom = document.getElementById('dateFrom');
    const dateTo = document.getElementById('dateTo');
    const errFrom = document.getElementById('errFrom');
    const errTo = document.getElementById('errTo');
    const errRange = document.getElementById('errRange');
    const excelBtn = document.getElementById('excelBtn');

    // ===== Inicialización =====
    function initDates() {
      dateFrom.value = DEFAULT_FROM;
      dateTo.value = DEFAULT_TO;

      // Límites útiles
      dateFrom.min = DEFAULT_FROM;
      dateFrom.max = DEFAULT_TO;
      dateTo.min = DEFAULT_FROM;
      dateTo.max = DEFAULT_TO;

      validate();
    }

    // Validación reactiva
    function validate() {
      let ok = true;
      errFrom.style.display = dateFrom.value ? 'none' : 'block';
      errTo.style.display = dateTo.value ? 'none' : 'block';

      if (!dateFrom.value || !dateTo.value) {
        ok = false;
      } else if (dateFrom.value > dateTo.value) {
        errRange.style.display = 'block';
        ok = false;
      } else {
        errRange.style.display = 'none';
      }

      // Asegurar límites dinámicos (evita invertir)
      if (dateFrom.value) dateTo.min = dateFrom.value;
      if (dateTo.value) dateFrom.max = dateTo.value || DEFAULT_TO;

      excelBtn.disabled = !ok;
      return ok;
    }

    dateFrom.addEventListener('input', validate);
    dateTo.addEventListener('input', validate);

    // ===== Acción Descargar =====
    function buildUrl({ from, to, preview = false }) {
      // Variables ya existentes en tu app:
      // nodeUrl, unaBase.sid.encoded(), $('section.sheet').data('id'), $('#main-container').data('index'), $('section.sheet').data('readonly'), companyName
      const entity = 'cotizaciones';
      const id = $('section.sheet').data('id');
      const folio = ($('#main-container').data('index') > 0) ? $('#main-container').data('index') : 'S/N';
      const sid = unaBase.sid.encoded();
      const nullified = $('section.sheet').data('readonly');
      const hostname = window.location.origin;

      let url = `${nodeUrl}/export-cost-report-custom/?download=true`
        + `&entity=${encodeURIComponent(entity)}`
        + `&id=${encodeURIComponent(id)}`
        + `&folio=${encodeURIComponent(folio)}`
        + `&sid=${encodeURIComponent(sid)}`
        + `&preview=${preview ? 'true' : 'false'}`
        + `&nullified=${encodeURIComponent(nullified)}`
        + `&dateFrom=${encodeURIComponent(from)}`
        + `&dateTo=${encodeURIComponent(to)}`
        + `&company=${encodeURIComponent(companyName)}`
        + `&hostname=${encodeURIComponent(hostname)}`;

      return url;
    }

    function triggerDownload(preview = false) {
      if (!validate()) return;

      const from = dateFrom.value;
      const to = dateTo.value;

      const url = buildUrl({ from, to, preview });
      // Abrir en nueva pestaña; evitar cerrar inmediatamente (bloqueadores)
      window.open(url, '_blank', 'noopener');
    }

    excelBtn.addEventListener('click', () => triggerDownload(false));

    // Inicia
    initDates();

    // ===== Abrir calendario haciendo clic en cualquier parte del input =====
    function makeDateFullyClickable(el) {
      const open = () => {
        if (typeof el.showPicker === 'function') {
          try { el.showPicker(); } catch (_) { }
        }
      };

      // Mouse: evita que el primer click solo ponga foco y no abra el picker
      el.addEventListener('mousedown', (e) => {
        if (typeof el.showPicker === 'function') {
          e.preventDefault();      // solo si hay showPicker, así no rompemos Firefox/iOS
          el.focus();
          open();
        }
      });

      // Touch: mismo comportamiento en pantallas táctiles
      el.addEventListener('touchstart', (e) => {
        if (typeof el.showPicker === 'function') {
          e.preventDefault();      // requiere {passive:false} para poder prevenir
          open();
        }
      }, { passive: false });

      // Accesibilidad: teclado
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowDown') {
          e.preventDefault();
          open();
        }
      });
    }

    // Activar en tus campos
    makeDateFullyClickable(dateFrom);
    makeDateFullyClickable(dateTo);

    // (Opcional) Si quieres que al click en el <label> también se abra:
    document.querySelector('label[for="dateFrom"]')?.addEventListener('click', () => setTimeout(() => dateFrom.showPicker?.(), 0));
    document.querySelector('label[for="dateTo"]')?.addEventListener('click', () => setTimeout(() => dateTo.showPicker?.(), 0));

  </script>
</body>

</html>
