<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Modificar por  XML</title>
	<script type="text/javascript">
		
			$(document).ready(function() {
				var importLoad = function(append, element) {
					unaBase.ui.block();

					
					var data = new FormData();

					var attachment = $('.ui-dialog fieldset [name="upload[attachment]"]').get(0).files[0];
				
					let name= attachment.name;

					data.append('upload[attachment]', attachment);
				
					//data.append('id', unaBase.doc.id);
					//data.append('sid', unaBase.sid.encoded());
					//data.append('name', name);


					$.ajax({
						url: nodeUrl + '/update-nv-xml?hostname=' + window.location.hostname+'&sid='+ unaBase.sid.encoded()+'&id_nv='+	$("section.sheet").data("id"),
						type: 'POST',
						contentType: false,
						data: data,
						processData: false,
						cache: false,
						//crossDomain: true,s
						success: function(data) {
							
							console.log("data..");
							console.log(data);
							unaBase.ui.unblock();
							if (data.success) {
								toastr.success('Archivo cargado con éxito!');
								
								$(element).parentTo('.ui-dialog-content').dialog('close');
								 unaBase.loadInto.viewport(
						            "/v3/views/negocios/index.shtml"
						          );
							}

						},
						fail: function(e1,e2,e3) {
							toastr.error('No fue posible realizar la cargar de los datos debido a un problema con el servidor, Por favor intente nuevamente. <p><small>Si el inconveniente persiste, por favor comuniquese con Unabase.</small></p>');
						}
					});
				};
				$('.ui-dialog fieldset.import button').button({
						icons: {
							primary: 'ui-icon-circle-arrow-n'
						},
						text: true
					}).click(function() {
						let element = this;

						

						
							importLoad(false, element);
						


					});

				
			});
	</script>
</head>
<body>

		<fieldset class="import">
			<legend>Modificar desde XML</legend>

			<div>
				<span>Archivo XML</span>
				<input type="file" name="upload[attachment]" accept="application/xml">
			</div>
				
			<div>
				<br>
				<button>CARGAR</button>
			</div>
		
		</fieldset>
</body>
</html>
