      async function facturarNegociosAgrupados(negociosSeleccionados) {
        function buildGrupoDesdeSeleccion(negociosSeleccionados) {
          
          const errors = [];

          const folios = (negociosSeleccionados || []).map(String).filter(Boolean);
          if (!folios.length) {
            toastr.error("No hay folios seleccionados.");
            return null;
          }

          const negocioIds = [];
          const montos = [];
          const clienteIds = [];

          for (const folio of folios) {
            // 1) encontrar row en state.rows
            const row = (state.rows || []).find(r => String(getRowId(r)) === String(folio) || String(r.folio) === String(folio));
            if (!row) {
              toastr.error(`No se encontró el folio ${folio} en la grilla.`);
              return null;
            }
            
            // 2) idNegocio (interno)
            const idNegocio = String(getNegocioInternalId(row) || row.id || "");
            if (!idNegocio) {
              toastr.error(`No se pudo resolver idNegocio para folio ${folio}.`);
              return null;
            }

            // 3) clienteId desde state.clienteId (como pediste)
            //    fallback por si no existe
            const clienteId = Number(state.clienteId?.[folio] ?? row.empresa?.id ?? row.empresa_id ?? 0);
            if (!clienteId) {
              toastr.error(`No se pudo resolver clienteId para folio ${folio}.`);
              return null;
            }

            // 4) monto a facturar desde state.montoAFacturar[folio]
            const monto = Number(state.montoAFacturar?.[folio] ?? 0);
            if (!(monto > 0)) {
              toastr.error(`Monto inválido para folio ${folio}.`);
              return null;
            }

            negocioIds.push(idNegocio);
            montos.push(String(monto));
            clienteIds.push(clienteId);
          }

          // Validación: todos los clienteId iguales
          const uniqueCliente = Array.from(new Set(clienteIds.map(String)));
          if (uniqueCliente.length > 1) {
            toastr.error("No se pudo facturar: el cliente es diferente entre los seleccionados.");
            return null;
          }

          const idCliente = Number(uniqueCliente[0]);

          // “grupo” con el shape que necesitas
          return {
            id_negocios_programacion: negocioIds.join("|"),
            id_clientes_programacion: idCliente,
            monto_facturar_programacion: montos.join("|"),

            // opcionales por consistencia con tu backend (puedes dejarlos o sacarlos)
            estado_programacion: true,
            tipo_fecha_programacion: "manual",
            fecha_programacion: "",      // o today si quieres
            dia_semanal_programacion: "",
            exchange_rate: 0,
            exchange_type: "",
            exchange_x_neg: false,
            id_grupo: null
          };
        }


        const errors = [];

        if (!Array.isArray(negociosSeleccionados) || !negociosSeleccionados.length) {
          toastr?.warning?.("Selecciona al menos 1 negocio.");
          return { success: false, errors };
        }


        // Negocios Validos para facturar
        for (const negocioRaw of negociosSeleccionados) {
          const folio = String(negocioRaw);
          const tipoEx = String(state.rowExchangeType?.[folio] || "CLP").trim().toUpperCase();
          const correo = String(state.rowNotify?.[folio] || "").trim();
          if (!correo) {
            toastr?.error?.(`No se puede facturar: falta correo en Negocio ${folio}.`);
            return { success: false, errors };
          }
          const row = (state.rows || []).find(r => String(getRowId(r)) === folio);
          let monto = 0;
          let porFacturar = 0;
          monto = Number(state.montoAFacturar?.[folio] ?? state.montoAFacturar?.[folio] ?? 0);
          if (tipoEx === "CLP") {
            porFacturar = Number( state.rowPorFacturarCLP?.[folio] ?? row?.saldo_por_facturar ?? 0 );
          } else {
            porFacturar = Number( state.rowPorFacturarEX?.[folio] ?? row?.saldo_por_facturar_exchange ?? row?.saldo_por_facturar ?? 0 );
          }
          if (!(monto > 0)) {
            toastr?.error?.(`No se puede facturar: monto inválido en folio ${folio}.`);
            return { success: false, errors };
          }

          if (monto > porFacturar) {
            toastr?.error?.(`No se puede facturar: monto (${monto}) > por facturar (${porFacturar}) en folio ${folio}.`);
            return { success: false, errors };
          }
        }



        // 1) Armar "grupo virtual" desde la selección
        const grupoVirtual = buildGrupoDesdeSeleccion(negociosSeleccionados);
        if (!grupoVirtual) return { success: false, errors };

        const negocioIds = parsePipe(grupoVirtual.id_negocios_programacion);
        const montos = parsePipe(grupoVirtual.monto_facturar_programacion).map(Number);

        // 2) Validar en backend
        const negocios = [];
        const exList = [];
        for (let i = 0; i < negocioIds.length; i++) {
          const idNegocio = negocioIds[i];
          const monto = Number(montos[i] || 0);

          if (!(monto > 0)) {
            toastr?.error?.(`Monto inválido para negocio ${idNegocio}.`);
            errors.push({ idNegocio, message: "Monto inválido", raw: { monto } });
            return { success: false, errors };
          }

          const row = (state.rows || []).find(r =>
            String(getNegocioInternalId(r) || r.id || "") === String(idNegocio)
          );

          const folio = row ? String(getRowId(row) || row.folio || "") : "";

          // Si no pude resolver folio desde la grilla, intento igual con el id (por si coincide)
          const negocio = await fetchNegocioById(folio || idNegocio);

          if (!negocio) {
            toastr?.error?.(`No se encontró el negocio en _V3_getNegocio (folio: ${folio || "?"}).`);
            errors.push({ idNegocio, folio, message: "No se encontró el negocio en _V3_getNegocio" });
            return { success: false, errors };
          }
          if (!negocio) {
            toastr?.error?.(`No se encontró el negocio ${idNegocio} en _V3_getNegocio.`);
            errors.push({ idNegocio, message: "No se encontró negocio en _V3_getNegocio" });
            return { success: false, errors };
          }

          const saldo = Number(negocio.saldo_por_facturar || 0);
          if ((saldo - monto) < 0) {
            toastr?.error?.(`Saldo por facturar menor al Monto a facturar (Negocio ${idNegocio}).`);
            errors.push({ idNegocio, message: "Saldo < monto", raw: { saldo, monto } });
            return { success: false, errors };
          }

          const ex = pickExchangeFromNegocio(negocio, row);
          exList.push(ex);
          negocios.push(negocio);
        }

        // 3) Validar mismo cliente
        const clienteIds = new Set(
          negocios.map(n => String(n?.empresa?.id ?? n?.empresa_id ?? ""))
            .filter(Boolean)
        );

        if (clienteIds.size > 1) {
          toastr?.error?.("No se puede facturar agrupado: los negocios seleccionados tienen distinto Cliente ID.");
          errors.push({ message: "Múltiples cliente_id", raw: Array.from(clienteIds) });
          return { success: false, errors };
        }

        // 4) Construir payload agrupado
        const idsPipe = negocioIds.join("|");
        const montosPipe = montos.map(v => String(Number(v) || 0)).join("|");

        // correo/fecha
        const correo = (negocios.map(n => safeStr(n.correo_programacion)).find(Boolean) || "");
        const fecha = normalizeFechaProgramacion(new Date())

        const anyXNeg = exList.some(e => !!e.exchange_x_neg);
        const typeSet = new Set(exList.map(e => String(e.exchange_type || "")));
        const rateSet = new Set(exList.map(e => String(Number(e.exchange_rate || 0))));
        const exchange_type = [...typeSet][0] || "CLP";
        const exchange_rate = [...rateSet][0] || 0;
        let groupExchange = {
          exchange_x_neg: anyXNeg,
          exchange_type: exchange_type,
          exchange_rate: exchange_rate
        };


        const payloadAgrupado = {
          ...grupoVirtual,

          // asegura pipes consistentes
          id_negocios_programacion: idsPipe,
          monto_facturar_programacion: montosPipe,
          correo_programacion: correo,
          fecha_programacion: fecha,

          // fake Params
          id_grupo: null,
          tipo_fecha_programacion: "manual",
          dia_semanal_programacion: "",
          // Tipo de Cambio
          exchange_x_neg: groupExchange.exchange_x_neg,
          exchange_type: groupExchange.exchange_type,
          exchange_rate: groupExchange.exchange_rate

        };
        const params = buildParamsProgramacion(payloadAgrupado).toString();
        // 5) Crear factura agrupada (una sola petición)
        let facturaResp;
        try {
          facturaResp = await createFacturaAgrupada(params);
        } catch (e) {
          toastr?.error?.("Error inesperado al crear factura agrupada.");
          errors.push({ message: e?.message || String(e), raw: e });
          return { success: false, errors };
        }

        if (!facturaResp?.success) {
          toastr?.error?.(facturaResp?.errorMsg || "Error al crear factura agrupada.");
          errors.push({ message: "Error creando factura agrupada", raw: facturaResp });
          return { success: false, errors };
        }
        const payloadComprobante= {
          id: facturaResp?.dtv[0],
          folio: parseInt(facturaResp?.folio),
          fecha: normalizeFechaProgramacionFromDate(new Date()),
          tipo_factura: "FACTURA ELECTRONICA",
        }
        
        createComprobante(payloadComprobante);
        toastr?.success?.(`Factura agrupada creada exitosamente. Folio: ${facturaResp?.folio || "—"}`);

        // 6) Email (si hay correo)
        if (correo) {
          const montoTotal = montos.reduce((s, v) => s + (Number(v) || 0), 0);
          const clienteName =
            negocios[0]?.empresa?.razon_social ||
            negocios[0]?.empresa?.alias ||
            "";

          enviarCorreoFacturaEmitida({
            correo: 'darael@unabase.com',//,
            cliente: clienteName,
            idNegocio: idsPipe, // muestra que fue agrupada
            monto: montoTotal,
            folio: facturaResp?.folio || "",
            fecha: normalizeFechaProgramacionFromDate(new Date()),
            hostname: window.location.origin,
            agenteEmail: window.v3_data_username_email,
            agenteName: window.v3_data_username_name
          });
        }
        fetchProgramableNegocios()
      }

      // Helper: si todas las fechas vienen iguales => úsala, si no => vacío (que backend decida) o hoy
      function pickFechaProgramacion(negocios) {
        const fechas = negocios
          .map(n => normalizeFechaProgramacion(n.fecha_programacion))
          .filter(Boolean);

        if (!fechas.length) return "";
        const first = fechas[0];
        return fechas.every(f => f === first) ? first : "";
      }

      function enviarCorreoFacturaEmitida({ correo, cliente, idNegocio, monto, folio, fecha, hostname, agenteName, agenteEmail }) {
        const fmtMoney = (n) =>
          Number(n || 0).toLocaleString("es-CL", {
            style: "currency",
            currency: "CLP",
            maximumFractionDigits: 0
          });

        const html = `
    <html>
      <head>
        <meta charset="utf-8" />
        <style>
          body { font-family: Arial, Helvetica, sans-serif; color:#111; padding:20px; }
          .card { max-width:600px; margin:auto; border-radius:10px; border:1px solid #e5e7eb; padding:20px; }
          h2 { margin-top:0; color:#1f2937; }
          .info { margin: 14px 0; }
          .label { color:#6b7280; font-size:12px; }
          .value { font-size:12px; font-weight:600; }
          .footer { font-size:12px; color:#6b7280; margin-top:20px; }
        </style>
      </head>

      <body>
        <div class="card">
          <h2>Factura emitida automáticamente</h2>
          <p>Estimado(a),</p>
          <p>Le informamos que su factura del negocio fue emitida exitosamente.</p>

          <div class="info">
            <div class="label">Cliente:</div>
            <div class="value">${cliente || "Sin nombre"}</div>
          </div>

          <div class="info">
            <div class="label">Negocio ID:</div>
            <div class="value">${idNegocio}</div>
          </div>

          <div class="info">
            <div class="label">Monto facturado:</div>
            <div class="value">${fmtMoney(monto)}</div>
          </div>

          <div class="info">
            <div class="label">Folio Factura:</div>
            <div class="value">${folio || "Sin folio"}</div>
          </div>

          <div class="info">
            <div class="label">Fecha emisión:</div>
            <div class="value">${fecha}</div>
          </div>

          <div class="info">
            <div class="label">Ejecutivo emisor:</div>
            <div class="value">${agenteName} - ${agenteEmail}</div>
          </div>

          <p class="footer">
            Este mensaje fue generado automáticamente por el programador de Unabase.<br/>
            Host: ${hostname}
          </p>
        </div>
      </body>
    </html>
  `;

        const toReal = (correo || "").trim();
        if (!toReal) {
          console.warn("[EMAIL] No se envió: correo destinatario vacío.");
          return $.Deferred().resolve({ success: false, message: "Destinatario vacío" }).promise();
        }

        // si no te pasan hostname, usa el actual
        const host = (window.location.origin || "").trim();
        if (!host) {
          console.warn("[EMAIL] No se envió: hostname vacío.");
          return $.Deferred().resolve({ success: false, message: "Hostname vacío" }).promise();
        }

        const payload = {
          template: "bill_facturation",
          to: toReal,
          subject: `Factura emitida automaticamente - Negocio #${idNegocio}`,
          msg: html,
          hostname: host,
          username: "programador_masivo"
        };

        return $.ajax({
          url: `https://${window.location.host}/node/generic-email-interno`,
          method: "POST",
          contentType: "application/json; charset=utf-8",
          dataType: "json",
          data: JSON.stringify(payload)
        })
          .done(function (resp) {
            console.log("[EMAIL] Enviado OK:", resp);
            console.log(`[EMAIL] Notificación enviada a ${toReal}`);
          })
          .fail(function (jqXHR) {
            const msg =
              (jqXHR && jqXHR.responseJSON && (jqXHR.responseJSON.message || jqXHR.responseJSON.error)) ||
              (jqXHR && jqXHR.responseText) ||
              "Error enviando correo";
            console.error("[EMAIL] FAIL:", msg);
          });
      }

      console.log(errors);

    })();

    async function fetchNegocioById(idNegocio) {
      const id = Array.isArray(idNegocio) ? idNegocio[0] : idNegocio;
      const resp = await $.ajax({
        url: "/4DACTION/_V3_getNegocio",
        dataType: "json",
        method: "POST",
        data: {
          q: String(id || ""),
        }
      });

      const rows = Array.isArray(resp?.rows) ? resp.rows : [];
      return rows[0] || null;
    }

    async function createFactura(payloadFactura) {
      const resp = await $.ajax({
        url: `/4DACTION/_MASIVO_creaFactura`,
        method: "POST",
        dataType: "json",
        data: payloadFactura,
      });

      return resp || null;
    }

    async function createComprobante(payloadComprobante) {
      const resp = await $.ajax({
        url: `/4DACTION/_V3_generadtv_manual`,
        method: "POST",
        dataType: "json",
        data: payloadComprobante,
      });

      return resp || null;
    }

    const normalizeFechaProgramacion = (value) => {
      const str = safeStr(value);
      if (!str || str === '00-00-00' || str === '00-00-0000') return '';
      // 4D: DD-MM-YYYY
      if (/^\d{2}-\d{2}-\d{4}$/.test(str)) return str;
      // ISO: YYYY-MM-DD
      if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
        const [y, m, d] = str.split('-');
        return `${d}-${m}-${y}`;
      }
      return '';
    };

    const normalizeFechaParaElectronico = (value) => {
      const str = safeStr(value);

      const [y, m, d] = str.split('-');
      return `${d}/${m}/${y}`;
    };

    const normalizeFechaProgramacionFromDate = (date) => {
      if (!(date instanceof Date)) return ""; 
      if (Number.isNaN(date.getTime())) return "";   // Date inválido

      const dd = String(date.getDate()).padStart(2, "0");
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const yyyy = date.getFullYear();

      return `${yyyy}-${mm}-${dd}`;
    };

    const safeStr = (val) => {
      if (val === undefined || val === null) return '';
      if (typeof val === 'string') return val.trim();
      if (typeof val === 'number' && Number.isFinite(val)) return String(val);
      const s = String(val).trim();
      if (!s || s.toLowerCase() === 'nan' || s.toLowerCase() === 'undefined') return '';
      return s;
    };

    /* Helpers para grupoFacturacion */
    const getContacto = async (id) => {
      const url = `${baseUrl}/4DACTION/_V3_getContacto?q=${id}&filter=id`;
      const resp = await fetch(url);
      return resp.json();
    };


    const parsePipe = (v) => String(v ?? "").split("|").map(s => s.trim()).filter(Boolean);

    async function createFacturaAgrupada(payload) {
      const resp = await $.ajax({
        url: `/4DACTION/_MASIVO_creaFacturaAgrupada`,
        method: "POST",
        dataType: "json",
        data: payload
      });
      return resp || null;
    }

    function buildParamsProgramacion(row) {
      const params = new URLSearchParams();
      params.set("exchange_x_neg", String(row.exchange_x_neg ?? "false"));

      params.set(`cliente_1`, String(row.id_clientes_programacion ?? ""));
      params.set(`fecha_1`, String(row.fecha_programacion ?? ""));
      params.set(`recepcion_fecha_1`, String(row.recepcion_fecha_programacion ?? row.fecha_programacion ?? ""));
      params.set(`negocios_1`, String(row.id_negocios_programacion ?? ""));
      params.set(`montos_1`, String(row.monto_facturar_programacion ?? ""));
      params.set(`exchange_type_1`, String(row.exchange_type ?? "CLP"));
      params.set(`exchange_rate_1`, String(row.exchange_rate ?? 1));


      return params;

    }

    function buildGlosaProgramacionDefault(nombreNegocio, id) {

      // Guard “estático” dentro de la función (una vez por id)
      buildGlosaProgramacionDefault._savedIds ??= new Set();

      const raw = String(nombreNegocio || "").trim();
      if (!raw) return "";

      const parts = raw.split(/\s*\/\/\s*/).map(p => p.trim()).filter(Boolean);
      if (parts.length < 2) return raw;

      const cliente = parts[0];
      const referencia = parts[1];

      let glosa = "";
      if (parts.length >= 3) {
        const lugar = parts.slice(2).join(" // ");
        glosa = `${SERVICES_GLOSA} PARA ${cliente} PARA ${referencia} EN ${lugar}`;
      } else {
        glosa = `${SERVICES_GLOSA} PARA ${cliente} PARA ${referencia}`;
      }

      // === POST aquí mismo ===
      const idNegocio = String(id || "").trim();
      if (idNegocio && glosa && !buildGlosaProgramacionDefault._savedIds.has(idNegocio)) {
        buildGlosaProgramacionDefault._savedIds.add(idNegocio);
        
        $.ajax({
          url: "/4DACTION/_MASIVO_setNegocio",
          method: "POST",
          dataType: "json",
          data: {
            id_negocio: idNegocio,
            glosa_programacion: glosa
          }
        }).fail(function () {
          // si falló, permite reintentar más adelante
          buildGlosaProgramacionDefault._savedIds.delete(idNegocio);
        });
      }

      return glosa;
    }

    function pickExchangeFromNegocio(negocio, fallbackRow) {
      const type = safeStr( negocio?.exchange?.type ?? "CLP" );
      const xNeg = (type !== "CLP");
      const rate = Number( negocio?.exchange?.rate ?? 1 ) || 1;
      return { exchange_x_neg: xNeg, exchange_type: type || "CLP", exchange_rate: rate };
    }


    const formatDateToday = (date) => {
        const d = String(date.getDate()).padStart(2, '0');
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const y = date.getFullYear();
        return `${d}-${m}-${y}`; // DD-MM-YYYY
    };

    function formatCurrencyExchange(n, tipo) {
      const code = String(tipo || "CLP").trim().toUpperCase() || "CLP";
      const v = Number(n) || 0;

      let formatted = "";
      if (
        window.unaBase &&
        window.unaBase.utilities &&
        typeof window.unaBase.utilities.transformNumber === "function"
      ) {
        formatted = window.unaBase.utilities.transformNumber(v, "int");
      } else {
        formatted = v.toLocaleString("es-CL");
      }

      // tipo a la izquierda del signo $
      return code + " $ " + formatted;
    };

    function deriveEstadoNegocio(row) {
      // 1) Si viene explícito como string
      const raw = String(row?.estado || "").toLowerCase();
      if (raw.includes("cerrado")) return "cerrado";
      if (raw.includes("proceso")) return "en_proceso";

    }

    

    


  </script>
