<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Propuesta de Pago a Proveedores</title>
        <style>

            header img, header p {
                display: inline-block;
                vertical-align: top;
            }

            header p {
                margin: 0;
                padding: 0;
                margin-top: 7px;
                width: 50%;
            }

            header label {
                display: block;
            }

            section h1 {
                font-size: 24px;
            }

            section table {
                margin-bottom: 30px;
                border-spacing: 0;
                border-collapse: collapse;
            }

            section table th, section table td {
                padding: 3px;
                border: 1px solid black;
            }

            section table th {
                background-color: lightgrey;
            }

            section table.main {
                width: 100%;
                font-size: 13px;
            }

            .vertical-align{
                vertical-align: center;
            }

            .center{
                text-align: center;
            }
            .left{
                text-align: left;
            }
            .right{
                text-align: right;
            }

        </style>
    </head>
    <body>
        <header>
            <img src="<!--#4DTEXT vUrlImagenLogo-->" width="<!--#4DTEXT vAnchoPicture-->" height="<!--#4DTEXT vAltoPicture-->" style="max-width: 500px; max-height: 500px; padding: 10px; margin-left: <!--#4DIF custom_background-->50<!--#4DELSE-->30<!--#4DENDIF-->px;">
            <p>
                <label><!--#4DTEXT razonPropietaria--></label>
                <label><!--#4DTEXT giroPropietaria--></label>
                <label><!--#4DTEXT rutPropietaria--></label>
                <label><!--#4DTEXT direccionPropietaria--></label>
                <label><!--#4DTEXT telefonoPropietaria--></label>
                <label><!--#4DTEXT comunaPropietaria--> - <!--#4DTEXT ciudadPropietaria--></label>
            </p>
        </header>
        <section>
            <h1>Propuesta de Pago a Proveedores</h1>
            <table>
                <tbody>
                    <tr>
                        <th>ID</th>
                        <td><!--#4DTEXT Uppercase(filename)--></td>
                    </tr>
                    <tr>
                        <th>Fecha Corte</th>
                        <td>Por Confirmar</td>
                    </tr>
                    <tr>
                        <th>Fecha Creación</th>
                        <td><!--#4DTEXT [nomina_egresos]fecha--></td>
                    </tr>
                    <tr>
                        <th>Usuario</th>
                        <td>
                            <!--#4DIF ([nomina_egresos]username="")-->
                            <!--#4DTEXT Uppercase(_V3_data_username)-->
                            <!--#4DELSE-->
                            <!--#4DTEXT Uppercase([nomina_egresos]username)-->
                            <!--#4DENDIF-->
                        </td>
                    </tr>
                </tbody>
            </table>
            <table class="main">
                <thead>
                    <tr>
                        <th width="10%">Nro. OP</th>
                        <th width="10%">Gasto</th>
                        <th width="25%">Referencia</th>
                        <th width="25%">Proveedor</th>
                        <th width="10%">Documento</th>
                        <th width="5%">Tipo</th>
                        <th width="15%">Monto</th>
                    </tr>
                </thead>
                <tfoot>
                    <tr>
                        <td colspan="6" class="right">TOTAL&nbsp;&nbsp;</td>
                        <td colspan="1" style="font-weight:bold" class="right"><!--#4DTEXT _V3_formatCurrency(suma_montos)--></td>
                    </tr>
                </tfoot>
                <tbody>
                    <!--#4DLOOP aFolioDoc-->
                    <tr>
                        <td class="vertical-align center"><!--#4DTEXT aFolioOP{aFolioDoc}--></td>
                        <td class="vertical-align center"><!--#4DTEXT aDescrcipcionGasto{aFolioDoc}--></td>
                        <td class="vertical-align left"><!--#4DTEXT aReferencia{aFolioDoc}--></td>
                        <td class="vertical-align left"><!--#4DTEXT aProveedor{aFolioDoc}--></td>
                        <td class="vertical-align center"><!--#4DTEXT aTipoDtc{aFolioDoc}--></td>
                        <td class="vertical-align center"><!--#4DTEXT aTipoPago{aFolioDoc}--></td>
                        <td class="vertical-align right"><!--#4DTEXT _V3_formatCurrency(aMontoDoc{aFolioDoc})--></td>
                    </tr>
                    <!--#4DENDLOOP-->
                </tbody>
            </table>
        </section>
    </body>
</html>
