						"permisos[email]": email

					dataType: 'json',
					type: 'POST',
					success: function(data) {
						
						if (data.success) {
							toastr.success(NOTIFY.get('SUCCESS_SAVE'));
						}else{
							toastr.error(NOTIFY.get('ERROR_RECORD_READONLY', 'Error'));
						}						
					},
					error: function(data) {
						toastr.error(NOTIFY.get('ERROR_INTERNAL'));
					}
				});				
			}

		var getLogin = function(){
			return $('input[name="loguinsito"]').val();
		}				
				
		$(document).ready(() => {
			let login = $('input[name="loguinsito"]').val();
			let container = document.querySelector('section.sheet.areas footer article table tbody');
			console.log('login::'+login);
			
			axios(`/4DACTION/_v3_getAreasNegocio?login=${unaBase.doc.login}`).then(res => {
				let rows = res.data.rows;
				let areasByUser = res.data.byUser;
				for(let item of rows){
					let html = `<tr data-id="${item.id}">
									<td>${item.descripcion_centrocosto}</td>
									<td><input type="checkbox" name="default"></td>
									<td><input type="checkbox" name="add"></td>
								</tr>`;
					container.insertAdjacentHTML('beforeend', html);

				}
				for(let item of areasByUser){					
					if(item.default){
						container.querySelector(`tr[data-id="${item.id}"] input[name="default"]`).checked = true;
					}			
						container.querySelector(`tr[data-id="${item.id}"] input[name="add"]`).checked = true;
					
				}
			}).catch(err => {
				console.log(err);
			});
			$("section.areas table").on('click','td input[type="checkbox"]', function() {			
					let value = this.checked;
					let name = this.name;
					let area = $(this).closest('tr')[0].dataset.id;

					let defaultState;
					let addState;
					let state;
					// switch(name){
					// 	case 'default':
					// 		defaultState = value;
					// 	case 'add':
					// 		addState = value;
					// }
					// if(value){
					// 	state = name === 'default' ? 'default' : 'add';
					// }else{
					// 	state = name === 'default' ? 'not' : 'delete';
					// }
					axios(`/4DACTION/_V3_setAreaByUsuario?login=${getLogin()}&area=${area}&name=${name}&value=${value}`).then(res => {
						if (res.data.success) {
							toastr.success(NOTIFY.get('SUCCESS_SAVE'));
							if(value && name === 'default'){
								let defaults = document.querySelectorAll('input[name="default"]');
								for(let item of defaults){
									item.checked = false;
								}
								document.querySelector(`tr[data-id="${area}"] input[name="default"]`).checked = true;
								document.querySelector(`tr[data-id="${area}"] input[name="add"]`).checked = true;
							}else if(!value && name === 'add'){
								document.querySelector(`tr[data-id="${area}"] input[name="default"]`).checked = false;
								document.querySelector(`tr[data-id="${area}"] input[name="add"]`).checked = false;
							}
						}else{
								toastr.error(NOTIFY.get('ERROR_RECORD_READONLY', 'Error'));
						}
					}).catch(err => {
								toastr.error(NOTIFY.get('ERROR_RECORD_READONLY', 'Error'));
					});
				
				
			});	
		})
