<!DOCTYPE html>
<html>
	<head>
		<!--#4DSCRIPT/_V3_proxy_getParam1Content-->		
		<title>Usuario</title>
		<meta charset="utf-8">
		<script type="text/javascript" src="/v3/views/usuarios/script/content.js"></script>

		<script type="text/javascript">

		var set_campo_adicional = function(id, login, enabled){
			// var modulo =  $('#sheet-usuarios').data('modulo');				
			$.ajax({
				url: '/4DACTION/_V3_setParam1ByUsuario',
				data: {
					"permisos[id]" : id,
					"permisos[login]": login,					
					"permisos[enabled]": enabled
				},
				dataType: 'json',
				type: 'POST',
				success: function(data) {
					if (data.success) {
						toastr.success(NOTIFY.get('SUCCESS_SAVE'));
					}else{
						toastr.error(NOTIFY.get('ERROR_RECORD_READONLY', 'Error'));
					}						
				},
				error: function(data) {
					toastr.error(NOTIFY.get('ERROR_INTERNAL'));
				}
			});				
		}


		$(document).ready(function() {

			$('section.campo-adicional table td input[type="checkbox"]').click(function() {			

				var current = $(this);			
				var id = current.val();
				var login =  current.closest('tr').data('login');
				var enabled;


				if (current.attr('name') == 'enabled[check]')
					enabled = current.prop('checked');

				set_campo_adicional(id, login, enabled);
			});
				
		});					
				
		</script>

	</head>
	<body>
		<section class="sheet sheet-usuarios css-main campo-adicional" data-id="<!--#4DTEXT prmUserLogin-->">
			
			<footer>			
				<article>
					<h1>Filtrar cotizaciones y negocios por</h1>								
					<ul>						
						<li>
							<table>
								<thead>
									<tr>										
										<th>Valor</th>
										<th>Acceso</th>
									</tr>		
								</thead>
								<tbody>
									<!--#4DLOOP aid-->
									<tr data-id="<!--#4DVAR aid{aid}-->" data-login="<!--#4DTEXT alogin{aid}-->">									
										<td><!--#4DVAR anombre{aid}--></td>
										<td><input name="enabled[check]" class="check" type="checkbox" value="<!--#4DVAR aid{aid}-->"<!--#4DIF aenabled{aid}--> checked<!--#4DENDIF-->> </td>
									<!--#4DENDLOOP-->
									</tr>	
								</tbody>
					  			<tfoot></tfoot>
							</table>

								
						</li>						
					</ul>	
										
				</article>	
			
			</footer>		
		</section>		
	</body>
</html>
