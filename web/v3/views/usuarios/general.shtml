		function emailInfoCredenciales(){
			var loginUser = $('input[name=loguinsito]').val();
			confirm('Mediante esta acción se enviará email con información de acceso al usuario: '+ loginUser).done(function(data){
				if(data){		
					$.ajax({
						url: '/4DACTION/_V3_SendInfoAcceso',
						data: {
							'fromLogin': false,
							'loginUser': loginUser
						},
						async:false,
						dataType: 'json',
						success: function(data) {
							toastr.success('Información enviada al correo del usuario.');
						}
					}).done(function(data) {
						if (!data.success) {
							toastr.error('Envio fallido. Intente nuevamente. Si el problema persiste comuniquese con soporte.');
						}
					});
				}else{
					toastr.info('Envio cancelado.');
				}
			});
