    <meta charset="utf-8">
    <script>
      unaBase.ui.block();
      $(document).ready(function() {

        $('a[href="#tabs-1"]').trigger('click');
      });

      .ui-tabs .ui-tabs-panel {
        padding: 0 !important;
        overflow: hidden;
      }

          <li><a href="#tabs-1">General</a></li>
          <li class="load-historial" data-id="<!--#4DTEXT id-->"><a href="#tabs-2">Historial</a></li>

        <article id="tabs-1"></article>
        <article id="tabs-2"></article>

</html>
