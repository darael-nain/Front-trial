								'<td data-goto="true" width="7%" class="right"> ' + adiDTV + '</td>' +

				unaBase.toolbox.search.init(params);

				$("body").on("click", "input.selected", function(){

						if (inputSelected) {

							$('#menu ul').find('li[data-name="send_dtv_mail"]').show();

				$('table.results tbody').on('click', 'tr > td[data-goto="true"]', function() {

				//$('input[name="searchCheckbox"]').hide();


				// Opciones para listado
				(function() {
					var htmlObject;

					htmlObject = $('\
						<ul id="dropdown_menu" class="dropdown-menu" style="position: absolute; top: 95px; left: 95px; z-index: 1000;"> \
							<li><a href="#" class="new-nc" data-size="small"><span class="ui-icon ui-icon-locked"></span>Nueva nota de crédito</a></li>	\
					');

					htmlObject.find('a.new-nc').click(function(event) {
						//if (access._488) {
							var ids = [];
							var ids_nulo = [];
							var ids_cerrado = [];
							var ids_cerrado_compras = [];
							var ids_facturado = [];

							$('#viewport tbody.ui-selectable tr[data-id] td:first-of-type input.selected:checked').each(function() {
								ids.push($(this).closest('tr').data('id'));
								if (!$(this).closest('tr').data('status')) {
									ids_nulo.push($(this).closest('tr').data('id'));
								}
								if ($(this).closest('tr').data('closed')) {
									ids_cerrado.push($(this).closest('tr').data('id'));
								}
								if ($(this).closest('tr').data('closed-compras')) {
									ids_cerrado_compras.push($(this).closest('tr').data('id'));
								}
								if (!$(this).closest('tr').data('por-facturar')) {
									ids_facturado.push($(this).closest('tr').data('id'));
								}
							});

							var nulo = (ids_nulo.length > 0);
							var cerrado = (ids_cerrado.length > 0);
							var cerrado_compras = (ids_cerrado_compras.length > 0);
							var facturado = (ids_facturado.length > 0);

							if (!nulo && !cerrado) {
								confirm(MSG.get('CONFIRM_NEGOCIO_CLOSE_BATCH')).done(function(data) {
									if (data) {
										$.ajax({
											url: '/4DACTION/_V3_batchCierreByNegocio',
											data: {
												ids: ids.join('|'),
												close: true
											},

												if (typeof data.detail != 'undefined') {
													if (data.detail.result) {
														toastr.success(NOTIFY.get('SUCCESS_NEGOCIO_CLOSE_BATCH'));
													} else {
														toastr.warning(sprintf(NOTIFY.get('WARNING_NEGOCIO_CLOSE_BATCH'), data.detail.data.replace("\n", '<br>')));
													}
												} else {
													if (data.success) {
														toastr.success(NOTIFY.get('SUCCESS_NEGOCIO_CLOSE_BATCH'));
														setTimeout(function() {
															unaBase.toolbox.search.save();
															unaBase.toolbox.search.restore();
														}, 1000);
													} else {
														if (data.opened) {
															if (data.readonly)
																toastr.error(NOTIFY.get('ERROR_RECORD_READONLY_BATCH', 'Error'));
														}
													}
												}
											}
										});
									}
								});
							} else {
								var msg = "No es posible hacer cierre masivo de negocios porque se han seleccionado:<br>";
								msg+= cerrado? "- Negocios que ya fueron cerrados.<br>" : '';
								msg+= nulo? "- Negocios anulados.<br>" : '';
								toastr.warning(msg);
							}
						//}else{
							//alert("No cuentas con permiso para realizar esta acción.");
						//}
					});

					htmlObject.menu().hide();

					$('#dropdown_launcher').parentTo('header').before(htmlObject);
					$('#dropdown_launcher').css('float', 'left');
					$('#dropdown_launcher').css('height', '22px');
					$('#dropdown_launcher').css('background', '#fff');

						var element = this;
						$('#dropdown_menu').toggle();
					});

					// agregado el 9-7-19, gin
					/*if (mostrarFechaRecepcion) {

					}*/
					
				})();

				if (currency.code == "PEN") {
					$('#menu ul').find('li[data-name="export_ventas_pe"]').show();
				}

			/* ===== Paginador estilo botones ===== */
			.pagination{
			margin: 10px 0px 0px 10px;
			text-align: center;
			font-size: 12px;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 6px;
			flex-wrap: wrap;
			}

			.pagination a,
			.pagination span{
			display: inline-flex;
			align-items: center;
			justify-content: center;

			padding: 6px 10px;
			min-width: 30px;
			height: 28px;

			border-radius: 8px;
			border: 1px solid #d0d5dd;
			background: #ffffff;

			color: #344054;
			text-decoration: none;
			user-select: none;

			box-shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
			transition: background .15s ease, border-color .15s ease, transform .05s ease, box-shadow .15s ease;
			}

			.pagination a:hover{
			background: #f9fafb;
			border-color: #cbd5e1;
			}

			.pagination a:active{
			transform: translateY(1px);
			box-shadow: 0 0 0 rgba(16, 24, 40, 0);
			}

			.pagination a:focus-visible{
			outline: 2px solid rgba(0, 169, 114, 0.35);
			outline-offset: 2px;
			}

			.pagination span.current,
			.pagination a.current{
			background: #00a972;
			border-color: #00a972;
			color: #ffffff;
			font-weight: 700;
			}

			.pagination span.disabled{
			background: #f2f4f7;
			border-color: #eaecf0;
			color: #98a2b3;
			cursor: not-allowed;
			box-shadow: none;
			}

			.pagination span:not(.current):not(.disabled){
			background: transparent;
			border-color: transparent;
			box-shadow: none;
			cursor: default;
			min-width: auto;
			padding: 0 6px;
			height: 28px;
			}

			
		</style>


	</head>
