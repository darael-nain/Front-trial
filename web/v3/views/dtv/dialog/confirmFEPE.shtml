<!DOCTYPE html>
<html>
	<head>
		<!--#4DSCRIPT/_V3_proxy_ConfirmFEPE-->
		<title>Confirmar emision electrónico</title>
		<meta charset="utf-8">
		<script type="text/javascript" src="/v3/script/datepicker_es.js?<!--#4DTEXT _V3_version-->"></script>
		<script>

			function selectSeries(e){
				var select = e.target;

				var newSerie = select.value;
				var newCorrelativo = select.options[select.selectedIndex].dataset.folio;

				dtv.data.serieActualFE = newSerie;
				dtv.data.folioNextFE = newCorrelativo;

				document.querySelector('.correlativo_FEPE').value = dtv.data.folioNextFE;

			}

			$(document).ready(function(){

				//
				document.querySelector('input[name="correlativo-FEPE"]').value = dtv.data.folioNextFE;

				if (!dtv.data.apiFE.tokenStatus) {
					dtv.getTokenAccess();
				}
				$('button.fepe.send').button({icons: { primary: 'ui-icon-arrowthickstop-1-n'}, text: true }).click(function(event) {
					dtv.data.fecha_emision_formato_FE = $('#datepicker-FEPE-emi').val();
					dtv.data.fecha_vencimiento_formato_FE = $('#datepicker-FEPE-fin').val();
					dtv.data.cliente.email_receptor_fe = $('input[name="email-FEPE"]').val();
					dtv.unidadMedidaItemFEPESelected = $('select[name="tipo-FEPE"]').val();
					var sent = dtv.sendFEPE();
					if (sent) {
						$(event.target).parentTo('.ui-dialog-content').dialog('close');
					}
		        });
		        $( "#datepicker-FEPE-emi").datepicker({
		        		minDate: -2,
		        		maxDate: "+0D",
		        		dateFormat: "yy-mm-dd"
		        	}
		        );

		        $( "#datepicker-FEPE-fin").datepicker({ 
		        		minDate: 0,
		        		dateFormat: "yy-mm-dd"
		        	}
		        );

		        if (dtv.data.exchange.type == "" || dtv.data.exchange.type == "PEN") {
		        	$('input[name="moneda-FEPE"]').val("SOLES");
		        }else{
		        	$('input[name="moneda-FEPE"]').val("DOLARES");
		        }

		        if (dtv.data.occ.numero !="") {
		        	$(".info-occ-preview").hide();
		        }

			});

		</script>
		<style type="text/css">
			#fepe{
				background-color:rgb(247,247,248);
				border-radius:1px;
			}
			#fepe table{
				border-spacing:0;
				padding:0px;
		      	margin:0px;
		    }
			#fepe table > tbody > tr > td{
		      vertical-align: middle;
		      border-spacing:0;
		      padding:0px 0px 0px 5px;
		      margin:0px 0px 0px 5px;
		    }
			#fepe table > tbody > tr{
		      background-color:white!important;
		    }
				#fepe > table input{
			      padding:3px;
			      border:1px solid lightgray;
			      border-radius:3px;
			      background-color:white;
			      font-weight:bold;
			    }
			    	#fepe > table input.small{
				      width:70px;
			    	}
			    	#fepe > table input.medium{
				      width:200px;
			    	}
			    	#fepe > table input.large{
				      width:300px;
			    	}
			    	#fepe > table input.disabled{
				      background-color:lightgray;
				    }
				#fepe > table select{
			      padding:5px;
			      border:1px solid lightgray;
			      border-radius:3px;
			      background-color:white;
			      font-weight:bold;
			    }
			#fepe .titulo{
				font-size:12px;
				font-weight:bold;
				text-decoration:underline;
				margin-left: 10px;
			}
			#fepe button.fepe.send{
				margin-top:10px;
				border:1px solid gray;
				vertical-align:top;
				padding:3px;
				background:#38cc03!important;
			}
				#fepe button.fepe.send > span{
					font-weight:bold;
					font-size:12px;
					color:white;
				}
				#fepe button.fepe.send .ui-button-icon-primary{
					color:white!important;
				}
			.uppercase{
				text-transform:uppercase;
			}
		</style>
	</head>
	<body>
		<section id="fepe" class="sheet">
			<div class="info-occ-preview" style="color:#fa8107;position:absolute;top:10px;left:190px;font-weight:bold;font-size:13px;font-style:italic;">La factura no tiene Orden de compra de cliente (opcional)</div>
			<table>
				<tbody>
					<tr>
						<td colspan="4" class="left"><h5 class="titulo">Datos del receptor</h5></td>
					</tr>
					<tr>
						<td width="30%" class="right">RUC </td>
						<td colspan="3" width="70%" class="left"><input class="small disabled" type="text" value="<!--#4DTEXT vrut-->" disabled></td>
					</tr>
					<tr>
						<td width="30%" class="right">Razón Social </td>
						<td colspan="3" width="70%" class="left"><input class="large disabled" type="text" value="<!--#4DTEXT vempresa-->" disabled></td>
					</tr>
					<tr>
						<td width="30%" class="right">Dirección </td>
						<td colspan="3" width="70%" class="left"><input class="large disabled" type="text" value="<!--#4DTEXT vdireccion-->" disabled></td>
					</tr>
					<tr>
						<td width="30%" class="right">Email recepción </td>
						<td colspan="3" width="70%" class="left"><input name="email-FEPE" class="large uppercase" type="text" value="<!--#4DTEXT emailReceptor-->"></td>
					</tr>
					<tr>
						<td colspan="4" class="left"><h5 class="titulo">Datos del comprobante</h5></td>
					</tr>
					<tr style="display: none;">
						<td width="30%" class="right">Número. </td>
						<td colspan="3" width="70%" class="left"><input class="small disabled" type="text" value="<!--#4DTEXT serieCorrelativoNext-->" disabled></td>					
					</tr>
					<tr>
						<td width="30%" class="right">Serie</td>
						<td colspan="2" class="left">
							<select name="serie-FEPE" onchange="selectSeries(event)">
								<!--#4DLOOP aSeriesDoc--> 
									<!--#4DIF aPorDefecto{aSeriesDoc}-->
										<option data-folio="<!--#4DTEXT aSeriesCorrelativo{aSeriesDoc}-->" selected value="<!--#4DTEXT aSeriesDoc{aSeriesDoc}-->"><!--#4DTEXT aSeriesDoc{aSeriesDoc}--></option>
									<!--#4DELSE-->
										<option data-folio="<!--#4DTEXT aSeriesCorrelativo{aSeriesDoc}-->" value="<!--#4DTEXT aSeriesDoc{aSeriesDoc}-->"><!--#4DTEXT aSeriesDoc{aSeriesDoc}--></option>
									<!--#4DENDIF-->
								<!--#4DENDLOOP-->
							</select>
							<input name="correlativo-FEPE" class="small disabled correlativo_FEPE" type="text" disabled>
						</td>
					</tr>
					<tr>
						<td width="30%" class="right">Tipo </td>
						<td colspan="3" width="70%" class="left">
							<select name="tipo-FEPE" id="">
								<option selected value="ZZ">SERVICIO</option>
								<option value="NIU">BIEN</option>
							</select>
						</td>
					</tr>
					<tr>
						<td width="30%" class="right">Moneda </td>
						<td colspan="3" width="70%" class="left"><input name="moneda-FEPE" class="disabled" type="text" value="SOLES" readonly></td>
					</tr>
					<tr>
						<td width="25%" class="right">Fecha de Emisión </td>
						<td width="25%" class="left"><input type="text" id="datepicker-FEPE-emi" value="<!--#4DTEXT fechaEmisionFEPE-->" readonly></td>
						<td width="20%" class="left">Fecha de Vencimiento </td>
						<td width="30%" class="left"><input type="text" id="datepicker-FEPE-fin" value="<!--#4DTEXT fechaVctoFEPE-->"></td>
					</tr>
					<tr>
						<td width="30%" class="right"></td>
						<td colspan="3" width="70%" class="left" style="vertical-align:top;"><button class="fepe send"><span>ENVIAR</span></button></td>
					</tr>
				</tbody>
			</table>
		</section>
	</body>
</html>
