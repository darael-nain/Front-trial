<!DOCTYPE html>
<html>
	<head>
		<title>Ingresos</title>
		<meta charset="utf-8">
		<script>

			$(document).ready(function() {

				unaBase.toolbox.init();

				// Inicializamos un buscador
				var params = {
					searchOff: true,
					// Función que genera una URL de listado JSON
					url: function() { return '/4DACTION/_V3_getPago' },
					entity: 'Pago',
					// Función que genera cada fila de la tabla, dado el valor de i (índice de posición)
					// y el valor de rows (array con todos los resultados)
					// El contenido de rows corresponde al objeto de mismo nombre generado mediante la llamada
					// a la api JSON. Ver /v3/json/get_cotizacion.shtml para conocer el formato.
					row: {
						html: function(i, rows) {						
							
							
							var forma_pago = '';
							if (rows[i].FormaPago != "") {
								forma_pago = rows[i].FormaPago;
							}else{
								forma_pago = '----------';
							}

							var nummero_pago = '';
							if (rows[i].NumeroPago != "") {
								nummero_pago = rows[i].NumeroPago;
							}else{
								nummero_pago = '----------';
							}

							var fecha_pago = '';
							if (rows[i].FormaPago != '') {
								fecha_pago = rows[i].FechaPago;
							}else{
								fecha_pago = '----------';
							}

							/*
							var cuenta = '';
							if (rows[i].Cuenta_cte = '36391976') {
								cuenta = 'banco1';
							}
							if (rows[i].Cuenta_cte = '86105451') {
								cuenta = 'banco2';
							}

							else{
								cuenta = '----------';
							}*/


							
							
							var htmlData = '';
							if (rows[i].folio != '')
								htmlData = '<tr data-id="' + rows[i].id + '" data-username="' + rows[i].username + '" data-status="' + rows[i].status + '">' +
									'<td>' + rows[i].folio + '</td>' +
									'<td>' + ((rows[i].created_at !== undefined)? '<time datetime="' + Date.parse(rows[i].created_at).toISOString() + '">' + $.datepicker.formatDate('dd-mm-yy', Date.parse(rows[i].created_at)) + ' <span>' + Date.parse(rows[i].created_at).toTimeString().match( /^([0-9]{2}:[0-9]{2}:[0-9]{2})/ )[0].substring(0, 5) +  '</span></time>' : 'N/A' ) + '</td>' +
									'<td>' + ((rows[i].expires_at !== undefined)? '<time datetime="' + Date.parse(rows[i].expires_at).toISOString() + '">' + $.datepicker.formatDate('dd-mm-yy', Date.parse(rows[i].expires_at)) + '</time>' : 'N/A' ) + '</td>' +
									'<td>' + rows[i].username + '</td>' +
									'<td>' + ((rows[i].empresa !== undefined)? ((rows[i].empresa.alias.trim() != '')? rows[i].empresa.alias : (rows[i].empresa.razon_social.trim() != '')? rows[i].empresa.razon_social.trim() : 'N/A') : 'N/A') + '</td>' +
									'<td  width="200" class="text">' + ((rows[i].text.trim() != '')? rows[i].text : 'N/A') + '</td>' +
									'<td class="currency">' + rows[i].total + '</td>' +
									'<td>' + forma_pago + '</td>' +
									'<td>' + nummero_pago + '</td>' +									
									'<td>' + fecha_pago + '</td>' +
									//'<td>' + rows[i].Cuenta_cte + '</td>' +

								'</tr>';
							return htmlData;
						}
					},
					detail: {
						// Función que genera una URL de detalle, dado el id (identificador de item)
						url: function(id) { return '/v3/views/pagos/dialog/pago.shtml?id=' + id },
						iframe: false,
						dialog: true,
						size: 'large'
					},
					// Inflexiones
					inflection: {
						singular: 'cotización',
						plural: 'cotizaciones',
						none: 'ninguna'
					},
					// Filtros
					filters: [
						{ name: 'created_at', type: 'month', caption: 'Fecha de creación', range: true },
						{ name: 'expires_at', type: 'month', caption: 'Fecha de pago', range: true },
						// Pendiente: agregar datasource remoto y convertir a checkbox
						// con jquery ui autocomplete
						// { name: 'area_negocio', type: 'autocomplete', caption: 'Área de negocio', dataSource: 'getAreaNegocio' },
						{ name: 'ejecutivo_responsable', type: 'autocomplete', caption: 'Creado por', dataSource: 'getUsuario' },

						{ name: 'cuenta_cte', type: 'autocomplete', caption: 'Cuenta Corriente', dataSource: 'getCuentaCorriente' },


						/*

						{ name: 'cuenta_cte', type: 'autocomplete', caption: '¿cuenta corriente?', dataObject: [
							{ id: 'ct1', text: 'corp banca' }
						]},
						*/

						{ name: 'estado', type: 'checkbox', caption: 'Estado de la cotización', options: [
							{ caption: 'En proceso', name: 'estado_en_proceso', value: true },
							{ caption: 'Anulada', name: 'estado_nulo', value: false }
						] },

						//{ name: 'tipo_pago', type: 'autocomplete', caption: 'Tipo de Pago', dataSource: 'get_TipoPago' },
						{ name: 'tipo_pago', type: 'autocomplete', caption: 'Tipo de Pago', dataObject: [
							{ id: 'CHEQUE', text: 'CHEQUE' },
							{ id: 'TRANSFERENCIA', text: 'TRANSFERENCIA' },
							{ id: 'DEPOSITO', text: 'DEPOSITO' }
						]},

						{ name: 'tiene_pago', type: 'autocomplete', caption: '¿Tiene Pago?', dataObject: [
							{ id: 'true', text: 'CON PAGO' },
							{ id: 'false', text: 'SIN PAGO' }
						]},

						//{ name: 'cuenta_corriente', type: 'autocomplete', caption: 'Creado por', dataSource: 'get_cta_cte' },

						
					]
				};


				/*$.ajax({
					url: '/4DACTION/_V3_getDato',
					dataType: 'json',
					async: false,
					success: function(data) {
						$.each(data.rows, function(key, item) {
							if (item.enabled && item.options.length > 0)
								params.filters.push({
									name: item.nombre.replace(/ |\(|\)|\/|\?/g,"_"),
									type: 'autocomplete',
									caption: item.nombre,
									dataObject: item.options
								});
							//if (item.enabled && item.options.length == 0)
							//	params.filters.push({
							//		name: item.nombre.replace(/ |\(|\)|\/|\?/g,"_"),
							//		type: 'text',
							//		caption: item.nombre,
							//		dataObject: item.options
							//	});
							//
						});
					}
				});*/

				unaBase.toolbox.search.init(params);

				
				unaBase.toolbox.menu.init({
					entity: 'Pago',
					// buttons: [ 'new', 'print' ]
					buttons: [ 'searchOff' ]
				});
				


			});
		</script>
	</head>
	<body>
		<!-- Maqueta de la tabla que contendrá los resultados de búsqueda -->
		<table>
			<thead>
				<tr>
					<th data-sort-by="folio" data-sort-default="desc">Número</th>
					<th data-sort-by="created_at" data-sort-default="desc">Fecha Creación</th>
					<th data-sort-by="expires_at" data-sort-default="desc">Fecha Vencimiento</th>
					<th>Creada por</th>
					<th>Proveedor</th>
					<th>Referencia</th>
					<th data-sort-by="total" data-sort-default="desc">Monto</th>					
					<th>Tipo de Pago</th>
					<th>N° Pago</th>
					<th>Fecha Pago</th>
					<!--<th>Cuenta Cte</th>-->
				</tr>
			</thead>
			<tbody></tbody>
			<tfoot></tfoot>
		</table>
	</body>

</html>
