<!DOCTYPE html>
<html>
	<head>
		<title>Reportes de servicio</title>
		<meta charset="utf-8">
		<script type="text/javascript" src="/v3/views/reportes/script/content.js"></script>
		<script src="/v3/script/sorttable.js"></script>
		<script>
		var container = $('#container-reportes');
		var tbody = container.find('table.reportes > tbody');

		var ExistInfo = false;

		var getCategorias = function(){
			unaBase.ui.block();
			$.ajax({
				url: '/4DACTION/_V3_getCategoriasReporte',
				data: $('#search').serializeAnything(),
				dataType: 'json',
				success: function(data) {

						tbody.find("*").remove();

						let rowsCategorias = '';
						let totalVentas = 0;
						let totalCompras = 0;
						let totalUtilidad = 0;

						data.categorias.push({"id":"010101", "descripcion":"SIN CATEGORÍA"});
						$.each(data.categorias, function(key, item){

							var idCategoria = item.id;

							var rowsCategorias = '';

							var class_ = "name";
							if (item.id == "010101") {
								class_ = "name_rojo";
							};

							// verifica si categoria tiene servicios
							var cantServicios = 0;
							var categoriaAgregada = false;

							var ventasPorCategoria = 0;
							var comprasPorCategoria = 0;
							var utilidadPorCategoria = 0;

							for (var key2 in data.servicios) {
								if (idCategoria == data.servicios[key2].id_categoria) {
									cantServicios++;
									ventasPorCategoria += data.servicios[key2].ventas;
									comprasPorCategoria += data.servicios[key2].compras;
									utilidadPorCategoria += data.servicios[key2].utilidad;
								}
							}

							rowsCategorias += '<tr class="title" data-id="'+ item.id +'" data-categoria="'+ item.id +'">';
							rowsCategorias += '<th></th>';
							rowsCategorias += '<th><button class="ui-icon toggle categoria ui-icon-folder-open" title="Contraer o expandir título"></button></th>';
							rowsCategorias += '<th></th>';
							rowsCategorias += '<th></th>';
							rowsCategorias += '<th class="'+class_+'">'+ item.descripcion +' '+ ((item.id != "010101") ? '<span style="vertical-align:top">('+ cantServicios + " " + ((cantServicios > 1) ? 'Ítems' : 'Ítem') +')</span>' : '') +'</th>';
							rowsCategorias += '<th class="ventas numeric currency">'+ currency.symbol +' <span style="display: inline-block; width: 60px;">' + $.number(ventasPorCategoria, currency.decimals, currency.decimals_sep, currency.thousands_sep) +'</span></th>';
							rowsCategorias += '<th class="compras numeric currency">'+ currency.symbol +' <span style="display: inline-block; width: 60px;">' + $.number(comprasPorCategoria, currency.decimals, currency.decimals_sep, currency.thousands_sep) +'</span></th>';
							rowsCategorias += '<th class="utilidad numeric currency">'+ currency.symbol +' <span style="display: inline-block; width: 60px;">' + $.number(utilidadPorCategoria, currency.decimals, currency.decimals_sep, currency.thousands_sep) +'</span></th>';
							rowsCategorias += '</tr>';

							if (cantServicios > 0) {
								tbody.append(rowsCategorias);
								categoriaAgregada = true;
							}

							// agrega filas de servicios para cada categoria
							if (categoriaAgregada) {
								for (var key3 in data.servicios) {

									ExistInfo = true;

									var class_ = "";
									if (data.servicios[key3].id_categoria == 0) {
										data.servicios[key3].id_categoria = "010101";
										data.servicios[key3].descripcion = "Servicios no clasificados";
										class_ = "name_rojo";
									};

									var rowsServicios = '';
									if (idCategoria == data.servicios[key3].id_categoria) {
										rowsServicios += '<tr class="title2" data-id="'+ data.servicios[key3].id +'" data-categoria="'+ idCategoria +'">';
										rowsServicios += '<td><input style="display:none" name="usuario[check]" class="check" type="checkbox"></td>';
										rowsServicios += '<td></td>';
										rowsServicios += '<td style="text-align: left;">'+ data.servicios[key3].codigo +'</td>';
										rowsServicios += '<td>'+ data.servicios[key3].cuenta +'</td>';
										rowsServicios += '<td class="'+class_+'">'+ data.servicios[key3].descripcion +'</td>';
										rowsServicios += '<td class=" ventas numeric currency">'+ currency.symbol +' <span style="display: inline-block; width: 60px;">' + $.number(data.servicios[key3].ventas, currency.decimals, currency.decimals_sep, currency.thousands_sep)  + '</span><button id="detalle_compras" class="ui-icon ui-icon-document detail item" title="Detalle" onclick="unaBase.loadInto.dialog(\'/v3/views/servicios/content.shtml?id=' + data.servicios[key3].id + '&tipo=ventas\', \'Detalle del servicio\', \'large\');">Detalle</button></td>';
										rowsServicios += '<td class="compras numeric currency">'+ currency.symbol +' <span style="display: inline-block; width: 60px;">' + $.number(data.servicios[key3].compras, currency.decimals, currency.decimals_sep, currency.thousands_sep) + '</span><button id="detalle_compras" class="ui-icon ui-icon-document detail item" title="Detalle" onclick="unaBase.loadInto.dialog(\'/v3/views/servicios/content.shtml?id=' + data.servicios[key3].id + '&tipo=compras\', \'Detalle del servicio\', \'large\');">Detalle</button></td>';
										rowsServicios += '<td class="numeric currency" '+ ((data.servicios[key3].utilidad < 0)? 'style="color:red"' : 'style="color:#03a76b;font-weight:bold"') +'><label style="vertical-align:middle">'+ currency.symbol +'</label> <span style="vertical-align:middle">'+ $.number(data.servicios[key3].utilidad, currency.decimals, currency.decimals_sep, currency.thousands_sep) +'</span></td>';
										rowsServicios += '</tr>';

										tbody.append(rowsServicios);

										totalVentas += data.servicios[key3].ventas;
									 	totalCompras += data.servicios[key3].compras;
										totalUtilidad += data.servicios[key3].utilidad;

									}
								}
							}

						});

						$(".numero_servicios").text('(' + data.servicios.length + ' ítems)');

						// totales suma servicio
						$("#total_ventas").html($.number(totalVentas, currency.decimals, currency.decimals_sep, currency.thousands_sep));
						$("#total_compras").html($.number(totalCompras, currency.decimals, currency.decimals_sep, currency.thousands_sep));
						$("#total_utilidad").html($.number(totalUtilidad, currency.decimals, currency.decimals_sep, currency.thousands_sep));

						// totales comisiones y descuentos
						$("#comision_ventas").html($.number(data.totales.comision_venta, currency.decimals, currency.decimals_sep, currency.thousands_sep));
						$("#descuento_ventas").html($.number(data.totales.descuento_venta, currency.decimals, currency.decimals_sep, currency.thousands_sep));
						$("#descuento_compras").html($.number(data.totales.descuento_compra, currency.decimals, currency.decimals_sep, currency.thousands_sep));
						$("#diferencia_ventas").html($.number(data.totales.diferencia_venta, currency.decimals, currency.decimals_sep, currency.thousands_sep));

						// comisiones
						$("#nombre_comision1").text(data.totales.nombre_comision1);
						$("#comision1").text($.number(data.totales.comision1, currency.decimals, currency.decimals_sep, currency.thousands_sep));
						if(data.totales.comision1 >= 0){
							if(data.totales.check_comision1 == true){
								$(".tr_comision1").show();	
							}
							else{
								$(".tr_comision1").hide();
							}
							
						}

						$("#nombre_comision2").text(data.totales.nombre_comision2);
						$("#comision2").text($.number(data.totales.comision2, currency.decimals, currency.decimals_sep, currency.thousands_sep));
						if(data.totales.comision2 >= 0){
							if(data.totales.check_comision2 == true){
								$(".tr_comision2").show();	
							}
							else{
								$(".tr_comision2").hide();
							}
							
						}
						
						$("#nombre_comision3").text(data.totales.nombre_comision3);
						$("#comision3").text($.number(data.totales.comision3, currency.decimals, currency.decimals_sep, currency.thousands_sep));
						if(data.totales.comision3 >= 0){
							if(data.totales.check_comision3 == true){
								$(".tr_comision3").show();	
							}
							else{
								$(".tr_comision3").hide();
							}
							
						}

						$("#nombre_comision4").text(data.totales.nombre_comision4);
						$("#comision4").text($.number(data.totales.comision4, currency.decimals, currency.decimals_sep, currency.thousands_sep));
						if(data.totales.comision4 >= 0){
							if(data.totales.check_comision4y5 == true){
								$(".tr_comision4").show();	
							}
							else{
								$(".tr_comision4").hide();
							}
							
						}

						$("#nombre_comision5").text(data.totales.nombre_comision5);
						$("#comision5").text($.number(data.totales.comision5, currency.decimals, currency.decimals_sep, currency.thousands_sep));
						if(data.totales.comision5 >= 0){
							if(data.totales.check_comision4y5 == true){
								$(".tr_comision5").show();	
							}
							else{
								$(".tr_comision5").hide();
							}
							
						}

						// totales finales
						let sumaTotalesVentas = (totalVentas - data.totales.descuento_venta + data.totales.comision_venta + data.totales.diferencia_venta);
						let sumaTotalesCompras = (totalCompras - data.totales.descuento_compra);
						let sumaTotalesUtilidad = (sumaTotalesVentas - sumaTotalesCompras);

						$("#sumaTotalesVentas").html($.number(sumaTotalesVentas, currency.decimals, currency.decimals_sep, currency.thousands_sep));
						$("#sumaTotalesCompras").html($.number(sumaTotalesCompras, currency.decimals, currency.decimals_sep, currency.thousands_sep));
						$("#sumaTotalesUtilidad").html($.number(sumaTotalesUtilidad, currency.decimals, currency.decimals_sep, currency.thousands_sep));

					unaBase.ui.unblock();		
				}
			});			
		}
		$(document).ready(function() {

			var times = 0;
					
			// seleccionar check y mostrat u ocultar fusionar
			tbody.on('click', 'tr > td input[name="usuario[check]"]', function(){
				if (tbody.find('input:checked').length > 1) {
					$('#menu ul li[data-name="merge_report"]').show();				
				}else{
					$('#menu ul li[data-name="merge_report"]').hide();	
				}					
			});

			// Expandir y contraer títulos
			$('section.sheet table > thead button.toggle.all').click(function() {
				if ($(this).hasClass('ui-icon-folder-open')) {
					$(this).removeClass('ui-icon-folder-open');
					$(this).addClass('ui-icon-folder-collapsed');
					$(this).attr('title', 'Contraer todo');
					$('section.sheet table > tbody > tr.title button.toggle.categoria.ui-icon-folder-open').each(function() {
						$(this).trigger('click');
					});
				} else {
					$(this).removeClass('ui-icon-folder-collapsed');
					$(this).addClass('ui-icon-folder-open');
					$(this).attr('title', 'Expandir todo');
					$('section.sheet table > tbody > tr.title button.toggle.categoria.ui-icon-folder-collapsed').each(function() {
						$(this).trigger('click');
					});
				}
			});

			$('section.sheet table > tbody').on('click', 'button.toggle.categoria', function(event) {
				if ($(event.target).hasClass('ui-icon-folder-collapsed')) {
					$(event.target).closest('tr').nextUntil('tr.title').show();
					$(event.target).removeClass('ui-icon-folder-collapsed').addClass('ui-icon-folder-open');
				} else {
					$(event.target).closest('tr').nextUntil('tr.title').hide();
					$(event.target).removeClass('ui-icon-folder-open').addClass('ui-icon-folder-collapsed');
				}
			});

			unaBase.toolbox.init();
			unaBase.toolbox.search.init({
				callback: function() {
					var status = $('#search').find('*').prop('disabled');
					if (!status) {
						getCategorias();
					}
					return false;
				},
				inflection: {
					singular: 'categoria',
					plural: 'categorias',
					none: 'ninguna'
				},
				filters: [
					{ name: 'fecha_from', type: 'month', caption: 'Fecha desde', range: true, currentMonth: true },
					{ name: 'fecha_to', type: 'month', caption: 'Fecha hasta', range: true, currentMonth: true },
					{ name: 'categoria', type: 'autocomplete', caption: 'Categoria', dataSource: 'getCategorias' },
					{ name: 'centroCosto', type: 'autocomplete', caption: 'Area de negocio', dataSource: 'getCentroCosto' },
					{ name: 'estado_compras', type: 'autocomplete', caption: 'Estado de las compras', dataObject: [
						{
							id: true,
							text: 'Abiertas para compras'
						},
						{
							id: false,
							text: 'Cerradas para compras'
						}
					]},		
				]
			});

			unaBase.toolbox.menu.init({
				entity: 'CategoriasReporte',
				buttons: [ 'exit']

			});

			$('input[name="q"]').attr('placeholder', 'Buscar por nombre servicio');
			
		});		
		</script>

		<script>
			$(document).ready(function() {
				$('div.totales').draggable({ containment: "parent" });
				let buttonExport = $('<button class="export-report">Exportar a excel</button>');
				$('.full-height').append(buttonExport);
				buttonExport.click(function(){
					
					if (ExistInfo) {
						let sid = '';
						$.each($.cookie(),function(clave,valor) { if (clave == hash && valor.match(/UNABASE/g)) sid = valor; });
						let filters = $('#search').serializeAnything(true);
						let url = nodeUrl + '/export-list-reporte-por-servicio/?download=true&sid=' + encodeURIComponent(sid) + '&' + filters + '&hostname=' + window.location.origin;
						unaBase.log.save('Ha exportado el reporte por servicio', 'reportes');
						let download = window.open(url);
						download.blur();
						window.focus();
					}else{
						alert("No existe información a exportar");
					}
				});
				$('button.export-report').button({icons: { primary: 'ui-icon-calculator'}, text: true });

				let buttonExportCCxS = $('<button class="export-report-cc-servicio">Exportar a excel por cuenta</button>');
				$('.full-height').append(buttonExportCCxS);
				buttonExportCCxS.click(function(){
					if (ExistInfo) {
						let sid = '';
						$.each($.cookie(),function(clave,valor) { if (clave == hash && valor.match(/UNABASE/g)) sid = valor; });
						let filters = $('#search').serializeAnything(true);
						let url = nodeUrl + '/export-list-reporte-por-servicio-cc-x-s/?download=true&sid=' + encodeURIComponent(sid) + '&' + filters + '&hostname=' + window.location.origin;
						unaBase.log.save('Ha exportado el reporte por servicio', 'reportes');
						let download = window.open(url);
						download.blur();
						window.focus();
					}else{
						alert("No existe información a exportar");
					}
				});
				$('button.export-report-cc-servicio').button({icons: { primary: 'ui-icon-calculator'}, text: true });

				$('.currency-symbol').text(currency.symbol);
			});			      
		</script>

	<body>

			           	<th colspan="2"></th>
