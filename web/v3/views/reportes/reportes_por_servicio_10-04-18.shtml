<!DOCTYPE html>
<html>
	<head>
		<title>Reportes de servicio</title>
		<meta charset="utf-8">
		<script type="text/javascript" src="/v3/views/reportes/script/content.js"></script>
		<script src="/v3/script/sorttable.js"></script>
		<script>
		var container = $('#container-reportes');
		var tbody = container.find('table.reportes > tbody');

		var ExistInfo = false;

		var getCategorias = function(){
			unaBase.ui.block();
			$.ajax({
				url: '/4DACTION/_V3_getCategoriasReporte',
				data: $('#search').serializeAnything(),
				dataType: 'json',
				success: function(data) {			

						$('#search').find('*').prop('disabled', true);

						var rows = '';
						data.categorias.push({"id":"010101", "descripcion":"SIN CATEGORÍA"});
						$.each(data.categorias, function(key, item){

							var class_ = "name";
							if (item.id == "010101") {
								class_ = "name_rojo";
							};

							rows = rows + '<tr style="display:none" class="title" data-id="'+item.id+'" data-categoria="'+item.id+'">';
							rows = rows + '<th></th>';
							rows = rows + '<th><button class="ui-icon toggle categoria ui-icon-folder-open" title="Contraer o expandir título"></button></th>';
							rows = rows + '<th></th>';
							rows = rows + '<th></th>';
							rows = rows + '<th class="'+class_+'">'+ item.descripcion +' <span style="vertical-align:top"></span></th>';
							rows = rows + '<th class="ventas numeric currency">$ <span style="display: inline-block; width: 60px;">0</span></th>';							
							rows = rows + '<th class="compras numeric currency">$ <span style="display: inline-block; width: 60px;">0</span></th>';
							rows = rows + '<th class="utilidad numeric currency">$ <span style="display: inline-block; width: 60px;">0</span></th>';		
							rows = rows + '</tr>';
						});
						tbody.html(rows);
						

						var total_ventas = 0;
						var total_compras= 0;
						$.each(data.servicios, function(key, item){

							ExistInfo = true;

							var class_ = "";
							if (item.id_categoria == 0) {
								item.id_categoria = "010101";
								item.descripcion = "Servicios no clasificados";
								class_ = "name_rojo";
							};

							containerTitle = tbody.find('tr.title[data-categoria="'+ item.id_categoria +'"]');
							containerTitle.show();

							var rows = '';
							var cont;
							// rows = rows + '<tr class="title2" style="display:none" data-id="'+item.id+'" data-categoria="'+item.id_categoria+'">';
							rows = rows + '<tr class="title2" data-id="'+item.id+'" data-categoria="'+item.id_categoria+'">';
							rows = rows + '<td><input name="usuario[check]" class="check" type="checkbox"></td>';
							rows = rows + '<td></td>';
							/*rows = rows + '<td>'+ item.nombre_categoria +'</td>';*/
							rows = rows + '<td style="text-align: left;">'+ item.codigo +'</td>';
							rows = rows + '<td>'+ item.cuenta +'</td>';
							rows = rows + '<td class="'+class_+'">'+ item.descripcion +'</td>';
							rows = rows + '<td class=" ventas numeric currency">$ <span style="display: inline-block; width: 60px;">' + Math.round(item.ventas) + '</span><button id="detalle_compras" class="ui-icon ui-icon-document detail item" title="Detalle" onclick="unaBase.loadInto.dialog(\'/v3/views/servicios/content.shtml?id=' + item.id + '&tipo=ventas\', \'Detalle del servicio\', \'large\');">Detalle</button></td>';
							
							rows = rows + '<td class="compras numeric currency">$ <span style="display: inline-block; width: 60px;">' + Math.round(item.compras) + '</span><button id="detalle_compras" class="ui-icon ui-icon-document detail item" title="Detalle" onclick="unaBase.loadInto.dialog(\'/v3/views/servicios/content.shtml?id=' + item.id + '&tipo=compras\', \'Detalle del servicio\', \'large\');">Detalle</button></td>';
							rows = rows + '<td class="numeric currency" '+ ((item.utilidad < 0)? 'style="color:red"' : 'style="color:#03a76b;font-weight:bold"') +'><label style="vertical-align:middle">$</label> <span style="vertical-align:middle">'+ Math.round(item.utilidad) +'</span></td>';	
							rows = rows + '</tr>';
							var containerItem = containerTitle.last();
							$(rows).insertAfter(containerItem);

							// calcula total ventas por titulo
							var totalTituloVentas = parseFloat(containerTitle.find('th.ventas span').text());
							var totalTituloVentas =  Math.round(totalTituloVentas + item.ventas);
							containerTitle.find('th.ventas span').text(totalTituloVentas);
							
							// calcula total compras por titulo
							var totalTituloCompras = parseFloat(containerTitle.find('th.compras span').text());
							var totalTituloCompras =  Math.round(totalTituloCompras + item.compras);
							containerTitle.find('th.compras span').text(totalTituloCompras);
							
							// calcula total utilidad por titulo
							var totalTituloUtilidad = parseFloat(containerTitle.find('th.utilidad span').text());
							var totalTituloUtilidad =  Math.round(totalTituloUtilidad + item.utilidad);
							containerTitle.find('th.utilidad span').text(totalTituloUtilidad);
							if(totalTituloUtilidad < 0){
								containerTitle.find('th.utilidad span').css('color','red');
							}

							// calculo totales finales
							total_ventas+= Math.round(item.ventas);
							total_compras+= Math.round(item.compras);
							

						});

						$(".numero_servicios").text('(' + data.servicios.length + ' ítems)');
						
						//montos totales
						totalVentas = total_ventas;
						totalCompras = total_compras;
						totalUtilidad = totalVentas-totalCompras;

						$("#total_ventas").html(totalVentas).number(true, 0, ',', '.');
						$("#total_compras").html(totalCompras).number(true, 0, ',', '.');
						$("#total_utilidad").html(totalUtilidad).number(true, 0, ',', '.');						


						comision_venta = Math.round(data.totales.comision_venta);
						descuento_venta = data.totales.descuento_venta;
						descuento_compra = data.totales.descuento_compra;
						diferencia_venta =  Math.round(data.totales.diferencia_venta);

						$("#comision_ventas").html(comision_venta).number(true, 0, ',', '.');
						$("#descuento_ventas").html(descuento_venta).number(true, 0, ',', '.');
						$("#descuento_compras").html(descuento_compra).number(true, 0, ',', '.');
						$("#diferencia_ventas").html(diferencia_venta).number(true, 0, ',', '.');



						comision1 = Math.round(data.totales.comision1);
						nombre_comision1 = data.totales.nombre_comision1;
						comision2 = Math.round(data.totales.comision2);
						nombre_comision2 =  data.totales.nombre_comision2;
						comision3 = Math.round(data.totales.comision3);
						nombre_comision3 =  data.totales.nombre_comision3;
						comision4 = Math.round(data.totales.comision4);
						nombre_comision4 =  data.totales.nombre_comision4;
						comision5 = Math.round(data.totales.comision5);
						nombre_comision5 =  data.totales.nombre_comision5;


						//comisiones
						$("#comision1").text(comision1).number(true, 0, ',', '.');
						$("#nombre_comision1").text(nombre_comision1);
						if(comision1>=0){
							if(data.totales.check_comision1==true){
								$(".tr_comision1").show();	
							}
							else{
								$(".tr_comision1").hide();
							}
							
						}

						$("#comision2").text(comision2).number(true, 0, ',', '.');
						$("#nombre_comision2").text(nombre_comision2);
						if(comision2>=0){
							if(data.totales.check_comision2==true){
								$(".tr_comision2").show();	
							}
							else{
								$(".tr_comision2").hide();
							}
							
						}


						$("#comision3").text(comision3).number(true, 0, ',', '.');
						$("#nombre_comision3").text(nombre_comision3);
						if(comision3>=0){
							if(data.totales.check_comision3==true){
								$(".tr_comision3").show();	
							}
							else{
								$(".tr_comision3").hide();
							}
							
						}


						$("#comision4").text(comision4).number(true, 0, ',', '.');
						$("#nombre_comision4").text(nombre_comision4);

						$("#comision5").text(comision5).number(true, 0, ',', '.');
						$("#nombre_comision5").text(nombre_comision5);

						if(comision4>=0){
							if(data.totales.check_comision4y5==true){
								$(".tr_comision4").show();	
							}
							else{
								$(".tr_comision4").hide();
							}
							
						}

						if(comision5>=0){
							if(data.totales.check_comision4y5==true){
								$(".tr_comision5").show();	
							}
							else{
								$(".tr_comision5").hide();
							}
							
						}

						sumaTotalesVentas = parseInt(totalVentas - descuento_venta + comision_venta + diferencia_venta);
						sumaTotalesCompras = parseInt(totalCompras - descuento_compra);
						sumaTotalesUtilidad = parseInt(sumaTotalesVentas - sumaTotalesCompras);

						$("#sumaTotalesVentas").html(sumaTotalesVentas).number(true, 0, ',', '.');
						$("#sumaTotalesCompras").html(sumaTotalesCompras).number(true, 0, ',', '.');
						$("#sumaTotalesUtilidad").html(sumaTotalesUtilidad).number(true, 0, ',', '.');
						
						
						$.each(data.categorias, function(key, item) {
							var title = tbody.find('tr.title[data-categoria="' + item.id + '"]');
							var total = title.nextUntil('tr.title').length;	
							var total_items = 0;										
							title.find('th.name span').text('(' + total + ' ítems)');						
						});



						tbody.find('.numeric.currency span').number(true, 0, ',', '.');

						$('#search').find('*').prop('disabled', false);

					unaBase.ui.unblock();					
				}
			});			
		}
		$(document).ready(function() {

			var times = 0;
					
			// seleccionar check y mostrat u ocultar fusionar
			tbody.on('click', 'tr > td input[name="usuario[check]"]', function(){
				if (tbody.find('input:checked').length > 1) {
					$('#menu ul li[data-name="merge_report"]').show();				
				}else{
					$('#menu ul li[data-name="merge_report"]').hide();	
				}					
			});

			// Expandir y contraer títulos
			$('section.sheet table > thead button.toggle.all').click(function() {
				if ($(this).hasClass('ui-icon-folder-open')) {
					$(this).removeClass('ui-icon-folder-open');
					$(this).addClass('ui-icon-folder-collapsed');
					$(this).attr('title', 'Contraer todo');
					$('section.sheet table > tbody > tr.title button.toggle.categoria.ui-icon-folder-open').each(function() {
						$(this).trigger('click');
					});
				} else {
					$(this).removeClass('ui-icon-folder-collapsed');
					$(this).addClass('ui-icon-folder-open');
					$(this).attr('title', 'Expandir todo');
					$('section.sheet table > tbody > tr.title button.toggle.categoria.ui-icon-folder-collapsed').each(function() {
						$(this).trigger('click');
					});
				}
			});

			$('section.sheet table > tbody').on('click', 'button.toggle.categoria', function(event) {
				if ($(event.target).hasClass('ui-icon-folder-collapsed')) {
					$(event.target).closest('tr').nextUntil('tr.title').show();
					$(event.target).removeClass('ui-icon-folder-collapsed').addClass('ui-icon-folder-open');
				} else {
					$(event.target).closest('tr').nextUntil('tr.title').hide();
					$(event.target).removeClass('ui-icon-folder-open').addClass('ui-icon-folder-collapsed');
				}
			});

			unaBase.toolbox.init();
			unaBase.toolbox.search.init({
				callback: function() {
					var status = $('#search').find('*').prop('disabled');
					if (!status) {
						getCategorias();
					}
					return false;
				},
				inflection: {
					singular: 'categoria',
					plural: 'categorias',
					none: 'ninguna'
				},
				filters: [
					{ name: 'fecha_from', type: 'month', caption: 'Fecha desde', range: true, currentMonth: true },
					{ name: 'fecha_to', type: 'month', caption: 'Fecha hasta', range: true, currentMonth: true },
					{ name: 'categoria', type: 'autocomplete', caption: 'Categoria', dataSource: 'getCategorias' }			
				]
			});

			unaBase.toolbox.menu.init({
				entity: 'CategoriasReporte',
				buttons: [ 'exit']

			});

			$('input[name="q"]').attr('placeholder', 'Buscar por nombre servicio');			
			
		});		
		</script>

		<script>
			$(document).ready(function() {
				$('div.totales').draggable({ containment: "parent" });
				let buttonExport = $('<button class="export-report">Exportar a excel</button>');
				$('.full-height').append(buttonExport);
				buttonExport.click(function(){
					if (ExistInfo) {
						let sid = '';
						$.each($.cookie(),function(clave,valor) { if (clave == hash && valor.match(/UNABASE/g)) sid = valor; });
						let filters = $('#search').serializeAnything(true);
						let url = nodeUrl+ '/export-list-reporte-por-servicio/?download=true&sid=' + encodeURIComponent(sid) + '&' + filters + '&hostname=' + window.location.origin;
						unaBase.log.save('Ha exportado el reporte por servicio', 'reportes');
						let download = window.open(url);
						download.blur();
						window.focus();
					}else{
						alert("No existe información a exportar");
					}
				});
				$('button.export-report').button({icons: { primary: 'ui-icon-calculator'}, text: true });
			});			      
		</script>
