<!DOCTYPE html>
<html>
	<head>
		<title>Reportes de servicio</title>
		<meta charset="utf-8">
		<script type="text/javascript" src="/v3/views/reportes/script/content.js"></script>
		<script src="/v3/script/sorttable.js"></script>
		<script>
		var getCategorias = function(){
			unaBase.ui.block();
			$.ajax({
				url: '/4DACTION/_V3_getCategoriasReporte',
				data: $('#search').serializeAnything(),
				dataType: 'json',
				success: function(data) {
						var container = $('#container-reportes table.reportes > tbody');							
						var rows = '';

						data.categorias.push({"id":"010101", "descripcion":"SIN CATEGORÍA"});
						$.each(data.categorias, function(key, item){

							var class_ = "name";
							if (item.id == "010101") {
								class_ = "name_rojo";
							};

							rows = rows + '<tr style="display:none" class="title" data-id="'+item.id+'" data-categoria="'+item.id+'">';
							rows = rows + '<th></th>';
							rows = rows + '<th><button class="ui-icon toggle categoria ui-icon-folder-open" title="Contraer o expandir título"></button></th>';
							rows = rows + '<th class="'+class_+'">'+ item.descripcion +' <span style="vertical-align:top"></span></th>';
							rows = rows + '<th></th>';
							rows = rows + '<th></th>';
							rows = rows + '<th></th>';
							rows = rows + '<th class="ventas numeric currency">' + currency.symbol + ' <span style="vertical-align:top">0</span></th>';							
							rows = rows + '<th class="compras numeric currency">' + currency.symbol + ' <span style="vertical-align:top">0</span></th>';
							rows = rows + '<th class="utilidad numeric currency">' + currency.symbol + ' <span style="vertical-align:top">0</span></th>';		
							rows = rows + '</tr>';
						});
						container.html(rows);
						

						var total_ventas = 0;
						var total_compras= 0;
						$.each(data.servicios, function(key, item){

							var class_ = "";
							if (item.id_categoria == 0) {
								item.id_categoria = "010101";
								item.descripcion = "Servicios no clasificados";
								class_ = "name_rojo";
							};

							

							containerTitle = container.find('tr.title[data-categoria="'+ item.id_categoria +'"]');
							containerTitle.show();

							var rows = '';
							// rows = rows + '<tr class="title2" style="display:none" data-id="'+item.id+'" data-categoria="'+item.id_categoria+'">';
							rows = rows + '<tr class="title2" data-id="'+item.id+'" data-categoria="'+item.id_categoria+'">';
							rows = rows + '<td></td>';
							rows = rows + '<td></td>';
							rows = rows + '<td>'+ item.nombre_categoria +'</td>';
							rows = rows + '<td>'+ item.codigo +'</td>';
							rows = rows + '<td>'+ item.cuenta +'</td>';
							rows = rows + '<td class="'+class_+'">'+ item.descripcion +'</td>';
							rows = rows + '<td class=" ventas numeric currency">' + currency.symbol + ' <span>' + Math.round(item.ventas) + '</span></td>';
							rows = rows + '<td class="compras numeric currency">' + currency.symbol + ' <span>' + Math.round(item.compras) + '</span></td>';
							rows = rows + '<td class="numeric currency">' + currency.symbol + ' <span '+ ((item.utilidad < 0)? 'style="color:red"' : '') +'>'+ Math.round(item.utilidad) +'</span></td>';		
							rows = rows + '</tr>';
							var containerItem = containerTitle.last();
							$(rows).insertAfter(containerItem);

							// calcula total ventas por titulo
							var totalTituloVentas = parseFloat(containerTitle.find('th.ventas span').text());
							var totalTituloVentas =  Math.round(totalTituloVentas + item.ventas);
							containerTitle.find('th.ventas span').text(totalTituloVentas);
							
							// calcula total compras por titulo
							var totalTituloCompras = parseFloat(containerTitle.find('th.compras span').text());
							var totalTituloCompras =  Math.round(totalTituloCompras + item.compras);
							containerTitle.find('th.compras span').text(totalTituloCompras);
							
							// calcula total utilidad por titulo
							var totalTituloUtilidad = parseFloat(containerTitle.find('th.utilidad span').text());
							var totalTituloUtilidad =  Math.round(totalTituloUtilidad + item.utilidad);
							containerTitle.find('th.utilidad span').text(totalTituloUtilidad);
							if(totalTituloUtilidad<0){
								containerTitle.find('th.utilidad span').css('color','red');
							}												

							// calculo totales finales
							total_ventas+= Math.round(item.ventas);
							total_compras+= Math.round(item.compras);
						});


						//montos totales
						totalVentas = total_ventas;
						totalCompras = total_compras;
						totalUtilidad = totalVentas-totalCompras;

						$("#total_ventas").html(totalVentas).number(true, currency.decimals, ',', '.');
						$("#total_compras").html(totalCompras).number(true, currency.decimals, ',', '.');
						$("#total_utilidad").html(totalUtilidad).number(true, currency.decimals, ',', '.');						

						comision_venta = Math.round(data.totales.comision_venta);
						descuento_venta = data.totales.descuento_venta;
						descuento_compra = data.totales.descuento_compra;
						diferencia_venta =  Math.round(data.totales.diferencia_venta);

						$("#comision_ventas").html(comision_venta).number(true, currency.decimals, ',', '.');
						$("#descuento_ventas").html(descuento_venta).number(true, currency.decimals, ',', '.');
						$("#descuento_compras").html(descuento_compra).number(true, currency.decimals, ',', '.');
						$("#diferencia_ventas").html(diferencia_venta).number(true, currency.decimals, ',', '.');


						sumaTotalesVentas = (totalVentas - descuento_venta + comision_venta + diferencia_venta);
						sumaTotalesCompras = (totalCompras - descuento_compra);
						sumaTotalesUtilidad = (sumaTotalesVentas - sumaTotalesCompras);

						$("#sumaTotalesVentas").html(sumaTotalesVentas).number(true, currency.decimals, ',', '.');
						$("#sumaTotalesCompras").html(sumaTotalesCompras).number(true, currency.decimals, ',', '.');
						$("#sumaTotalesUtilidad").html(sumaTotalesUtilidad).number(true, currency.decimals, ',', '.');



						
						
						$.each(data.categorias, function(key, item) {
							var title = container.find('tr.title[data-categoria="' + item.id + '"]');
							var total = title.nextUntil('tr.title').length;													
							title.find('th.name span').text('(' + total + ' ítems)');						
						});			

						container.find('.numeric.currency span').number(true, currency.decimals, ',', '.');
					unaBase.ui.unblock();					
				}
			});			
		}
		$(document).ready(function() {
			// Expandir y contraer títulos
			$('section.sheet table > thead button.toggle.all').click(function() {
				if ($(this).hasClass('ui-icon-folder-open')) {
					$(this).removeClass('ui-icon-folder-open');
					$(this).addClass('ui-icon-folder-collapsed');
					$(this).attr('title', 'Contraer todo');
					$('section.sheet table > tbody > tr.title button.toggle.categoria.ui-icon-folder-open').each(function() {
						$(this).trigger('click');
					});
				} else {
					$(this).removeClass('ui-icon-folder-collapsed');
					$(this).addClass('ui-icon-folder-open');
					$(this).attr('title', 'Expandir todo');
					$('section.sheet table > tbody > tr.title button.toggle.categoria.ui-icon-folder-collapsed').each(function() {
						$(this).trigger('click');
					});
				}
			});

			$('section.sheet table > tbody').bind('click', 'button.toggle.categoria', function(event) {
				if ($(event.target).hasClass('ui-icon-folder-collapsed')) {
					$(event.target).closest('tr').nextUntil('tr.title').show();
					$(event.target).removeClass('ui-icon-folder-collapsed').addClass('ui-icon-folder-open');
				} else {
					$(event.target).closest('tr').nextUntil('tr.title').hide();
					$(event.target).removeClass('ui-icon-folder-open').addClass('ui-icon-folder-collapsed');
				}
			});

			unaBase.toolbox.init();
			unaBase.toolbox.search.init({
				callback: function() {				
					getCategorias();
					return false;
				},
				inflection: {
					singular: 'categoria',
					plural: 'categorias',
					none: 'ninguna'
				},
				// Filtros
				filters: [
					{ name: 'fecha', type: 'month', caption: 'Fecha', range: true, currentMonth: true },
					{ name: 'categoria', type: 'autocomplete', caption: 'Categoria', dataSource: 'getCategorias' }				
				]
			});

			unaBase.toolbox.menu.init({
				entity: 'CategoriasReporte', // especifica entidad sobre la cual se almacenan los datos
									  // y nombre para referenciar los views
				/*buttons: [ 'new', 'clone', 'print' ]*/
				buttons: [ 'exit']

			});
			
		});		
		</script>
		<style type="text/css">


		.name{color: black;}
		.name_rojo{color: red;}
		.name > span{color: #AF6D44;}
		.ventas{color: black;}
		.ventas > span{color: black;}
		.compras{color: black;}
		.compras > span{color: black;}
		.utilidad{color: black;}
		.utilidad > span{color: black;}

		div.totales {
            	position: absolute;
            	right: 15px;
            	bottom: 30px;
            	z-index: 1000;
            	width: 515px;
            	height: 120px;
            	padding: 3px;

            	opacity: 0.9;
            	background-color: darkgrey;
            	color: black;
            	font-size: 14px;
            	cursor: move;
            	border-radius: 4px;
            	box-shadow: -4px 4px 8px 1px rgba(48, 48, 48, 0.75);
            }

            div.totales > span {
            	display: block;
            }

            div.totales > span > span {
            	display: inline-block;
            }

            div.totales > span > span:first-of-type {
            	width: 85px;
            }

            div.totales > span > span:nth-of-type(2) {
            	width: 135px;
            }

            div.totales > span > span:nth-of-type(3) {
            	width: 135px;
            }

            div.totales > span > span:nth-of-type(4) {
            	width: 145px;
            }




            div.totales > span > span.numeric {
            	text-align: right;
            }

            span.total_comisiones {
				/* color: #CF8D64; */
				background-color: #2DC800;
				color: black;
				margin-top: 10px;
			}

			span.total_ventas {
				/* color: #64CF8D; */
				background-color: #FFFF11;
				color: black;
				text-align: left!important;
			}

			span.total_descuentos {
				background-color: #FF3333;
				color: black;
			}

			span.total_Facturado {
				background-color: #F781BE;
				color: black;
			}

			span.total_diferencia {
				background-color: #22FF22;
				color: black;
			}

			span.sumaTotalesVentas {
				background-color: #8258FA;
				color: black;
			}

			span.saldo_por_cobrar {
				background-color: #FFFF11;
				color: black;
			}

			span.real {
				-webkit-filter: hue-rotate(270deg);
			}
		</style>
		<script>
			$(document).ready(function() {
				$('div.totales').draggable({ containment: "parent" });
				
			});

			
		    $("#btnExport").click(function(e) {
		        window.open('data:application/vnd.ms-excel,' + encodeURIComponent($('.sheet').html()));
		        e.preventDefault();
		    });


		</script>

		  
		
	</head>
	<body>
		<section class="sheet" id="container-reportes">
			<!--<input type="button" id="btnExport" value=" Export Table data into Excel " />-->
			<table class="items reportes">
				<thead>
					<tr>
						<th style="background-color: <!--#4DVAR vColorCorporativoCSS--> !important; width: 30px !important;"></th>
						<th><div class="carpeta1"><button style="-webkit-filter: invert(100%);" class="ui-icon ui-icon-folder-open toggle all" title="Contraer todo"></button></div></th>
						<th style="text-align: left;">Categoria</th>
						<th style="text-align: left;">Código</th>
						<th style="text-align: left;">Cta. contable</th>
						<th style="text-align: left;">Servicio</th>
						<th style="text-align: left;"><!--#4DVAR _V3_defaultCurrencySymbol--> Ventas.</th>
						<th style="text-align: left;"><!--#4DVAR _V3_defaultCurrencySymbol--> Compra</th>
						<th style="text-align: left;"><!--#4DVAR _V3_defaultCurrencySymbol--> Utilidad</th>						
					</tr>
				</thead>
				
				<tbody></tbody>		
			</table>

			<div class="totales">
			<span>
				<span></span>
				<span><strong>Total Ventas</strong></span>
				<span>Total Compras</span>
				<span>Total Utilidad</span>
			</span>	
			<span>
				<span></span>
				<span class="total_ventas numeric currency" ><!--#4DVAR _V3_defaultCurrencySymbol--> <span id="total_ventas">0</span></span>
				<span class="total_ventas"><!--#4DVAR _V3_defaultCurrencySymbol--> <span id="total_compras">0</span></span>
				<span class="total_ventas"><!--#4DVAR _V3_defaultCurrencySymbol--> <span id="total_utilidad">0</span></span>
			</span>	
			</br>		
			<span>
				<span>Descuentos:</span>
				<span class="total_descuentos"><!--#4DVAR _V3_defaultCurrencySymbol--> <span id="descuento_ventas"></span></span>
				<span class="total_descuentos"><!--#4DVAR _V3_defaultCurrencySymbol--> <span id="descuento_compras"></span></span>
				<span class="total_neto"><span></span></span>				
			</span>
			<span>
				<span>Sobrecargos:</span>
				<span class="total_comisiones"><!--#4DVAR _V3_defaultCurrencySymbol--> <span id="comision_ventas"></span></span>	
				<span class="total_neto"><span></span></span>
				<span class="total_neto"><span></span></span>			
			</span>
			<span>
				<span>Ajustes:</span>
				<span class="total_diferencia"><!--#4DVAR _V3_defaultCurrencySymbol--> <span id="diferencia_ventas"></span></span>	
				<span class="total_neto"><span></span></span>
				<span class="total_neto"><span></span></span>			
			</span>
			<br>
			<span>
				<span>TOTALES:</span>
				<span class="saldo_por_cobrar"><!--#4DVAR _V3_defaultCurrencySymbol--> <span id="sumaTotalesVentas"></span></span>
				<span class="saldo_por_cobrar"><!--#4DVAR _V3_defaultCurrencySymbol--> <span id="sumaTotalesCompras"></span></span>
				<span class="saldo_por_cobrar"><!--#4DVAR _V3_defaultCurrencySymbol--> <span id="sumaTotalesUtilidad"></span></span>				
			</span>
			
			
		
		</div>
		</section>



			
	</body>
</html>
