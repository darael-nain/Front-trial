			    $.getJSON('/4DACTION/_V3_get_reportdata_vxcliente', function(data) {			    
			    	$('#report-test1').highcharts({
			    		chart: {
			    			type:'pie',
				            plotBackgroundColor: null,
				            plotBorderWidth: 1,//null,
				            plotShadow: false
				        },					    
					    title: {
					        text: 'Ventas por clientes, historico'
					    },
				        tooltip: {
				            pointFormat: '{series.name}: <b>{point.percentage:.1f}%</b>'
				        },
				        plotOptions: {
				            pie: {
				                allowPointSelect: true,
				                cursor: 'pointer',
				                dataLabels: {
				                    enabled: true,
				                    //format: '<b>{point.name}</b>: {point.percentage:.1f} %',
				                    style: {
				                        color: (Highcharts.theme && Highcharts.theme.contrastTextColor) || 'black'
				                    }
				                }
				            }
				        },					
					    series: [{
					        name: 'Ventas',
					        data: data,
					        color: '#FF0000',
					        negativeColor: '#0088FF'
					    }]

					});
			    });
			}

			var vaporano = function(){				
				$.getJSON('/4DACTION/_V3_get_reportdata_vanos', function(data3) {
					var currentYear = new Date().getFullYear();
					var seriesData = [];
					for (var i = 4; i >= 0; i--) {
						seriesData.push({
							name: (currentYear - i).toString(),
							data: data3['ventas' + (i === 0 ? '' : i)],
							color: Highcharts.getOptions().colors[4 - i],
							negativeColor: '#0088FF'
						});
					}

					$('#report-test10').highcharts({
						chart: {
							type: 'spline',
							margin: 75,
							options3d: {
								enabled: false,
								alpha: 30,
								beta: 25,
								depth: 70
							},
							frame: {					            
								back: {					              
									color: 'black'
								}
							}
						},					    
						title: {
							text: 'Comparativo venta x año'
						},
						plotOptions: {
							column: {
								depth: 25
							}
						},				    
						xAxis: {
							categories: Highcharts.getOptions().lang.shortMonths
						},
						yAxis: {
							opposite: true
						},
						series: seriesData
					});
				});
			}
