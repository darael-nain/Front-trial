		<script>
			function updateCambio(monthNumber, currentValue){
				var objMonths = $('.months-' + monthNumber);
				var objMonthsResult = $('.months-result-' + monthNumber);
				var newCambio = parseFloat(currentValue);

				$.each(objMonths, function(key, value) {
					var monto = parseFloat($(this).data('montoraw'));
					var cambio = parseFloat($(this).data('cambio'));
					var resultado = monto/newCambio;
					$(this).find('input').val($.number(resultado, currency.decimals, currency.decimals_sep, currency.thousands_sep));
				});

				$.each(objMonthsResult, function(key1, value1) {
					var monto = parseFloat($(this).data('montoraw'));
					var cambio = parseFloat($(this).data('cambio'));
					var resultado = monto/newCambio;
					$(this).text($.number(resultado, currency.decimals, currency.decimals_sep, currency.thousands_sep));
				});
			}

			$(document).ready(function() {
				$('div.totales').draggable({ containment: "parent" });
				$('.symbol-money').text(currency.symbol);

				// Reemplazar el cuadrado con el span que contiene la flecha
				var verHastaText = $('body').find('*').contents().filter(function() {
					return this.nodeType === 3 && this.textContent.includes('□');
				});
				if (verHastaText.length) {
					verHastaText[0].textContent = verHastaText[0].textContent.replace('□', '');
					$('<span class="calendar-icon"></span>').insertAfter(verHastaText[0]);
				}
			});
