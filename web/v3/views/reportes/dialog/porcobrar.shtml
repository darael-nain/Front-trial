		var getClientesPorCobrar = function(param){
			$.ajax({
				url: '/4DACTION/_V3_getClientesPorCobrarReporte',
				data: param,
				dataType: 'json',
				beforeSend: function(){
					containerClientes.find('*').remove();
					containerClientes.append('<tr><td colspan="9"><div>Cargando...</div></td></tr>');
				},
				success: function(data) {
					containerClientes.find('*').remove();
					$('.current-cliente > .cantidad').text(data.cliente_por_cobrar + " Clientes");
					$('.current-cliente.total').text(currency.symbol + " " + $.number(data.total_por_cobrar, currency.decimals, currency.decimals_sep, currency.thousands_sep) );
					if (data.por_cobrar.length > 0) {
						var htmlObject;
						$.each(data.por_cobrar, function(key, item) {
							htmlObject = $('<tr data-id="'+ item.id + '">' +
							'<td style="text-align:left;width:250px"><div>'+ item.cliente + '</div></td>' +
							'<td style="width:100px;text-align:center"><div class="ver-facturas">'+ item.cantidad +'</div></td>' +
							'<td style="width:100px;text-align:right"><div style="font-weight:bold;">'+ currency.symbol + " " + $.number(item.monto, currency.decimals, currency.decimals_sep, currency.thousands_sep) +'</div></td>' +
							'</tr>');
							/*htmlObject.click(function(){
								
								idCliente = $(this).data('id');
								$('a[href="#tabs-1"]').trigger('click');
							});*/
							containerClientes.append(htmlObject);
						});
					}else{
						containerClientes.find('*').remove();
						containerClientes.append('<tr><td colspan="9"><div style="text-align:center;padding:10px;color:green;font-weight:bold;font-size:12px;">No se encontro ningún resultado.</div></td></tr>');
					}
				},
				error: function(xhr, text, error) {
					console.log("error:" + error);
				}
			});
		}

					if (data.facturas.length > 0) {
						var htmlObject;
						$.each(data.facturas, function(key, item) {
							htmlObject = $('<tr data-id="'+ item.id +'" style="vertical-align:middle">' +
							//'<td><input class="check_options" type="checkbox"></td>' +
							'<td style="text-align:center;width:250px;vertical-align:middle;"><div style="display:inline-block"><a href="' + '//' + window.location.host + '/4DACTION/wbienvenidos#dtv/content.shtml?id=' +

							'<td style="text-align:left;width:250px"><div title="'+ item.cliente +'">'+ ( (item.cliente.length > 25 ) ? item.cliente.substring(0, 25) + "..." : item.cliente) + '</div></td>' +

							'<td style="width:100px;text-align:right;font-weight:bold;"><div>'+ currency.symbol + " " + $.number(item.saldo, currency.decimals, currency.decimals_sep, currency.thousands_sep) +'</div></td>' +
							'</tr>');
							tbodyCobros.append(htmlObject);

							/*htmlObject.find('.check_options').click(function(){
								let itemsSelected = $('.facturas-por-cobrar > tbody > tr > td > input:checked').length;
								if (itemsSelected > 0) {
									$('#dialog-menu').find('ul li[data-name="nueva_tarea"]').show();
									$('#dialog-menu').find('ul li[data-name="mail_cobranza"]').show();
									$('#dialog-menu').find('ul li[data-name="agendar_cobro"]').show();
								}else{
									$('#dialog-menu').find('ul li[data-name="nueva_tarea"]').hide();
									$('#dialog-menu').find('ul li[data-name="mail_cobranza"]').hide();
									$('#dialog-menu').find('ul li[data-name="agendar_cobro"]').hide();
								}
							});*/

						});

					}else{
						tbodyCobros.find('*').remove();
						tbodyCobros.append('<tr><td colspan="9"><div style="text-align:center;padding:10px;color:green;font-weight:bold;font-size:12px;">No se encontro ningún resultado.</div></td></tr>');
					}

				},
				error: function(xhr, text, error) {

		var containerCobrosAgendados = $('#container-reportes-cobros-agendados > table > tbody');
		var getCobrosAgendados = function(param){
			$.ajax({
				url: '/4DACTION/_V3_getCobrosAgendadosREPORT',
				data: param,
				dataType: 'json',
				beforeSend: function(){
					containerCobrosAgendados.find('*').remove();
					containerCobrosAgendados.append('<tr><td colspan="9"><div>Cargando...</div></td></tr>');
				},
				success: function(data) {
					containerCobrosAgendados.find('*').remove();
					var htmlObject;
					if (data.cobros_agendados.length > 0) {
						$.each(data.cobros_agendados, function(key, item) {
							htmlObject = $('<tr data-id="'+ item.id + '">' +
							'<td style="text-align:center"><div>'+ item.numero + '</div></td>' +
							'<td style="text-align:left"><div>'+ item.cliente + '</div></td>' +
							'<td style="text-align:left"><div>'+ item.referencia + '</div></td>' +
							'<td style="text-align:center"><div>'+ item.fecha + '</div></td>' +
							'<td style="text-align:right"><div style="font-weight:bold;">'+ currency.symbol + " " + $.number(item.monto, currency.decimals, currency.decimals_sep, currency.thousands_sep) +'</div></td>' +
							'</tr>');
							/*htmlObject.click(function(){
								//var id = $(this).data('id');
								//unaBase.loadInto.dialog('/v3/views/ingresos/dialog/ingreso.shtml?id=' + id, 'Ingreso', 'x-large');
								//window.open("http://" + window.location.host + "/v3/views/ingresos/dialog/ingreso.shtml?id="+ id, '_blank');
							});*/
							containerCobrosAgendados.append(htmlObject);
						});
					}else{
						containerCobrosAgendados.find('*').remove();
						containerCobrosAgendados.append('<tr><td colspan="9"><div style="text-align:center;padding:10px;color:green;font-weight:bold;font-size:12px;">No se encontro ningún resultado.</div></td></tr>');

					}
				},
				error: function(xhr, text, error) {
					console.log("error:" + error);
				}

		}

		$(document).ready(function() {
			
			$('div.totales').draggable({ containment: "parent" });

			$('a[href="#tabs-1"]').click(function() {
				$('#buscador-text-report').attr('placeholder', 'Buscar por cliente, factura');
				activeTab = 'clientes';
				unaBase.interval.clearAll();
				getClientesPorCobrar(param);
			});

			$('a[href="#tabs-2"]').click(function() {
				$('#buscador-text-report').attr('placeholder', 'Buscar por cliente, factura');
				activeTab = 'facturas';
				unaBase.interval.clearAll();
				getFacturasPorCobrar(param);
			});

			$('a[href="#tabs-3"]').click(function() {
				$('#buscador-text-report').attr('placeholder', 'Buscar por número, cliente, factura');
				activeTab = 'agendados';
				unaBase.interval.clearAll();
				getCobrosAgendados(param);
			});

			$('a[href="#tabs-1"]').trigger('click');

			// periodos
			$('#buscador-periodos-report').change(function(){
				option = $(this).val();
				if (option == "seleccionar") {
					let htmlObjectFecha = $('<section>\
							<h3 style="font-weight:bold;margin:3px;">Seleccionar periodo</h3>\
							<input placeholder="Desde" readonly required style="border:1px solid lightgray;padding:2px;" type="text" name="seleccionar_desde">\
							<input placeholder="Hasta" readonly required style="border:1px solid lightgray;padding:2px;" type="text" name="seleccionar_hasta">\
					</section>');

					htmlObjectFecha.find('input[name="seleccionar_desde"]').datepicker({
						onSelect: function(event) {
							htmlObjectFecha.data('response', $(this).val());
						}
					});

					htmlObjectFecha.find('input[name="seleccionar_hasta"]').datepicker({
						onSelect: function(event) {
							htmlObjectFecha.data('response', $(this).val());
						}
					});

					prompt(htmlObjectFecha).done(function(data) {
						let from = $('input[name="seleccionar_desde"]').val();
						let to = $('input[name="seleccionar_hasta"]').val();
						if (from == '') {
							from = to;
							$('input[name="seleccionar_desde"]').val(from);
						}
						if (to == '') {
							to = from;
							$('input[name="seleccionar_desde"]').val(to);
						}
						param.periodo = 'rango';
					  	param.date_from = from;
					  	param.date_to = to;
						switch(activeTab) {
						  case 'clientes':
						    getClientesPorCobrar(param);
						    break;
						  case 'facturas':
						    getFacturasPorCobrar(param);
						    break;
						  case 'agendados':
						    getCobrosAgendados(param);
						    break;
						}
						
					});
				}else{
					switch(activeTab) {
					  case 'clientes':
					    param.periodo = option;
					    getClientesPorCobrar(param);
					    break;
					  case 'facturas':
					  	param.periodo = option;
					    getFacturasPorCobrar(param);
					    break;
					  case 'agendados':
					  	param.periodo = option;
					   	getCobrosAgendados(param);
					    break;
					}
				}
			});

			$('#buscador-text-report').on("keyup",function(){
				param.text = $(this).val();
				switch(activeTab) {
				  case 'clientes':
				  	getClientesPorCobrar(param);
				    break;
				  case 'facturas':
				  	 getFacturasPorCobrar(param);
				    break;
				  case 'agendados':
				  	getCobrosAgendados(param);
				    break;
				}
			});

			$('button.export-info-report').button({icons: { primary: 'ui-icon-calculator'}, text: true }).click(function(){
				let filters = jQuery.param(param);
				let sid = '';
				$.each($.cookie(),function(clave,valor) { if (clave == hash && valor.match(/UNABASE/g)) sid = valor; });
				let url = nodeUrl + '/export-report-porcobrar/?download=true&sid=' + encodeURIComponent(sid) + '&' + filters + '&hostname=' + window.location.origin;
				unaBase.log.save('Ha exportado el listado de reportes por cobrar', 'dtv');
				var download = window.open(url);
				download.blur();
				window.focus();
			});

		});

		</script>
