<!DOCTYPE html>
<html>
	<head>
		<!--#4DSCRIPT/_V3_proxy_getCotizacion-->
		<title>Presupuestos</title>
		<meta charset="utf-8">

		<link rel="stylesheet" href="/v3/views/compras/lista.css?mshsmshjsus">
		<script>

			$(document).ready(function() {
				document.title = nombreEmpresa + ' / Presup. de Gastos';

				unaBase.toolbox.init();

				// Inicializamos un buscador
				var params = {
					searchOff: true,
					// Función que genera una URL de listado JSON
					url: function() { return '/4DACTION/_V3_getPresupuesto' },
					entity: 'Cotizacion',
					callback : function(data){
						$('tfoot.totales').find('span[data-gasto-p]').text(data.totales.gasto_p);
						$('tfoot.totales').find('span[data-gasto-r]').text(data.totales.gasto_r);
						$('tfoot.totales').find('span[data-gasto-dif]').text(data.totales.gasto_dif);

						$('#search input[name="parametro"]').attr('placeholder', data.parametros.nombre_param1.toLowerCase()).css('text-transform', 'capitalize');
					},
					// Función que genera cada fila de la tabla, dado el valor de i (índice de posición)
					// y el valor de rows (array con todos los resultados)
					// El contenido de rows corresponde al objeto de mismo nombre generado mediante la llamada
					// a la api JSON. Ver /v3/json/get_cotizacion.shtml para conocer el formato.
					row: {
						html: function(i, rows) {
							//var htmlData = '';
							//if (typeof rows[i].folio != 'undefined' && rows[i].folio != -1)

							var dif = rows[i].gasto_p - rows[i].gasto_r;

							var htmlData = 
							
							'<tr data-id="' + rows[i].id + '" data-username="' + rows[i].username +'" data-closed-compras="' + rows[i].closed_compras +  '" data-status="' + rows[i].status + '">' +
								'<td>' + rows[i].folio +' <span class="ui-icon ui-icon-locked" style="vertical-align: middle; margin-top: -2px; display: inline-block; visibility: ' + ((rows[i].closed_compras)? 'visible' : 'hidden' ) + ';"></span>'+ '</td>' +
								'<td>' + rows[i].fecha_asignacion + '</td>' +

								//'<td>' + ((rows[i].created_at !== undefined)? '<time datetime="' + Date.parse(rows[i].created_at).toISOString() + '">' + $.datepicker.formatDate('dd-mm-yy', Date.parse(rows[i].created_at)) + ' <span>' + Date.parse(rows[i].created_at).toTimeString().match( /^([0-9]{2}:[0-9]{2}:[0-9]{2})/ )[0].substring(0, 5) +  '</span></time>' : 'N/A' ) + '</td>' +

								// '<td>' + rows[i].tipo + '</td>' +
								'<td class="text">' + rows[i].text + '</td>' +
								'<td>' + ((rows[i].ejecutivo != '')? rows[i].ejecutivo : 'N/A') + '</td>' +

								//'<td width="100" class="currency">' + rows[i].gasto_p + '</td>' +
								
								(
									(rows[i].exchange !== undefined && rows[i].exchange.type != currency.code)?
									'<td class="w-medium" style="text-align: right; position: relative;"><span>'+ rows[i].exchange.type + '</span> ' + (rows[i].gasto_p / rows[i].exchange.rate).numberFormat(2, ',', '.') + '</td>'
									:
									'<td class="currency w-medium">' + rows[i].gasto_p + '</td>'
								) +

								//'<td width="100" class="currency">' + rows[i].gasto_r + '</td>' +

								(
									(rows[i].exchange !== undefined && rows[i].exchange.type != currency.code)?
									'<td class="w-medium" style="text-align: right; position: relative;"><span>'+ rows[i].exchange.type + '</span> ' + (rows[i].gasto_r / rows[i].exchange.rate).numberFormat(2, ',', '.') + '</td>'
									:
									'<td class="currency w-medium">' + rows[i].gasto_r + '</td>'
								) +

								//'<td width="100" class="currency">' + (rows[i].gasto_p - rows[i].gasto_r) + '</td>' +
								
								(
									(rows[i].exchange !== undefined && rows[i].exchange.type != currency.code)?
									'<td class="w-medium" style="text-align: right; position: relative;"><span>'+ rows[i].exchange.type + '</span> ' + (dif / rows[i].exchange.rate).numberFormat(2, ',', '.') + '</td>'
									:
									`<td class="currency w-medium" style="${dif < 0 ? "color: red;" : ""}">${dif}</td>`
								) +

								
								'<td class="percent">' + (( isNaN((((rows[i].gasto_p - rows[i].gasto_r) / rows[i].gasto_p) * 100.00)) )? 0.00 : (((rows[i].gasto_p - rows[i].gasto_r) / rows[i].gasto_p) * 100.00) )  + '</td>' +
								'<td <!--#4DIF (Not(show_validated_column))-->style="display: none;"<!--#4DENDIF-->>' + ((rows[i].validated)? 'Si' : 'No') + '</td>' +
							'</tr>';
							return htmlData;
						}
					},
					detail: {
						// Función que genera una URL de detalle, dado el id (identificador de item)
						url: function(id) { return '/v3/views/presupuestos/content.shtml?id=' + id },
					},
					// Inflexiones
					inflection: {
						singular: 'presupuesto',
						plural: 'presupuestos',
						none: 'ningún'
					},
					// Filtros
					filters: [
						//{ name: 'created_at', type: 'month', caption: 'Fecha de creación', range: true },
						{ name: 'created_at', type: 'month', caption: 'Fecha de asignación', range: true },
						//{ name: 'updated_at', type: 'month', caption: 'Fecha últ. modificación', range: true },
						// Pendiente: agregar datasource remoto y convertir a checkbox
						// con jquery ui autocomplete
						{ name: 'area_negocio', type: 'new_select', caption: 'Área de negocio', dataSource: 'getAreaNegocio' },
						{ name: 'ejecutivo_responsable', type: 'new_select', caption: 'Ejecutivo responsable', dataSource: 'getUsuarioPerfilEjecutivo' },
						{ name: 'validated', type: 'autocomplete', caption: 'Según validación', dataObject: [
							{ id: 'true', text: 'Validadas' },
							{ id: 'false', text: 'No validadas' }
						]},
						{ name: 'oc_proveedor', type: 'autocomplete', caption: 'Según OC Proveedor', dataObject: [
							{ id: 'true', text: 'Con OC proveedor' },
							{ id: 'false', text: 'Sin OC proveedor' }
						]},
						{ name: 'estado', type: 'checkbox', caption: 'Estado de la cotización', options: [
							{ caption: 'En proceso', name: 'estado_en_proceso', value: true },
							{ caption: 'Anulada', name: 'estado_nulo', value: false }
						] },
						{ name: 'estado_compras', type: 'autocomplete', caption: 'Estado de las compras', dataObject: [
							{
								id: true,
								text: 'Abiertas para compras'
							},
							{
								id: false,
								text: 'Cerradas para compras'
							}
						]},
						{ name: 'parametro', type: 'autocomplete', caption: '', dataSource: 'Param1' }
					]
				};


				/*$.ajax({
					url: '/4DACTION/_V3_getDato',
					dataType: 'json',
					async: false,
					success: function(data) {
						$.each(data.rows, function(key, item) {
							if (item.enabled && item.options.length > 0)
								params.filters.push({
									name: item.nombre.replace(/ |\(|\)|\/|\?/g,"_"),
									type: 'autocomplete',
									caption: item.nombre,
									dataObject: item.options
								});
							//if (item.enabled && item.options.length == 0)
							//	params.filters.push({
							//		name: item.nombre.replace(/ |\(|\)|\/|\?/g,"_"),
							//		type: 'text',
							//		caption: item.nombre,
							//		dataObject: item.options
							//	});
							//
						});
					}
				});*/

				unaBase.toolbox.search.init(params);

				unaBase.toolbox.menu.init({
					presupuesto: true,
					entity: 'Cotizacion', // especifica entidad sobre la cual se almacenan los datos
										  // y nombre para referenciar los views
					/*buttons: [ 'new', 'clone', 'print' ]*/
					<!--#4DIF _V3_verifica_permisos_web(_V3_data_username;514)-->
					buttons: [ 'searchOff','new_budget', 'print','export_list' ]
					<!--#4DELSE-->
					buttons: [ 'searchOff','print' ]
					<!--#4DENDIF-->
				});


			});
		</script>
	</head>
	<body style="min-width: 900px !important;">
		<!-- Maqueta de la tabla que contendrá los resultados de búsqueda -->
		<table class="table results fixed" style="min-width: 900px !important; width: 100% !important;">
			<thead>
				<tr>
					<th data-sort-by="folio" data-sort-default="desc">Número</th>
					<th data-sort-by="created_at" data-sort-default="desc">F. ASIGNACIÓN</th>
					<!--<th data-sort-by="created_at" data-sort-default="asc">Tipo</th>-->
					<th data-sort-by="text" data-sort-default="asc">Nombre</th>
					<th data-sort-by="ejecutivo" data-sort-default="asc">Responsable</th>
					<th data-sort-by="gasto_p" data-sort-default="desc">Gasto P.</th>
					<th data-sort-by="gasto_r" data-sort-default="desc">Gasto R.</th>
					<th data-sort-by="diferencia" data-sort-default="desc">Diferencia</th>
					<th data-sort-by="diferencia_percent" data-sort-default="desc">Dif. [%]</th>
					<th data-sort-by="validada" data-sort-default="desc"<!--#4DIF (Not(show_validated_column))-->style="display: none;"<!--#4DENDIF-->><span style="max-width: 50px;">Validada</span></th>
				</tr>
			</thead>
			<tfoot class="totales">
				<tr>
		            <th colspan="4"></th>
			        <th class="col-xs-1 col-sm-1 col-md-1 col-lg-1 text-center"><span data-gasto-p="" class="label2"><!--#4DVAR _V3_defaultCurrencySymbol-->0</span></th>
		            <th class="col-xs-1 col-sm-1 col-md-1 col-lg-1 text-center"><span data-gasto-r="" class="label2"><!--#4DVAR _V3_defaultCurrencySymbol-->0</span></th>
 					<th class="col-xs-1 col-sm-1 col-md-1 col-lg-1 text-center"><span data-gasto-dif="" class="label2"><!--#4DVAR _V3_defaultCurrencySymbol-->0</span></th>
		            <th <!--#4DIF (Not(show_validated_column))-->style="display: none;"<!--#4DENDIF-->></th>
	            </tr>
			</tfoot>
			<tbody></tbody>
		</table>
	</body>

</html>
