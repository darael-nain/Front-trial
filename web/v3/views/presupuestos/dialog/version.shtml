<!DOCTYPE html>
<html>
	<head>
		<!--<!- -#4DSCRIPT/_V3_proxy_getCotizacionContent- ->-->
		<title>Versiones</title>
		<meta charset="utf-8">
		<script>
			$(document).ready(function() {

				unaBase.toolbox.init();

				var showVersiones = function(hidden) {
					$('.ui-dialog table tbody').find('*').remove();
					$.ajax({
						url: '/4DACTION/_V3_getVersionByCotizacion',
						data: {
							id: $('section.sheet').data('id'),
							hidden: hidden
						},
						dataType: 'json',
						success: function(data) {
							var htmlObject;
							$.each(data.rows, function(key, item) {
								htmlObject = $('<tr data-id="' + item.id + '" data-username="' + item.username + '"' + ((item.current)? ' class="ui-selected"': '') + '>' +
									'<td>' + item.id + '</td>' +
									'<td>' + ((item.updated_at !== undefined)? '<time datetime="' + new Date(item.updated_at).toISOString() + '">' + $.datepicker.formatDate('dd-mm-yy', new Date(item.updated_at)) + ' <span>' + new Date(item.updated_at).toTimeString().match( /^([0-9]{2}:[0-9]{2}:[0-9]{2})/ )[0].substring(0, 5) +  '</span></time>' : 'N/A' ) + '</td>' +
									'<td>' + item.username + '</td>' +
									'<td>' + item.text + '</td>' +
									'<td class="currency">' + item.total_neto + '</td>' +
									'<td class="options">' +
									'<button class="rollback" ' + (!access._556? ' style="display :none;"' : '') + '></button>' +
									'<button class="preview" style="display: none;"></button>' +
									'<button class="fork" style="display: none;"></button>' +
									'</td>' +
								'</tr>');
								if (access._556) {
									htmlObject.find('button.rollback').button({
										caption: 'Revertir',
										icons: {
											primary: 'ui-icon-arrowreturnthick-1-w'
										},
										text: false
									}).click(function() {
										element = this;
										confirm('¿Confirma que desea cambiar a la versión ' + item.id + ' ?<br>Luego podrá volver a la versión actual si lo desea.').done(function(data) {
											if (data)
												$.ajax({
													url: '/4DACTION/_V3_setVersionByCotizacion',
													data: {
														id: $('section.sheet').data('id'),
														index: item.id
													},
													dataType: 'json',
													success: function(data) {
														$(element).parentTo('.ui-dialog-content').dialog('close');
														toastr.success('La versión de la cotización ha sido revertida con éxito.');
														unaBase.loadInto.viewport('/v3/views/cotizaciones/content.shtml?id=' + $('section.sheet').data('id'), 'Cotización');
													}
												});
										});

									});
								}
								htmlObject.find('button.preview').button({
									caption: 'Vista previa',
									icons: {
										primary: 'ui-icon-search'
									},
									text: false
								}).click(function() {
									// cargar el popup de vista previa de impresión
									// hay que hacer compatible el preview con las cotizaciones historial
								});
								htmlObject.find('button.fork').button({
									caption: 'Nueva cotización a partir de esta versión',
									icons: {
										primary: 'ui-icon-copy'
									},
									text: false
								}).click(function() {
									// hacer el fork
								});
								$('.ui-dialog table > tbody').append(htmlObject);
							});

							formatCurrency();
						}
					});
				}
				showVersiones();

				$('input[name="hidden"]').change(function(event) {
					var is_checked = $(event.target).is(':checked');
					showVersiones(is_checked);
				});

			});
		</script>
	</head>
	<body>
		<label><input type="checkbox" name="hidden" value="true"> Mostrar versiones de guardado</label>
		<table>
			<thead>
				<tr>
					<th>Versión</th>
					<th>Fecha</th>
					<th>Usuario</th>
					<th>Referencia</th>
					<th>Total neto</th>
					<th>Acción</th>
				</tr>
			</thead>
			<tbody></tbody>
		</table>
	</body>
</html>
