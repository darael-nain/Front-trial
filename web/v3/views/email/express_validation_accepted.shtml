						$(".status").html("<div class='caution'>El documento ya se encuentra validado.</div><div style='color:black;font-size:18px;display:none'>"+ textoValidacion +"</div>");
						setTimeout(function(){
							window.close();
						}, 4000);
					}
				}else{
					$(".status").html("<div class='caution'>¡Ups! El criterio no existe. <div>Posiblemente la validación fue reiniciada.</div></div>");
					setTimeout(function(){
						window.close();
					}, 4000);
				}
			});
