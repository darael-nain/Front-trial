<!DOCTYPE html>
<html>

	<body style="font-family:sans-serif;text-align:center">
		<div style="margin:0;padding:0;">
			<h2 data-subject style="display:none!important;"><span data-from-name></span> <span data-document></span> Nº <span data-index></span> / <span data-title></span></h2>
			<div style="margin:auto;width:100%!important;display:relative">
				<h1 style="max-width: 141px; max-height: 141px;"><img src="<!--#4DTEXT vUrlImagenLogo-->" width="<!--#4DTEXT vAnchoPicturePromedio-->" height="<!--#4DTEXT vAltoPicturePromedio-->" style="max-width: 500px; max-height: 90px;"></h1>

					</section>
				</div>

				<footer style="text-align:left;margin-top:40px!important">

					<div>Email generado vía <a href="http://www.unabase.cl/">UnaBase</a> - Software de Gestión</span></div>
				</footer>
			</div>
		</div>
