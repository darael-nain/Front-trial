  <style>
    .ts-control {
      border: none;
    }

    a {
      color: #4EC275;
    }

    .btn:hover {
      background-color: #dce3de;

    }

    button.colorSelector {
      padding: 0 !important;
    }



    .table-fixed tbody td,
    .table-fixed tbody th,
    .table-fixed thead>tr>th {
      float: left;
      position: relative;
    }

    .table-fixed tbody td::after,
    .table-fixed tbody th::after,
    .table-fixed thead>tr>th::after {
      content: "";
      clear: both;
      display: block;
    }

    #tooltip {
      width: 500px;
      background-color: rgb(110, 108, 108);
      color: white;
      padding: 10px 50px;
      border-radius: 10px;
      font-size: 13px;
    }

    .imgRedonda {
      width: 30px;
      height: 30px;
      border-radius: 20px;
    }

    .santander {
      background: white url(../css/img/santander.png) no-repeat;
      background-repeat: round;
    }

    .bchile {

      background: white url(../css/img/chile_banconexion.png) no-repeat;
      background-repeat: round;

    }

    .bci {

      background: white url(../css/img/bci.png) no-repeat;
      background-repeat: round;

    }

    .itau {

      background: white url(../css/img/itau.jpg) no-repeat;
      background-repeat: round;

    }

    i.blue,
    span.blue {
      color: #03D6F9;
    }

    i.purple,
    span.purple {
      color: #884d79;
    }

    i.red,
    span.red {
      color: #FC4903;
    }

    i.green,
    span.green {
      color: #34CC02;
    }

    .v-sep {
      height: 5vh !important;
      width: .3vw;
      border-width: 0;
      color: #000;
      background-color: #000;
    }

    .btn-outline-warning:hover {
      background-color: #ffc107 !important;
      color: white;
    }

    .accordion-button {
      border-radius: 30px !important;
      color: black !important;
    }

    .accordion-item.mov.purple {
      border-color: #884d79 !important;
      border-radius: 30px;
    }

    .accordion-item.mov.red {
      border-color: #FC4903 !important;
      border-radius: 30px;
    }

    .accordion-item.mov.blue {
      border-color: #03D6F9 !important;
      border-radius: 30px;
    }

    button.conciliado {
      opacity: 0.1 !important;
    }

    .card {
      min-width: 200px !important;
      border-radius: 15px;
      box-shadow: 0 3px 3px rgb(0 0 0 / 0.2);
      height: 110px !important;
      margin: 20px;
    }

    .sup_icon {
      width: 40px;
      height: 40px
    }

    .col-filter {
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .filter-by-movement {
      display: block;
      width: 100%;
      padding: .375rem .75rem;
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.5;
      color: #212529;
      background-color: #fff;
      background-clip: padding-box;
      border: 1px solid #ced4da;
      appearance: none;
      border-radius: .375rem;
      transition: border-color .15s ease-in-out, box-shadow .15s ease-in-out;
      cursor: pointer;
    }

    .filter-by-movement:focus {
      border-color: #86b7fe;
      outline: 0;
      box-shadow: 0 0 0 .25rem rgba(13, 110, 253, .25);
    }


    /* Barra principal */
    .resume-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .resume-bar {
      display: inline-flex;
      width: fit-content;
      margin: 0 auto;
      max-width: 100%;
      background: #fff;
      border: 1px solid #e7ebf0;
      border-radius: 18px;
      padding: 18px 18px;
    }

    /* Cada bloque: Abonos / Cargos / Filtro */
    .resume-col {
      display: flex;
      flex-direction: column;
      padding: 0 18px;
      min-width: 190px;
    }

    .resume-col--filter {
      min-width: 200px;
    }

    .total-abono {
      font-size: 18px !important;
    }

    .total-cargos {
      font-size: 18px !important;
    }

    /* Texto superior tipo "Total Abonos:" */
    .resume-label {
      font-size: 14px;
      font-weight: 700;
      color: #667085;
      margin-bottom: 6px;
    }

    .resume-value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
    }

    .resume-value--abono {
      color: #16a34a;
    }

    .resume-value--cargo {
      color: #ef4444;
    }

    .resume-sep {
      width: 1px;
      align-self: stretch;
      background: #e7ebf0;
    }

    /* Pastillas */
    .pill-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill {
      border: 1px solid #e7ebf0;
      background: #fff;
      color: #334155;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      min-width: 130px;
      box-shadow: 0 6px 16px rgba(15, 23, 42, .06);
      transition: transform .08s ease, box-shadow .08s ease, background .08s ease;
      user-select: none;
    }

    .pill:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(15, 23, 42, .10);
    }

    .pill:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(11, 95, 255, .18);
    }

    /* Pastilla seleccionada */
    .pill.is-active {
      color: #fff;
      border-color: transparent;
    }

    .pill.is-active[data-value="all"] {
      background: #0b5fff;
    }

    .pill.is-active[data-value="cargo"] {
      background: #ef4444;
    }

    .pill.is-active[data-value="abono"] {
      background: #16a34a;
    }

    .pill-count {
      margin-left: 10px;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
      background: #eef2f7;
      color: #64748b;
    }

    .pill.is-active .pill-count {
      background: rgba(255, 255, 255, .22);
      color: #fff;
    }


    /* En móvil: se apilan y se ocultan separadores */
    @media (max-width: 768px) {
      .resume-col {
        padding: 0;
        min-width: unset;
        flex: 1 1 100%;
      }

      .resume-sep {
        display: none;
      }

      .resume-col--filter {
        min-width: unset;
      }

      .resume-bar {
        width: 100%;
        display: flex;
      }
    }

    .container {
      padding-top: 20px;
    }

    .hidden-by-mov {
      display: none !important;
    }

    .estado-resumen {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: depite;
      font-size: 12px;
      color: #667085;
      white-space: nowrap;
      margin-left: 0 !important;
      flex-wrap: wrap;
    }

    /* separador vertical */
    .estado-resumen .resume-sep {
      width: 1px;
      height: 14px;
      background: #e7ebf0;
      display: inline-block;
    }

    .resume-sep {
      width: 1px;
      height: 14px;
      background: #e7ebf0;
      display: inline-block;
    }

    .estado-resumen .abonos-res,
    .estado-resumen .cargos-res {
      display: inline-flex;
      align-items: baseline;
      white-space: nowrap; 
      max-width: 100%;
      font-weight: 700;
      color: #111827;
    }
    .estado-resumen .resume-value--abono,
    .estado-resumen .resume-value--cargo{
      overflow-wrap: anywhere;
    }
  </style>
