    <script>
    $(document).ready(function() {
      $('.imagenes-adjuntas').hide();
      $('.archivos-enlazados').hide();

      $.ajax({
        url: '/4DACTION/_V3_getAttachmentByCotizacion',
        data: {
          id: <!--#4DVAR vid_nv-->,
          sid: '<!--#4DVAR sid-->'
        },
        async: false,
        dataType: 'json',
        success: function(data) {
          var htmlObject;
          if (data.rows.length > 0)
            $('.imagenes-adjuntas').show();
          for (var i = 0; i < data.rows.length; i++) {
            htmlObject = '<p style="margin-top: 15px; margin-bottom: 5px;">' + data.rows[i].notas + '</p><img src="/4DACTION/_V3_getAttachment?id=' + data.rows[i].id + '&amp;sid=<!--#4DVAR sid-->" alt="' + data.rows[i].text + '" width="900">';
            $('.attachments').append(htmlObject);
          }
        }
      });

      $.ajax({
        url: '/4DACTION/_V3_getLinkByCotizacion',
        data: {
          id: <!--#4DVAR vid_nv-->,
          sid: '<!--#4DVAR sid-->'
        },
        async: false,
        dataType: 'json',
        success: function(data) {
          var htmlObject;
          if (data.rows.length > 0)
            $('.archivos-enlazados').show();
          for (var i = 0; i < data.rows.length; i++) {
              if (data.rows[i].visible) {
                  htmlObject = '<p style="margin-top: 15px; margin-bottom: 5px;"><a href="' + data.rows[i].href + '">' + data.rows[i].notas + '</a></p>';
                  $('.links').append(htmlObject);
              }
          }
        }
      });

      <!--#4DIF print_datos_adicionales_cot-->
      $.ajax({
        url: '/4DACTION/_V3_getDatoByCotizacion',
        data: {
          id: <!--#4DVAR vid_nv-->,
          sid: '<!--#4DVAR sid-->'
        },
        async: false,
        dataType: 'json',
        success: function(data) {
          var htmlObject;
          if (data.rows.length > 0)
            $('.datos-adicionales').show();
          for (var i = 0; i < data.rows.length; i++) {
            if (data.rows[i].enabled && data.rows[i].valor != '') {
              htmlObject = '<p style="font-size: 11px; display: block !important; margin: 0;">' + data.rows[i].nombre + ': ' + data.rows[i].valor + '</p>';
              $('.datos').append(htmlObject);
            }
          }
          if ($('.datos').text() == '')
            $('.datos-adicionales').hide();
        }
      });
      <!--#4DENDIF-->

    });
    </script>
